let state={page:'home',group:null,cart:{},buyer:'',focusItem:null,selectedItem:null,menuSection:null,adminTab:0,orderTab:0,orderDate:localDate(new Date())},syncTimer=null;
const $=s=>document.querySelector(s);
const now=()=>new Date();
const headers={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};
function dedupeOrders(orders){
  const seen=new Set();
  return (Array.isArray(orders)?orders:[]).filter(o=>{
    if(!o||typeof o!=='object')return false;
    const itemKey=JSON.stringify((o.items||[]).map(x=>[x.name,x.spec,Number(x.qty)||0,Number(x.price)||0]));
    const key=o.id||[o.groupId,o.buyer,o.createdAt,o.total,itemKey].join('|');
    if(seen.has(key))return false;
    seen.add(key);return true;
  });
}
function normalize(raw){raw=raw&&typeof raw==='object'?raw:{};return {password:EMPTY.password,stores:Array.isArray(raw.stores)?raw.stores:[],groups:Array.isArray(raw.groups)?raw.groups.map(g=>({...g,creator:g.creator||'',payee:g.payee||''})):[],orders:dedupeOrders(raw.orders)}}
function esc(s=''){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmt(d,withTime=true){if(!d)return 'вҖ”';return new Intl.DateTimeFormat('zh-TW',{timeZone:'Asia/Taipei',year:'numeric',month:'2-digit',day:'2-digit',...(withTime?{hour:'2-digit',minute:'2-digit',hour12:false}:{})}).format(new Date(d))}
function localDate(d){return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Taipei',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date(d))}
function store(id){return data.stores.find(x=>x.id===id)}function group(id){return data.groups.find(x=>x.id===id)}
function isOpen(g){return !!g&&!g.manualClosed&&new Date(g.deadline)>now()}
function mapUrl(address){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(address||'')}
function mapHtml(address){return ''}
function optionGroups(item){return Array.isArray(item.optionGroups)?item.optionGroups.filter(g=>g?.name&&Array.isArray(g.values)&&g.values.length):[]}
function cartEntry(item,i){const current=state.cart[i]||{};const defaults=Object.fromEntries(optionGroups(item).map(g=>[g.name,g.values[0]]));return {...current,q:current.q||0,variant:current.variant||0,options:{...defaults,...(current.options||{})}}}
function selectedPrice(item,cart){let price=Number(item.price)||0;optionGroups(item).forEach(g=>{const value=cart.options[g.name],n=Number(g.adjustments?.[value]||0);if(g.pricing)price=n;else price+=n});return price}
function variants(item){const groups=optionGroups(item);if(groups.length){const pricing=groups.find(g=>g.pricing),price=pricing?Number(pricing.adjustments?.[pricing.values[0]])||0:Number(item.price)||0;return[{spec:groups.map(g=>`${g.name}пјҲ${g.values.join('гҖҒ')}пјү`).join('пјҸ'),price}]}if(Array.isArray(item.variants)&&item.variants.length)return item.variants.map(v=>({spec:v.spec||'е–®дёҖиҰҸж ј',price:Number(v.price)||0}));let specs=String(item.specs||'е–®дёҖиҰҸж ј').split(/[гҖҒ,пјҢ|пҪң]/).map(x=>x.trim()).filter(Boolean);return specs.map(spec=>({spec,price:Number(item.price)||0}))}
function save(){data=normalize(data);localStorage.setItem(KEY,JSON.stringify(data));clearTimeout(syncTimer);syncTimer=setTimeout(pushShared,350)}
async function pushShared(){try{const r=await fetch(SUPABASE_URL+'/rest/v1/together_order_state?id=eq.shared',{method:'PATCH',headers:{...headers,'Prefer':'return=minimal'},body:JSON.stringify({payload:data,updated_at:new Date().toISOString()})});if(!r.ok)throw new Error(await r.text())}catch(e){console.warn('йӣІз«ҜеҗҢжӯҘжҡ«жҷӮеӨұж•—пјҢиіҮж–ҷе·ІдҝқеӯҳеңЁжң¬ж©ҹгҖӮ',e)}}
async function loadSharedState(){try{const r=await fetch(SUPABASE_URL+'/rest/v1/together_order_state?id=eq.shared&select=payload',{headers});if(!r.ok)throw new Error(await r.text());const rows=await r.json();if(rows[0]?.payload){data=normalize(rows[0].payload);localStorage.setItem(KEY,JSON.stringify(data))}else{await fetch(SUPABASE_URL+'/rest/v1/together_order_state',{method:'POST',headers:{...headers,'Prefer':'return=minimal'},body:JSON.stringify({id:'shared',payload:data})})}}catch(e){console.warn('зӣ®еүҚдҪҝз”Ёжң¬ж©ҹиіҮж–ҷгҖӮ',e)}render()}
function go(page){state.page=page;if(page==='home')state.group=null;render()}
function render(){const p=state.page;$('#tabs').classList.add('hidden');$('#adminBar').classList.add('hidden');document.querySelectorAll('.nav').forEach((x,i)=>x.classList.toggle('on',(p==='home'&&i===0)||(p==='history'&&i===1)||(p==='admin'&&i===2)));if(p==='home')home();else if(p==='menu')menu();else if(p==='order')orderForm();else if(p==='history')history();else admin()}
function home(){const active=data.groups.filter(isOpen).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));$('#headline').textContent=active.length?`зӣ®еүҚжңү ${active.length} еҖӢеңҳиіјйҖІиЎҢдёӯ`:'зӣ®еүҚжІ’жңүй–Ӣж”ҫдёӯзҡ„еңҳиіј';$('#view').innerHTML=active.length?active.map(g=>{const s=store(g.storeId)||{};return `<article class="card"><div class="store-head"><div><span class="badge">${esc(s.category||'жңӘеҲҶйЎһ')}</span><h2>${esc(s.name||'е·ІеҲӘйҷӨеә—е®¶')}</h2><div class="small">${s.phone?'йӣ»и©ұ '+esc(s.phone):''}</div></div><b class="deadline open">й–Ӣж”ҫдёӯ</b></div><div class="deadline">${g.payee?'рҹ’Ід»ҳж¬ҫиҖ…пјҡ'+esc(g.payee)+'гғ»':''}ж”¶е–® ${fmt(g.deadline)}</div><button class="btn full" onclick="state.group='${g.id}';go('menu')">жҹҘзңӢиҸңе–®пјҸй»һйӨҗ</button></article>`}).join(''):`<div class="empty"><b>зҸҫеңЁжІ’жңүй–Ӣж”ҫдёӯзҡ„еңҳиіј</b>з®ЎзҗҶиҖ…й–ӢеңҳеҫҢпјҢе°ұеҸҜд»ҘеңЁйҖҷиЈЎй–Ӣе§Ӣй»һйӨҗгҖӮ</div>`}
function menu(){const g=group(state.group),s=g&&store(g.storeId);if(!g||!s)return go('home');if(!isOpen(g)){alert('йҖҷеҖӢеңҳиіје·Із¶“зөҗжқҹ');return go('home')}$('#headline').textContent=s.name;$('#view').innerHTML=`<button class="btn light" onclick="go('home')">иҝ”еӣһеңҳиіј</button><div class="card" style="margin-top:14px"><div class="store-head"><div><span class="badge">${esc(s.category||'жңӘеҲҶйЎһ')}</span><h2>${esc(s.name)}</h2><div class="small">${s.phone?'йӣ»и©ұ '+esc(s.phone):''}</div></div><div class="deadline open">${g.payee?'рҹ’Ід»ҳж¬ҫиҖ…пјҡ'+esc(g.payee)+'гғ»':''}ж”¶е–® ${fmt(g.deadline)}</div></div>${s.note?`<p class="small">${esc(s.note)}</p>`:''}${mapHtml(s.address)}${s.importData?`<button class="btn light full" onclick="showMenuFile('${s.id}')">жҹҘзңӢеҺҹе§ӢиҸңе–®</button>`:''}<hr class="divider">${s.items.map(item=>`<div class="menu-item"><div class="food-icon">${s.category==='йЈІж–ҷ'?'рҹ§Ӣ':'рҹҚұ'}</div><div class="grow"><div class="name">${esc(item.name)}</div><div class="small">${variants(item).map(v=>`${esc(v.spec)} NT$ ${v.price.toLocaleString()}`).join('гғ»')}</div></div></div>`).join('')||'<p class="small">йҖҷй–“еә—е°ҡжңӘе»әз«ӢйӨҗй»һгҖӮ</p>'}<button class="btn full" style="margin-top:14px" onclick="state.cart={};state.buyer='';go('order')">й–Ӣе§Ӣй»һйӨҗ</button></div>`}
function orderForm(){const g=group(state.group),s=g&&store(g.storeId);if(!g||!s)return go('home');if(!isOpen(g)){alert('йҖҷеҖӢеңҳиіје·Із¶“зөҗжқҹ');return go('home')}const lines=s.items.map((item,i)=>{const vs=variants(item),groups=optionGroups(item),c=cartEntry(item,i),price=groups.length?Number(item.price)||0:(vs[c.variant]?.price||0);const controls=groups.length?groups.map(gr=>`<label class="small" style="margin-top:8px">${esc(gr.name)}</label><select aria-label="${esc(item.name)}${esc(gr.name)}" onchange="setOption(${i},'${esc(gr.name)}',this.value)">${gr.values.map(v=>`<option ${c.options[gr.name]===v?'selected':''}>${esc(v)}</option>`).join('')}</select>`).join(''):`<label class="small" style="margin-top:8px">иҰҸж ј</label><select aria-label="${esc(item.name)}иҰҸж ј" onchange="setVariant(${i},this.value)">${vs.map((v,j)=>`<option value="${j}" ${Number(c.variant)===j?'selected':''}>${esc(v.spec)}</option>`).join('')}</select>`;return `<div class="menu-item"><div class="grow"><div class="small">е“Ғй …</div><div class="name">${esc(item.name)}</div>${controls}<div class="small" style="margin-top:8px">еғ№йҢў</div><div class="price">NT$ ${price.toLocaleString()}</div></div><div class="qty"><button ${!c.q?'disabled':''} onclick="changeQty(${i},-1)">вҲ’</button><b>${c.q||0}</b><button onclick="changeQty(${i},1)">пјӢ</button></div></div>`}).join('');$('#headline').textContent='еЎ«еҜ«иЁӮе–®';$('#view').innerHTML=`<button class="btn light" onclick="go('menu')">иҝ”еӣһиҸңе–®</button><div class="card form" style="margin-top:14px"><label>иЁӮиіјдәә <em style="color:var(--danger)">*</em></label><input id="buyer" maxlength="30" placeholder="и«Ӣијёе…Ҙе§“еҗҚ" value="${esc(state.buyer||'')}" oninput="state.buyer=this.value"><label>е“Ғй …</label>${lines}<div class="total"><span>иЁӮе–®зёҪйҮ‘йЎҚ</span><span id="total">NT$ 0</span></div><button class="btn full" onclick="submitOrder()">йҖҒеҮәиЁӮе–®</button></div>`;updateTotal()}
function setVariant(i,v){const c=state.cart[i]||{q:0,options:{}};c.variant=Number(v);state.cart[i]=c;orderForm()}
function setOption(i,name,value){const c=state.cart[i]||{q:0,variant:0,options:{}};c.options={...(c.options||{}),[name]:value};state.cart[i]=c;orderForm()}
function changeQty(i,n){const s=store(group(state.group).storeId),c=cartEntry(s.items[i],i);c.q=Math.max(0,(c.q||0)+n);state.cart[i]=c;orderForm()}
function updateTotal(){const s=store(group(state.group).storeId);const total=s.items.reduce((sum,item,i)=>{const c=cartEntry(item,i),price=optionGroups(item).length?selectedPrice(item,c):(variants(item)[c.variant]?.price||0);return sum+c.q*price},0);if($('#total'))$('#total').textContent='NT$ '+total.toLocaleString()}
async function submitOrder(){const g=group(state.group);if(!isOpen(g)){alert('йҖҷеҖӢеңҳиіје·Із¶“зөҗжқҹ');return go('home')}const buyer=$('#buyer').value.trim(),s=store(g.storeId);const items=s.items.flatMap((item,i)=>{const c=cartEntry(item,i);if(!c.q)return[];const groups=optionGroups(item),v=variants(item)[c.variant];return[{name:item.name,spec:groups.length?groups.map(gr=>`${gr.name}:${c.options[gr.name]}`).join('гҖҒ'):v.spec,qty:c.q,price:groups.length?selectedPrice(item,c):v.price}]});if(!buyer)return alert('и«Ӣијёе…ҘиЁӮиіјдәә');if(!items.length)return alert('и«ӢиҮіе°‘йҒёж“ҮдёҖд»ҪйӨҗй»һ');const newOrder={id:crypto.randomUUID(),groupId:g.id,buyer,items,total:items.reduce((a,x)=>a+x.qty*x.price,0),paid:false,createdAt:new Date().toISOString()};try{const r=await fetch(SUPABASE_URL+'/rest/v1/rpc/append_together_order',{method:'POST',headers,body:JSON.stringify({new_order:newOrder})});if(!r.ok)throw new Error(await r.text());data=normalize(await r.json());localStorage.setItem(KEY,JSON.stringify(data))}catch(e){data.orders.push(newOrder);save()}state.cart={};showOrderSuccess()}
function wantedHtml(orders){const people=[...new Set(orders.filter(o=>!o.paid).map(o=>o.buyer).filter(Boolean))].sort(()=>Math.random()-.5).slice(0,2);return `<div class="wanted"><b>рҹ—ҝйҖҡз·қзҠҜ</b>${people.length?' '+people.map(esc).join('гҖҒ'):' еҫһзјә'}</div>`}
function orderLines(o){return o.items.map(x=>`<div class="item-line"><span>${esc(x.name)}пјҸ${esc(x.spec||'е–®дёҖиҰҸж ј')}</span><b>Г— ${Number(x.qty)||0}</b></div>`).join('')}
function historySpec(spec){return String(spec||'е–®дёҖиҰҸж ј').replace(/(?:^|[гҖҒпјҢ]\s*)[^гҖҒпјҢ:пјҡ]+[пјҡ:]/g,' ').replace(/[гҖҒпјҢ]/g,' ').replace(/\s+/g,' ').trim()||'е–®дёҖиҰҸж ј'}
function historyLines(o){return o.items.map(x=>{const price=Number(x.price||0),qty=Number(x.qty)||0;return `<div class="history-item"><span class="history-text">${esc(x.name)}пјҸ${esc(historySpec(x.spec))}</span><span class="history-price">$${price.toLocaleString()}</span><span class="history-qty">Г— ${qty}</span><span class="history-price">зёҪйЎҚ $${(price*qty).toLocaleString()}</span><span class="pill ${o.paid?'paid':'unpaid'}">${o.paid?'е·Ід»ҳж¬ҫ':'жңӘд»ҳж¬ҫ'}</span></div>`}).join('')}
function historyGroup(g){const s=store(g.storeId)||{},orders=data.orders.filter(o=>o.groupId===g.id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));return `<article class="card"><div class="group-title"><div><h3>${esc(s.name||'е·ІеҲӘйҷӨеә—е®¶')}</h3><div class="group-meta">й–ӢеңҳиҖ…пјҡ${esc(g.creator||'жңӘеЎ«еҜ«')}гғ»${isOpen(g)?'ж”¶е–® '+fmt(g.deadline):'е·Іж–ј '+fmt(g.deadline)+' зөҗжқҹ'}</div></div><span class="pill ${isOpen(g)?'paid':'unpaid'}">${isOpen(g)?'жң¬ж¬Ўеңҳиіј':'йҒҺеҫҖеңҳиіј'}</span></div>${orders.map(o=>`<div class="order"><b>${esc(o.buyer)}</b>${historyLines(o)}<div class="small">иЁӮиіјжҷӮй–“пјҡ${fmt(o.createdAt)}</div></div>`).join('')||'<div class="empty">йҖҷж¬ЎеңҳиіјйӮ„жІ’жңүиЁӮе–®</div>'}</article>`}
function history(){const active=data.groups.filter(isOpen).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));const ended=data.groups.filter(g=>!isOpen(g)).sort((a,b)=>new Date(b.deadline)-new Date(a.deadline)).slice(0,2);const shown=[...active,...ended];const shownOrders=data.orders.filter(o=>shown.some(g=>g.id===o.groupId));$('#headline').textContent='жң¬ж¬ЎиҲҮжңҖиҝ‘е…©ж¬Ўеңҳиіј';$('#view').innerHTML=wantedHtml(shownOrders,shown)+(shown.length?shown.map(historyGroup).join(''):`<div class="empty"><b>йӮ„жІ’жңүжӯ·еҸІиЁӮе–®</b>е®ҢжҲҗй»һйӨҗеҫҢпјҢиЁӮе–®жңғйЎҜзӨәеңЁйҖҷиЈЎгҖӮ</div>`)}
function openAdmin(){$('#modal').innerHTML=`<div class="modal"><div class="modalbox form"><h2>з®ЎзҗҶзҷ»е…Ҙ</h2><label>з®ЎзҗҶеҜҶзўј</label><input id="adminPassword" type="password" autocomplete="current-password" placeholder="и«Ӣијёе…Ҙз®ЎзҗҶеҜҶзўј" onkeydown="if(event.key==='Enter')doAdminLogin()"><div class="row" style="margin-top:16px"><button class="btn light" onclick="closeModal()">еҸ–ж¶Ҳ</button><button class="btn" onclick="doAdminLogin()">зҷ»е…Ҙ</button></div></div></div>`;setTimeout(()=>$('#adminPassword')?.focus(),0)}

function adminGroups(){const rows=[...data.groups].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));return `<h2 class="section-title">й–Ӣеңҳз®ЎзҗҶ</h2><div class="card form"><label>йҒёж“Үеә—е®¶</label><select id="gstore">${data.stores.map(s=>`<option value="${s.id}">${esc(s.name)}пјҲ${esc(s.category||'жңӘеҲҶйЎһ')}пјү</option>`).join('')||'<option value="">и«Ӣе…Ҳе»әз«Ӣеә—е®¶</option>'}</select><label>й–ӢеңҳиҖ…</label><input id="gcreator" maxlength="30" placeholder="и«Ӣијёе…Ҙй–ӢеңҳиҖ…е§“еҗҚ"><label>д»ҳж¬ҫиҖ…</label><input id="gpayee" maxlength="30" placeholder="и«Ӣијёе…Ҙж”¶ж¬ҫдәәе§“еҗҚ"><label>ж”¶е–®жҷӮй–“</label><input id="deadline" type="datetime-local"><button class="btn full" style="margin-top:14px" onclick="createGroup()">е»әз«Ӣж–°еңҳиіј</button></div><div class="card"><b>й–ӢеңҳзҙҖйҢ„</b>${rows.map(g=>`<div class="order"><b>${esc(store(g.storeId)?.name||'е·ІеҲӘйҷӨеә—е®¶')}</b><span class="pill ${isOpen(g)?'paid':'unpaid'}" style="float:right">${isOpen(g)?'й–Ӣж”ҫдёӯ':'е·Ізөҗжқҹ'}</span><div class="small">й–ӢеңҳиҖ…пјҡ${esc(g.creator||'жңӘеЎ«еҜ«')}гғ»д»ҳж¬ҫиҖ…пјҡ${esc(g.payee||'жңӘеЎ«еҜ«')}гғ»ж”¶е–® ${fmt(g.deadline)}</div><div class="adminlist" style="margin-top:8px"><button class="btn light smallbtn" onclick="editGroup('${g.id}')">з·ЁијҜ</button>${isOpen(g)?`<button class="btn dark smallbtn" onclick="manualClose('${g.id}')">з«ӢеҚіж”¶е–®</button>`:''}<button class="btn danger smallbtn" onclick="deleteGroup('${g.id}')">еҲӘйҷӨй–Ӣеңҳ</button></div></div>`).join('')||'<p class="small">е°ҡз„Ўй–ӢеңҳзҙҖйҢ„</p>'}</div>`}
function createGroup(){if(!data.stores.length)return alert('и«Ӣе…Ҳе»әз«Ӣеә—е®¶');const d=$('#deadline').value,creator=$('#gcreator').value.trim(),payee=$('#gpayee').value.trim();if(!creator)return alert('и«Ӣијёе…Ҙй–ӢеңҳиҖ…');if(!payee)return alert('и«Ӣијёе…Ҙд»ҳж¬ҫиҖ…');if(!d)return alert('и«ӢйҒёж“Үж”¶е–®жҷӮй–“');const iso=new Date(d).toISOString();if(new Date(iso)<=now())return alert('ж”¶е–®жҷӮй–“еҝ…й Ҳжҷҡж–јзҸҫеңЁ');data.groups.push({id:crypto.randomUUID(),storeId:$('#gstore').value,creator,payee,deadline:iso,createdAt:new Date().toISOString(),manualClosed:false});save();admin()}

function saveGroupEdit(id){const g=group(id),creator=$('#editCreator').value.trim(),payee=$('#editPayee').value.trim(),d=$('#editDeadline').value;if(!creator||!payee||!d)return alert('и«Ӣе®Ңж•ҙеЎ«еҜ«й–ӢеңҳиҖ…гҖҒд»ҳж¬ҫиҖ…иҲҮж”¶е–®жҷӮй–“');const iso=new Date(d).toISOString();if(new Date(iso)<=now())return alert('ж”¶е–®жҷӮй–“еҝ…й Ҳжҷҡж–јзҸҫеңЁ');g.creator=creator;g.payee=payee;g.deadline=iso;g.manualClosed=false;save();closeModal();admin()}

function deleteGroup(id){const related=data.orders.filter(o=>o.groupId===id).length;if(!confirm(`зўәе®ҡиҰҒеҲӘйҷӨйҖҷж¬Ўй–Ӣеңҳе—Һпјҹе°ҮеҗҢжӯҘеҲӘйҷӨ ${related} зӯҶиЁӮе–®иҲҮжӯ·еҸІиЁӮе–®иіҮж–ҷгҖӮ`))return;data.orders=data.orders.filter(o=>o.groupId!==id);data.groups=data.groups.filter(g=>g.id!==id);save();admin()}
function adminStores(){const categories=[...new Set(['йЈІж–ҷ','дё»йЈҹ',...data.stores.map(s=>s.category).filter(Boolean)])];const q=state.storeQuery||'',cat=state.storeCategory||'';const filtered=data.stores.filter(s=>(!q||(s.name+' '+s.note+' '+s.address+' '+s.items.map(i=>i.name).join(' ')).toLowerCase().includes(q.toLowerCase()))&&(!cat||s.category===cat));return `<h2 class="section-title">еә—е®¶иҲҮиҸңе–®</h2><div class="card form"><label>еә—е®¶еҗҚзЁұ</label><input id="sname" placeholder="дҫӢеҰӮпјҡеҘҪе‘ідҫҝз•¶"><div class="row"><div><label>еҲҶйЎһ</label><input id="scat" list="categoryList" placeholder="йЈІж–ҷгҖҒдё»йЈҹжҲ–иҮӘиЁӮеҲҶйЎһ"><datalist id="categoryList">${categories.map(x=>`<option value="${esc(x)}">`).join('')}</datalist></div><div><label>еә—е®¶йӣ»и©ұ</label><input id="sphone" type="tel" inputmode="tel" placeholder="дҫӢеҰӮпјҡ02-1234-5678"></div></div><label>еә—е®¶ең°еқҖ</label><input id="saddress" placeholder="дҫӢеҰӮпјҡеҸ°еҢ—еёӮдҝЎзҫ©еҚҖеёӮеәңи·Ҝ45иҷҹ"><div class="hint">ең°еқҖжңғиҮӘеӢ•её¶е…Ҙ Google ең°ең–пјҢдёҚйңҖиҰҒиЁӯе®ҡйҮ‘й‘°гҖӮ</div><label>еҸ–йӨҗж–№ејҸ</label><input id="smethod" placeholder="дҫӢеҰӮпјҡиҮӘеҸ–гҖҒеӨ–йҖҒгҖҒзҸҫе ҙд»ҳж¬ҫ"><label>й»һйӨҗеӮҷиЁ»</label><textarea id="snote" placeholder="иҫЈеәҰгҖҒеҸ–йӨҗең°й»һжҲ–е…¶д»–жҸҗйҶ’"></textarea><label>еҺҹе§ӢиҸңе–®пјҲPDFпјҸJPGпјҸPNGпјү</label><input type="file" accept=".pdf,image/jpeg,image/png" onchange="importMenu(this)"><div class="filehint" id="filehint">еҸҜйҒёпјҢжӘ”жЎҲдёҠйҷҗ 3.5MB</div><label>йӨҗй»һе…§е®№пјҲжҜҸиЎҢпјҡе“Ғй …/иҰҸж ј/еғ№ж јпјү</label><textarea id="sitems" placeholder="йӣһи…ҝйЈҜ/жӯЈеёё/120&#10;зҙ…иҢ¶/е°ҸжқҜ,еӨ§жқҜ/25,35&#10;е’–е•Ў/еҶ°гҖҒзҶұ/60"></textarea><div class="hint">иҰҸж јеҸҜз”ЁгҖҢйҖ—иҷҹгҖҒй “иҷҹжҲ– |гҖҚијёе…Ҙе…©зЁ®д»ҘдёҠпјӣеғ№ж јеҸҜијёе…Ҙе–®дёҖеғ№ж јпјҲеҘ—з”ЁжүҖжңүиҰҸж јпјүпјҢжҲ–з”ЁгҖҢйҖ—иҷҹгҖҒй “иҷҹжҲ– |гҖҚйҖҗдёҖе°ҚжҮүеӨҡеҖӢиҰҸж јгҖӮ</div><button class="btn full" style="margin-top:14px" onclick="createStore()">е„Іеӯҳеә—е®¶</button></div><div class="card"><div class="filters"><input aria-label="й—ңйҚөеӯ—жҹҘи©ў" placeholder="жҗңе°Ӣеә—е®¶гҖҒйӨҗй»һгҖҒеӮҷиЁ»жҲ–ең°еқҖ" value="${esc(q)}" oninput="state.storeQuery=this.value;admin()"><select aria-label="еҲҶйЎһжҹҘи©ў" onchange="state.storeCategory=this.value;admin()"><option value="">е…ЁйғЁеҲҶйЎһ</option>${categories.map(x=>`<option ${cat===x?'selected':''}>${esc(x)}</option>`).join('')}</select></div><b>е·Іе»әз«Ӣеә—е®¶пјҲ${filtered.length}пјү</b>${filtered.map(s=>`<div class="order"><b>${esc(s.name)}</b><span class="badge" style="float:right">${esc(s.category||'жңӘеҲҶйЎһ')}</span><div class="small">${s.items.length} еҖӢе“Ғй …гғ»${esc(s.phone||'жңӘеЎ«йӣ»и©ұ')}гғ»${esc(s.address||'жңӘеЎ«ең°еқҖ')}гғ»${esc(s.importName||'з„Ўйҷ„д»¶')}</div><div class="adminlist" style="margin-top:7px"><button class="btn light smallbtn" onclick="previewStore('${s.id}')">й җиҰҪ</button><button class="btn light smallbtn" onclick="editStore('${s.id}')">з·ЁијҜ</button><button class="btn danger smallbtn" onclick="deleteStore('${s.id}')">еҲӘйҷӨ</button></div></div>`).join('')||'<p class="small">жІ’жңүз¬ҰеҗҲжўқд»¶зҡ„еә—е®¶</p>'}</div>`}
function splitMulti(v){return String(v||'').split(/[гҖҒ,пјҢ|пҪң]/).map(x=>x.trim()).filter(Boolean)}
function parseItems(text){if(!/гҖҗ[^гҖ‘]+гҖ‘|е“Ғй …\s*[:пјҡ]|иҰҸж ј\s*[:пјҡ]/.test(text))return parseLegacyItems(text);let section='',current=null,items=[];for(const raw of text.split(/\r?\n/)){const line=raw.trim();if(!line)continue;const header=line.match(/^гҖҗ\s*(.*?)\s*гҖ‘$/);if(header){section=header[1];current=null;continue}const item=line.match(/^е“Ғй …\s*[:пјҡ]\s*(.*?)(?:\s*=\s*(\d+(?:\.\d+)?))?$/);if(item){current={name:item[1].trim(),section,price:Number(item[2]||0),specs:'е–®дёҖиҰҸж ј',optionGroups:[]};if(!current.name)return[];items.push(current);continue}if(/^иҰҸж ј\s*[:пјҡ]?$/.test(line))continue;const group=line.match(/^-\s*\[\s*(.*?)\s*\]\s*[:пјҡ]\s*(.*)$/);if(group&&current){const values=[],adjustments={};for(const part of splitMulti(group[2])){const [label,rawPrice]=part.split('=').map(x=>x.trim());if(!label)return[];values.push(label);if(rawPrice!==undefined){const n=Number(rawPrice.replace(/^\+/,''));if(!Number.isFinite(n))return[];adjustments[label]=n}}const pricing=/еғ№ж ј/.test(group[1])&&values.some(v=>Object.prototype.hasOwnProperty.call(adjustments,v)&&!String(group[2]).includes(v+'=+'));if(pricing&&values.some(v=>!Object.prototype.hasOwnProperty.call(adjustments,v)))return[];current.optionGroups.push({name:group[1],values,adjustments,pricing});continue}return[]}return items}
function parseLegacyItems(text){let section='',items=[];for(const raw of text.split(/\r?\n/)){const line=raw.trim();if(!line)continue;const header=line.match(/^\{\s*е°ҲеҚҖ\s*\}\s*=\s*\{\s*(.*?)\s*\}$/);if(header){section=header[1];continue}const parts=line.split('/');if(parts.length<3)return[];const name=parts.shift().trim(),specText=parts.shift().trim(),priceText=parts.join('/').trim(),specs=splitMulti(specText),prices=splitMulti(priceText).map(x=>Number(x.replace(/[^\d.]/g,'')));if(!name||!specs.length||!prices.length||prices.some(Number.isNaN)||(prices.length!==1&&prices.length!==specs.length))return[];items.push({name,section,specs:specs.join('гҖҒ'),price:prices[0],variants:specs.map((spec,i)=>({spec,price:prices.length===1?prices[0]:prices[i]}))})}return items}
function importMenu(el){const f=el.files[0];if(!f)return;if(f.size>3500000){alert('жӘ”жЎҲи«ӢеӢҝи¶…йҒҺ 3.5MB');el.value='';return}const reader=new FileReader();reader.onload=()=>{$('#filehint').textContent='е·ІйҒёж“Үпјҡ'+f.name;$('#filehint').dataset.file=f.name;$('#filehint').dataset.data=reader.result};reader.readAsDataURL(f)}
function createStore(){const name=$('#sname').value.trim(),raw=$('#sitems').value.trim(),items=parseItems(raw);if(!name)return alert('и«Ӣијёе…Ҙеә—е®¶еҗҚзЁұ');if(!items.length)return alert('йӨҗй»һж јејҸжңүиӘӨгҖӮи«Ӣдҫқз…§дёӢж–№иӘӘжҳҺијёе…Ҙе“Ғй …гҖҒиҰҸж јиҲҮеғ№ж јгҖӮ');const id=$('#sname').dataset.id||crypto.randomUUID(),old=store(id)||{};const rec={...old,id,name,category:$('#scat').value.trim()||'жңӘеҲҶйЎһ',phone:$('#sphone').value.trim(),address:$('#saddress').value.trim(),method:'',note:$('#snote').value.trim(),items,importName:$('#filehint').dataset.file||old.importName||'',importData:$('#filehint').dataset.data||old.importData||''};const i=data.stores.findIndex(s=>s.id===id);i<0?data.stores.push(rec):data.stores[i]=rec;save();state.storeQuery='';admin()}
function itemEditLine(item){const vs=variants(item);return `${item.name}/${vs.map(v=>v.spec).join(',')}/${vs.map(v=>v.price).join(',')}`}
function editStore(id){const s=store(id);state.adminTab=1;state.storeQuery='';state.storeCategory='';admin();$('#sname').value=s.name;$('#sname').dataset.id=s.id;$('#scat').value=s.category||'';$('#sphone').value=s.phone||'';$('#saddress').value=s.address||'';$('#smethod').value='';$('#snote').value=s.note||'';$('#sitems').value=s.items.map(item=>{const groups=optionGroups(item);if(item.priceByOption){const basic=groups.filter(g=>g.name!=='е®№йҮҸ').map(g=>`(${g.name}пјӣ${g.values.join(',')})`).join(',');const cap=groups.find(g=>g.name==='е®№йҮҸ');return `=${item.name}/${basic}/[${cap.values.join(',')}]/${cap.values.map(v=>item.priceByOption.prices[v]).join(',')}`}return `${item.section?`{е°ҲеҚҖ}={${item.section}}\n`:''}${itemEditLine(item)}`}).join('\n');$('#filehint').textContent=s.importName?'зӣ®еүҚйҷ„д»¶пјҡ'+s.importName:'еҸҜйҒёпјҢжӘ”жЎҲдёҠйҷҗ 3.5MB';$('#filehint').dataset.file=s.importName||'';$('#filehint').dataset.data=s.importData||'';window.scrollTo({top:0,behavior:'smooth'})}

function pastOrdersAdmin(){const groups=[...data.groups].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));let last='';return groups.map(g=>{const d=localDate(g.createdAt),heading=d!==last?`<h3 class="date-heading">${fmt(g.createdAt,false)}</h3>`:'';last=d;return heading+adminGroupCard(g)}).join('')||'<div class="empty">е°ҡз„ЎйҒҺеҫҖй–ӢеңҳиЁӮе–®</div>'}

function serializeBlockItems(items){let section=null,lines=[];for(const item of items){if(item.section!==section){section=item.section;lines.push(`гҖҗ${section||'жңӘеҲҶйЎһ'}гҖ‘`)}if(!optionGroups(item).length){lines.push(`${item.name}/${variants(item).map(v=>v.spec).join(',')}/${variants(item).map(v=>v.price).join(',')}`);continue}lines.push(`е“Ғй …пјҡ${item.name}${item.price?` = ${item.price}`:''}`,'иҰҸж ј:');optionGroups(item).forEach(g=>{const choices=g.values.map(v=>{if(!Object.prototype.hasOwnProperty.call(g.adjustments||{},v))return v;const n=g.adjustments[v];return `${v}=${g.pricing?n:`+${n}`}`}).join(', ');lines.push(`- [${g.name}]пјҡ${choices}`)})}return lines.join('\n')}

 if(items.some(x=>!x.name))return alert('и«Ӣе®Ңж•ҙеЎ«еҜ«жҜҸдёҖзӯҶе“Ғй …');

 const newOrder={id:crypto.randomUUID(),groupId:g.id,buyer,items,total:items.reduce((a,x)=>a+x.qty*x.price,0),paid:false,createdAt:new Date().toISOString()};

let orderSubmitting=false;
const submitOrderCore=submitOrder;
submitOrder=async function(){
  if(orderSubmitting)return;
  orderSubmitting=true;
  const btn=document.activeElement?.closest?.('button');
  const oldText=btn?.textContent;
  if(btn){btn.disabled=true;btn.textContent='йҖҒеҮәдёӯвҖҰ'}
  try{await submitOrderCore()}
  finally{orderSubmitting=false;if(btn&&document.body.contains(btn)){btn.disabled=false;btn.textContent=oldText||'йҖҒеҮәиЁӮе–®'}}
};

  if(btn){btn.disabled=true;btn.textContent='йҖҒеҮәдёӯвҖҰ'}

function historyTickerMessages(groups){
  const activeGroups=groups.filter(isOpen).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const activeMessages=activeGroups.map(groupItem=>{
    const storeName=store(groupItem.storeId)?.name||'еә—е®¶',deadline=new Date(groupItem.deadline),remaining=deadline.getTime()-Date.now(),date=`${deadline.getMonth()+1}/${deadline.getDate()}`;
    if(remaining<=10*60*1000)return `рҹҡЁ ${storeName} ${date} еҚіе°ҮжҲӘжӯў йҖҹйҖҹйҖҒе–®!`;
    const time=deadline.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:false});
    return `рҹ“ў ${storeName} ${date} ${time} ж”¶е–®`;
  });
  const unpaidGroups=groups.filter(groupItem=>!isOpen(groupItem)&&data.orders.some(order=>order.groupId===groupItem.id&&!order.paid));
  const payees=[...new Set(unpaidGroups.map(groupItem=>groupItem.payee?.trim()).filter(Boolean))];
  const paymentMessages=unpaidGroups.length===1
    ?[`${store(unpaidGroups[0].storeId)?.name||'еә—е®¶'} рҹ’°д»ҳж¬ҫдәәпјҡ${unpaidGroups[0].payee?.trim()||'жңӘеЎ«еҜ«'}`]
    :payees.length===1?[`рҹ’°д»ҳж¬ҫдәәпјҡ${payees[0]}`]:unpaidGroups.map(groupItem=>`${store(groupItem.storeId)?.name||'еә—е®¶'} рҹ’°д»ҳж¬ҫдәәпјҡ${groupItem.payee?.trim()||'жңӘеЎ«еҜ«'}`);
  if(activeMessages.length||paymentMessages.length)return [...activeMessages,...paymentMessages];
  return groups.length?['лҒқ'.repeat(18)]:[];
}
function wantedHtml(orders,groups){
  historyTickerGroups=groups||data.groups.filter(groupItem=>orders.some(order=>order.groupId===groupItem.id));
  const messages=historyTickerMessages(historyTickerGroups);if(!messages.length)return '';
  return `<div class="wanted" data-history-ticker="1">${esc(messages[historyTickerIndex%messages.length])}</div>`;
}

/* PWA stability, offline queue and visible sync state */
const PENDING_KEY=KEY+'-pending';
let isSyncing=false, toastTimer=null;
function toast(message){const el=$('#toast');if(!el)return;el.textContent=message;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2600)}
function setSyncStatus(kind,text){const el=$('#syncStatus');if(!el)return;el.className='sync-status '+kind;el.textContent=text;el.title=kind==='ok'?'иіҮж–ҷе·ІиҲҮйӣІз«ҜеҗҢжӯҘ':'й»һж“ҠйҮҚж–°еҗҢжӯҘ'}
function lightweightData(source){return normalize({...source,stores:(source.stores||[]).map(st=>{const files=(st.menuFiles||[]).map(f=>({name:f.name,data:/^https?:\/\//i.test(String(f.data||''))?f.data:''}));return {...st,importData:/^https?:\/\//i.test(String(st.importData||''))?st.importData:'',menuFiles:files}})})}
function persistLocal(){
  const full=JSON.stringify(data);
  try{localStorage.setItem(KEY,full);return true}catch(err){
    try{localStorage.setItem(KEY,JSON.stringify(lightweightData(data)));return false}catch(e){console.warn('жң¬ж©ҹе„ІеӯҳеӨұж•—',e);return false}
  }
}
save=function(){
  data=normalize(data);persistLocal();localStorage.setItem(PENDING_KEY,'1');setSyncStatus(navigator.onLine?'warn':'error',navigator.onLine?'еҫ…еҗҢжӯҘ':'йӣўз·ҡжҡ«еӯҳ');
  clearTimeout(syncTimer);syncTimer=setTimeout(pushShared,250);return true;
};
pushShared=async function(){
  if(isSyncing)return false;
  if(!navigator.onLine){setSyncStatus('error','йӣўз·ҡжҡ«еӯҳ');return false}
  isSyncing=true;setSyncStatus('warn','еҗҢжӯҘдёӯ');
  try{
    const r=await fetch(SUPABASE_URL+'/rest/v1/together_order_state?id=eq.shared',{method:'PATCH',headers:{...headers,'Prefer':'return=minimal'},body:JSON.stringify({payload:data,updated_at:new Date().toISOString()})});
    if(!r.ok)throw new Error(await r.text());
    localStorage.removeItem(PENDING_KEY);persistLocal();setSyncStatus('ok','е·ІеҗҢжӯҘ');return true;
  }catch(e){console.warn('йӣІз«ҜеҗҢжӯҘжҡ«жҷӮеӨұж•—',e);setSyncStatus('error','еҗҢжӯҘеӨұж•—');return false}
  finally{isSyncing=false}
};
loadSharedState=async function(force=false){
  if(!navigator.onLine){setSyncStatus('error','йӣўз·ҡжЁЎејҸ');render();return}
  if(localStorage.getItem(PENDING_KEY)==='1'&&!force){await pushShared();return}
  setSyncStatus('warn','жӣҙж–°дёӯ');
  try{
    const r=await fetch(SUPABASE_URL+'/rest/v1/together_order_state?id=eq.shared&select=payload,updated_at',{headers,cache:'no-store'});
    if(!r.ok)throw new Error(await r.text());
    const rows=await r.json();
    if(rows[0]?.payload){data=normalize(rows[0].payload);persistLocal()}
    else await fetch(SUPABASE_URL+'/rest/v1/together_order_state',{method:'POST',headers:{...headers,'Prefer':'return=minimal'},body:JSON.stringify({id:'shared',payload:data})});
    setSyncStatus('ok','е·Іжӣҙж–°');render();
  }catch(e){console.warn('зӣ®еүҚдҪҝз”Ёжң¬ж©ҹиіҮж–ҷ',e);setSyncStatus('error','дҪҝз”Ёйӣўз·ҡиіҮж–ҷ');render()}
};
async function manualSync(){if(localStorage.getItem(PENDING_KEY)==='1')await pushShared();else await loadSharedState(true)}
window.addEventListener('online',async()=>{toast('з¶Іи·Ҝе·ІжҒўеҫ©пјҢжӯЈеңЁеҗҢжӯҘ');await manualSync()});
window.addEventListener('offline',()=>{setSyncStatus('error','йӣўз·ҡжЁЎејҸ');toast('зӣ®еүҚйӣўз·ҡпјҢж“ҚдҪңжңғе…Ҳжҡ«еӯҳеңЁжң¬ж©ҹ')});
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&navigator.onLine)manualSync()});

function setBusy(button,busy,label='иҷ•зҗҶдёӯвҖҰ'){if(!button)return;button.disabled=busy;if(busy){button.dataset.oldText=button.textContent;button.textContent=label}else if(button.dataset.oldText){button.textContent=button.dataset.oldText;delete button.dataset.oldText}}
const createStoreStable=createStore;
createStore=function(ev){const btn=ev?.currentTarget||document.activeElement?.closest?.('button');setBusy(btn,true,'е„ІеӯҳдёӯвҖҰ');try{createStoreStable();toast('еә—е®¶е·Іе„ІеӯҳпјҢжӯЈеңЁеҗҢжӯҘ')}catch(e){console.error(e);alert('е„ІеӯҳеӨұж•—пјҡ'+(e.message||'и«ӢзЁҚеҫҢйҮҚи©Ұ'))}finally{setBusy(btn,false)}};
const createGroupStable=createGroup;
createGroup=function(){const btn=event?.currentTarget;setBusy(btn,true,'е»әз«ӢдёӯвҖҰ');try{createGroupStable();toast('й–Ӣеңҳе·Іе»әз«ӢпјҢжӯЈеңЁеҗҢжӯҘ')}catch(e){console.error(e);alert('е»әз«ӢеӨұж•—пјҡ'+(e.message||'и«ӢзЁҚеҫҢйҮҚи©Ұ'))}finally{setBusy(btn,false)}};

async function optimizeMenuFile(file){
  if(!file.type.startsWith('image/'))return file;
  if(file.size<900000)return file;
  try{
    const bitmap=await createImageBitmap(file),max=1800,scale=Math.min(1,max/Math.max(bitmap.width,bitmap.height));
    const canvas=document.createElement('canvas');canvas.width=Math.round(bitmap.width*scale);canvas.height=Math.round(bitmap.height*scale);
    canvas.getContext('2d',{alpha:false}).drawImage(bitmap,0,0,canvas.width,canvas.height);bitmap.close?.();
    const blob=await new Promise(resolve=>canvas.toBlob(resolve,'image/jpeg',.78));
    return blob?new File([blob],file.name.replace(/\.[^.]+$/,'.jpg'),{type:'image/jpeg'}):file;
  }catch(e){return file}
}
importMenus=async function(el){
  let files=[...el.files];if(!files.length)return;
  setSyncStatus('warn','иҷ•зҗҶиҸңе–®');files=await Promise.all(files.map(optimizeMenuFile));
  if(files.some(f=>f.size>3500000)){alert('жҜҸеҖӢжӘ”жЎҲи«ӢеӢҝи¶…йҒҺ 3.5MB');el.value='';return}
  const current=pendingMenuFiles(),incoming=await Promise.all(files.map(f=>new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve({name:f.name,data:r.result});r.onerror=reject;r.readAsDataURL(f)})));
  const all=[...current,...incoming],total=all.reduce((n,f)=>n+(f.data?.length||0),0);
  if(total>7000000){alert('иҸңе–®йҷ„д»¶зёҪе®№йҮҸйҒҺеӨ§пјҢи«Ӣжёӣе°‘жӘ”жЎҲжҲ–ж”№з”Ёијғе°Ҹең–зүҮгҖӮ');el.value='';setSyncStatus('error','йҷ„д»¶йҒҺеӨ§');return}
  $('#filehint').dataset.files=JSON.stringify(all);el.value='';renderPendingMenuFiles();setSyncStatus(navigator.onLine?'ok':'error',navigator.onLine?'иҸңе–®е·Іијүе…Ҙ':'йӣўз·ҡжЁЎејҸ');
};
importMenu=function(el){importMenus(el)};

if(navigator.onLine)setSyncStatus('warn','йҖЈз·ҡдёӯ');else setSyncStatus('error','йӣўз·ҡжЁЎејҸ');

</script>

  function builderToText(){
    const lines=[];
    for(const b of ensureBuilder()){
      const title=cleanText(b.title); if(title)lines.push(`гҖҗ${title}гҖ‘`);
      for(const it of b.items){
        const name=cleanText(it.name); if(!name)throw new Error('жҜҸеҖӢе“Ғй …йғҪеҝ…й ҲеЎ«еҜ«еҗҚзЁұ');
        const prices=it.priceRows.map(r=>({label:cleanText(r.label),price:cleanText(r.price)}));
        if(!prices.length||prices.some(r=>!r.label||r.price===''))throw new Error(`гҖҢ${name}гҖҚзҡ„еҲҶйҮҸиҲҮеғ№ж је°ҡжңӘеЎ«еҜ«е®Ңж•ҙ`);
        if(prices.some(r=>!Number.isFinite(Number(r.price))||Number(r.price)<0))throw new Error(`гҖҢ${name}гҖҚзҡ„еғ№ж јж јејҸдёҚжӯЈзўә`);
        lines.push(`е“Ғй …пјҡ${name}`,'иҰҸж јпјҡ',`- [еҲҶйҮҸиҲҮеғ№ж ј]пјҡ${prices.map(r=>`${r.label}=${Number(r.price)}`).join(', ')}`);
        for(const g of it.groups){
          const gn=cleanText(g.name); if(!gn)throw new Error(`гҖҢ${name}гҖҚжңүе…¶д»–иҰҸж је°ҡжңӘеЎ«еҜ«ж¬„дҪҚеҗҚзЁұ`);
          const rows=g.rows.map(r=>({label:cleanText(r.label),price:cleanText(r.price)}));
          if(rows.some(r=>!r.label))throw new Error(`гҖҢ${name}гҖҚзҡ„гҖҢ${gn}гҖҚйҒёй …еҗҚзЁұе°ҡжңӘеЎ«еҜ«е®Ңж•ҙ`);
          if(g.noPrice){
            lines.push(`- [${gn}]пјҡ${rows.map(r=>r.label).join(', ')}`);
          }else{
            if(rows.some(r=>r.price===''))throw new Error(`гҖҢ${name}гҖҚзҡ„гҖҢ${gn}гҖҚеҠ еғ№е°ҡжңӘеЎ«еҜ«е®Ңж•ҙ`);
            if(rows.some(r=>!Number.isFinite(Number(r.price))||Number(r.price)<0))throw new Error(`гҖҢ${name}гҖҚзҡ„гҖҢ${gn}гҖҚеҠ еғ№ж јејҸдёҚжӯЈзўә`);
            lines.push(`- [${gn}]пјҡ${rows.map(r=>`${r.label}=+${Number(r.price)}`).join(', ')}`);
          }
        }
      }
    }
    return lines.join('\n');
  }
  function itemsToBuilder(items){
    const blocks=[];let lastSection=Symbol('none'),block;
    for(const item of (items||[])){
      const sec=item.section||'';
      if(sec!==lastSection){block=blankBlock(sec);block.items=[];blocks.push(block);lastSection=sec}
      const priceGroup=(item.optionGroups||[]).find(g=>g.pricing)||(item.optionGroups||[]).find(g=>/еғ№ж ј/.test(g.name));
      const it=blankItem();it.name=item.name||'';it.notice=item.notice||'';
      if(priceGroup){it.priceRows=priceGroup.values.map(v=>({id:uid(),label:v,price:String(priceGroup.adjustments?.[v]??0)}))}
      else {it.priceRows=[{id:uid(),label:item.specs||'е–®дёҖиҰҸж ј',price:String(item.price??0)}]}
      it.groups=(item.optionGroups||[]).filter(g=>g!==priceGroup).map(g=>{const vals=g.values||[],hasAnyPrice=vals.some(v=>Object.prototype.hasOwnProperty.call(g.adjustments||{},v));return {id:uid(),name:g.name||'',noPrice:!hasAnyPrice,required:g.required!==false,collapsed:false,rows:vals.map(v=>({id:uid(),label:v,price:hasAnyPrice?String(g.adjustments?.[v]??0):''}))}});
      block.items.push(it);
    }
    return blocks.length?blocks:[blankBlock('')];
  }

<script id="v12-2-store-draft-autosave">
(()=>{
  const DRAFT_KEY=(typeof KEY==='string'?KEY:'together-order')+'-store-form-draft-v2';
  let draftTimer=null, restoringDraft=false, suppressDraft=false;
  const clone=v=>{try{return structuredClone(v)}catch(_){return JSON.parse(JSON.stringify(v))}};
  const fieldValue=id=>document.querySelector('#'+id)?.value??'';

  function isStoreFormOpen(){
    return state?.page==='admin'&&state?.adminTab===1&&!!document.querySelector('#sname');
  }
  function currentDraft(){
    if(!isStoreFormOpen())return null;
    const filehint=document.querySelector('#filehint');
    return {
      savedAt:Date.now(),
      editId:document.querySelector('#sname')?.dataset?.id||'',
      mode:state.storeBuildMode||'full',
      fields:{
        name:fieldValue('sname'),category:fieldValue('scat'),phone:fieldValue('sphone'),
        address:fieldValue('saddress'),method:fieldValue('smethod'),note:fieldValue('snote'),
        menuNotice:fieldValue('smenuNotice'),externalLinks:fieldValue('externalMenuLinks')
      },
      menuBuilder:Array.isArray(state.menuBuilder)?clone(state.menuBuilder):null,
      // йҷ„д»¶е…§е®№еҸҜиғҪеҫҲеӨ§пјҢдёҚеҜ«е…ҘиҚүзЁҝпјӣе·Іе„Іеӯҳеә—е®¶зҡ„еҺҹйҷ„д»¶дёҚеҸ—еҪұйҹҝгҖӮ
      fileNames:(()=>{try{return JSON.parse(filehint?.dataset?.files||'[]').map(f=>f.name||'иҸңе–®')}catch(_){return []}})()
    };
  }
  function saveStoreDraft(){
    if(restoringDraft||suppressDraft)return;
    const draft=currentDraft();if(!draft)return;
    const hasContent=draft.editId||Object.values(draft.fields).some(v=>String(v).trim())||
      String(draft.fields.menuNotice||'').trim()||String(draft.fields.externalLinks||'').trim()||
      draft.menuBuilder?.some(b=>String(b.title||'').trim()||b.items?.some(i=>String(i.name||'').trim()||i.priceRows?.some(r=>String(r.label||'').trim()||String(r.price||'').trim())||i.groups?.length));
    try{
      if(hasContent)localStorage.setItem(DRAFT_KEY,JSON.stringify(draft));
      else localStorage.removeItem(DRAFT_KEY);
    }catch(e){console.warn('еә—е®¶иҚүзЁҝжҡ«еӯҳеӨұж•—',e)}
  }
  function scheduleDraft(){clearTimeout(draftTimer);draftTimer=setTimeout(saveStoreDraft,180)}
  function readDraft(){try{return JSON.parse(localStorage.getItem(DRAFT_KEY)||'null')}catch(_){return null}}
  function clearStoreDraft(){clearTimeout(draftTimer);localStorage.removeItem(DRAFT_KEY)}

  function restoreStoreDraft(){
    if(!isStoreFormOpen())return;
    const d=readDraft();if(!d)return;
    restoringDraft=true;
    try{
      state.storeBuildMode=d.mode||'full';
      const set=(id,v)=>{const el=document.querySelector('#'+id);if(el)el.value=v??''};
      set('sname',d.fields?.name);set('scat',d.fields?.category);set('sphone',d.fields?.phone);
      set('saddress',d.fields?.address);set('smethod',d.fields?.method);set('snote',d.fields?.note);
      set('smenuNotice',d.fields?.menuNotice);set('externalMenuLinks',d.fields?.externalLinks);
      window.restoreExternalMenuLinkRows?.(d.fields?.externalLinks||'');
      const name=document.querySelector('#sname');if(name){if(d.editId)name.dataset.id=d.editId;else delete name.dataset.id}
      if(Array.isArray(d.menuBuilder)&&d.menuBuilder.length){state.menuBuilder=clone(d.menuBuilder);window.renderMenuBuilder?.()}
      window.setStoreBuildMode?.(state.storeBuildMode);
      const hint=document.querySelector('#filehint');
      if(hint&&d.fileNames?.length&&!hint.dataset.files)hint.insertAdjacentHTML('beforeend',`<div class="builder-muted">е…ҲеүҚйҒёж“Үзҡ„йҷ„д»¶йңҖйҮҚж–°йҒёеҸ–пјҡ${d.fileNames.map(esc).join('гҖҒ')}</div>`);
    }finally{restoringDraft=false}
  }

  document.addEventListener('input',e=>{if(e.target.closest?.('#view')&&isStoreFormOpen())scheduleDraft()},true);
  document.addEventListener('change',e=>{if(e.target.closest?.('#view')&&isStoreFormOpen())scheduleDraft()},true);
  document.addEventListener('visibilitychange',()=>{if(document.hidden)saveStoreDraft();else setTimeout(restoreStoreDraft,80)},true);
  window.addEventListener('pagehide',saveStoreDraft,{capture:true});
  window.addEventListener('beforeunload',saveStoreDraft,{capture:true});
  window.addEventListener('pageshow',()=>setTimeout(restoreStoreDraft,80));

  // жүҖжңүж¬„дҪҚејҸз·ЁијҜеҷЁж“ҚдҪңеҫҢд№ҹз«ӢеҚідҝқеӯҳпјҢеҢ…еҗ«ж–°еўһпјҸеҲӘйҷӨпјҸиӨҮиЈҪиҰҸж јгҖӮ
  const builderFns=['builderSetBlock','builderSetItem','builderSetPrice','builderSetGroup','builderToggleGroupCollapse','builderMoveGroup','builderToggleGroupNoPrice','builderSetGroupRow','builderAddPriceRow','builderRemovePrice','builderAddGroup','builderRemoveGroup','builderAddGroupRow','builderRemoveGroupRow','builderAddItem','builderRemoveItem','builderAddBlockAfter','builderRemoveBlock'];
  setTimeout(()=>builderFns.forEach(name=>{const fn=window[name];if(typeof fn!=='function'||fn.__draftWrapped)return;const wrapped=function(...args){const r=fn.apply(this,args);scheduleDraft();return r};wrapped.__draftWrapped=true;window[name]=wrapped}),0);

  const previousAdmin=window.admin;
  window.admin=function(...args){const r=previousAdmin.apply(this,args);if(state.adminTab===1)setTimeout(restoreStoreDraft,40);return r};

  const previousEdit=window.editStore;
  window.editStore=function(id,...args){
    suppressDraft=true;clearStoreDraft();
    try{return previousEdit.call(this,id,...args)}finally{suppressDraft=false;setTimeout(saveStoreDraft,120)}
  };

  const previousCreate=window.createStore;
  window.createStore=function(...args){
    saveStoreDraft();
    const before=(data.stores||[]).map(s=>s.id+'|'+s.name+'|'+(s.items?.length||0)).join('~');
    const r=previousCreate.apply(this,args);
    const after=(data.stores||[]).map(s=>s.id+'|'+s.name+'|'+(s.items?.length||0)).join('~');
    if(after!==before||!document.querySelector('#sname')){suppressDraft=true;clearStoreDraft();state.menuBuilder=null;setTimeout(()=>{suppressDraft=false},0)}
    return r;
  };

  window.clearStoreDraft=clearStoreDraft;
  setTimeout(restoreStoreDraft,120);
})();
</script>

<script id="form-navigation-behavior">

(()=>{
  let lastAdminTab=state.adminTab;

  };

  document.addEventListener('input',event=>{
    if(event.target.matches?.('#gcreator,#gpayee,#gmessage,#deadline'))captureGroupDraft();
  },true);
  document.addEventListener('change',event=>{
    if(event.target.matches?.('#gstore,#deadline'))captureGroupDraft();
  },true);

  const previousGo=window.go;
  window.go=function(page,...args){
    if(state.page==='admin'){
      captureGroupDraft();
      if(page!=='admin')lastAdminTab=-1;
    }
    return previousGo.call(this,page,...args);
  };

  const previousAdmin=window.admin;
  window.admin=function(...args){
    const enteringStore=state.adminTab===1&&lastAdminTab!==1;
    if(enteringStore){
      window.clearStoreDraft?.();
      state.storeBuildMode='full';
      state.menuBuilder=typeof blankBlock==='function'?[blankBlock('')]:null;
    }
    const result=previousAdmin.apply(this,args);
    if(state.adminTab===0)restoreGroupDraft();
    lastAdminTab=state.adminTab;
    return result;
  };

  const previousCreateGroup=window.createGroup;
  window.createGroup=function(...args){
    const before=data.groups.length;
    const result=previousCreateGroup.apply(this,args);
    if(data.groups.length!==before){
      delete state.groupFormDraft;
      window.admin();
    }
    return result;
  };
})();
</script>

<script id="mobile-category-tabs-fixed-fallback">
/* Safari can ignore sticky inside an app shell; pin the category row directly on small screens. */
(()=>{
  let placeholder=null,pinnedHost=null,raf=0;
  const isMobile=()=>window.matchMedia('(max-width:767px)').matches;
  const clear=()=>{
    if(pinnedHost){
      pinnedHost.classList.remove('mobile-tabs-pinned');
      ['position','top','left','width'].forEach(key=>pinnedHost.style.removeProperty(key));
    }
    placeholder?.remove();placeholder=null;pinnedHost=null;
  };
  const pin=()=>{
    raf=0;
    const host=document.querySelector('#tabs.mobile-menu-tabs-host');
    const header=document.querySelector('.top');
    if(!isMobile()||state.page!=='menu'||!host||!header){clear();return}
    if(document.querySelector('#modal .menu-preview-modal')){
      clear();
      host.classList.add('mobile-tabs-suspended');
      return;
    }
    host.classList.remove('mobile-tabs-suspended');
    if(pinnedHost&&pinnedHost!==host)clear();
    const anchor=placeholder||host;
    const headerBottom=header.getBoundingClientRect().bottom;
    const rect=anchor.getBoundingClientRect();
    if(!placeholder&&rect.top<=headerBottom){
      placeholder=document.createElement('div');
      placeholder.style.height=rect.height+'px';
      placeholder.style.width='100%';
      host.parentNode.insertBefore(placeholder,host);
      pinnedHost=host;
    }
    if(placeholder){
      const space=placeholder.getBoundingClientRect();
      if(space.top>headerBottom+1){clear();return}
      const app=document.querySelector('.app')?.getBoundingClientRect()||{left:0,width:window.innerWidth};
      host.classList.add('mobile-tabs-pinned');
      host.style.setProperty('position','fixed','important');
      host.style.setProperty('top',Math.max(0,Math.round(headerBottom))+'px','important');
      host.style.setProperty('left',Math.round(app.left)+'px','important');
      host.style.setProperty('width',Math.round(app.width)+'px','important');
    }
  };
  const queue=()=>{if(!raf)raf=requestAnimationFrame(pin)};
  window.addEventListener('scroll',queue,{passive:true});
  document.addEventListener('scroll',queue,{passive:true,capture:true});
  window.addEventListener('resize',queue,{passive:true});
  window.visualViewport?.addEventListener('scroll',queue,{passive:true});
  window.visualViewport?.addEventListener('resize',queue,{passive:true});
  document.addEventListener('click',()=>setTimeout(queue,0),true);
  setInterval(queue,450);
})();
</script>
<script id="multi-user-order-sync">
/* Optional Supabase multi-user mode. It activates after supabase-multiuser-setup.sql is run. */
(()=>{
  const ORDERS_TABLE='together_order_orders', OWNED_KEY=KEY+'-owned-order-ids';
  let enabled=false, syncBase=null, realtimeClient=null, realtimeReady=false;
  const clone=value=>JSON.parse(JSON.stringify(value));
  const cloudState=value=>{const out=clone(value);out.orders=[];return out};
  const owned=()=>{try{return JSON.parse(localStorage.getItem(OWNED_KEY)||'{}')}catch(_){return {}}};
  const isOwned=id=>!!owned()[id];
  const rememberOwn=id=>{const ids=owned();ids[id]=true;localStorage.setItem(OWNED_KEY,JSON.stringify(ids))};
  const canRerender=()=>{
    const editing=document.activeElement?.matches?.('input,textarea,select');
    return state.page!=='order'&&!(state.page==='admin'&&state.adminTab===0&&editing);
  };
  const api=path=>SUPABASE_URL+'/rest/v1/'+path;
  const request=async(path,options={})=>{
    const response=await fetch(api(path),{...options,headers:{...headers,...(options.headers||{})}});
    if(!response.ok)throw new Error(await response.text());
    return response;
  };
  async function reloadOrders(shouldRender=true){
    const response=await request(`${ORDERS_TABLE}?select=order_data&order=created_at.desc`,{cache:'no-store'});
    const rows=await response.json();
    data.orders=dedupeOrders(rows.map(row=>row.order_data).filter(Boolean));
    persistLocal();
    if(shouldRender&&canRerender())render();
  }
  function applyOrderChange(change){
    const type=change?.eventType,id=change?.old?.id||change?.new?.id;
    if(type==='DELETE'){data.orders=data.orders.filter(order=>order.id!==id)}
    else if(change?.new?.order_data){
      const next=change.new.order_data;
      data.orders=dedupeOrders([next,...data.orders.filter(order=>order.id!==next.id)]);
    }else{return reloadOrders(true)}
    persistLocal();if(canRerender())render();
  }
  function applyStateChange(change){
    const payload=change?.new?.payload;
    if(!payload)return loadSharedState(true);
    data={...normalize(payload),orders:data.orders};syncBase=cloudState(data);persistLocal();
    if(canRerender())render();
  }
  const legacySave=save, legacyPush=pushShared, legacyLoad=loadSharedState;
  save=function(){
    if(!enabled)return legacySave();
    data=normalize(data);persistLocal();localStorage.setItem(PENDING_KEY,'1');
    setSyncStatus(navigator.onLine?'warn':'error',navigator.onLine?'еҫ…еҗҢжӯҘ':'йӣўз·ҡжҡ«еӯҳ');
    clearTimeout(syncTimer);syncTimer=setTimeout(async()=>{
      const synced=await pushShared();
      if(!synced&&localStorage.getItem(PENDING_KEY)==='1')setTimeout(()=>{if(!isSyncing)pushShared()},900);
    },0);return true;
  };
  pushShared=async function(){
    if(!enabled)return legacyPush();
    if(isSyncing||!navigator.onLine)return false;
    isSyncing=true;setSyncStatus('warn','еҗҢжӯҘдёӯ');
    try{
      const response=await fetch(api('rpc/merge_together_order_state'),{method:'POST',headers,body:JSON.stringify({p_base:syncBase||cloudState(data),p_next:cloudState(data)})});
      if(!response.ok)throw new Error(await response.text());
      const payload=normalize(await response.json());
      data={...payload,orders:data.orders};syncBase=cloudState(data);persistLocal();localStorage.removeItem(PENDING_KEY);setSyncStatus('ok','е·ІеҗҢжӯҘ');return true;
    }catch(error){console.warn('еӨҡдәәеҗҢжӯҘеӨұж•—',error);setSyncStatus('error','еҗҢжӯҘеӨұж•—');return false}
    finally{isSyncing=false}
  };
  loadSharedState=async function(force=false){
    if(!enabled)return legacyLoad(force);
    if(!navigator.onLine){setSyncStatus('error','йӣўз·ҡжЁЎејҸ');return}
    if(localStorage.getItem(PENDING_KEY)==='1'&&!force){await pushShared();return}
    try{
      const response=await request('together_order_state?id=eq.shared&select=payload',{cache:'no-store'});
      const rows=await response.json();
      if(rows[0]?.payload){data={...normalize(rows[0].payload),orders:data.orders};syncBase=cloudState(data)}
      await reloadOrders(false);setSyncStatus('ok','е·Іжӣҙж–°');if(canRerender())render();
    }catch(error){console.warn('и®ҖеҸ–еӨҡдәәиіҮж–ҷеӨұж•—',error);setSyncStatus('error','дҪҝз”Ёйӣўз·ҡиіҮж–ҷ')}
  };
  manualSync=async function(){if(enabled){if(localStorage.getItem(PENDING_KEY)==='1')await pushShared();else await loadSharedState(true)}else return (localStorage.getItem(PENDING_KEY)==='1'?legacyPush():legacyLoad(true))};

  async function insertOrder(order){
    try{
      await request(ORDERS_TABLE,{method:'POST',headers:{Prefer:'return=minimal'},body:JSON.stringify({id:order.id,group_id:order.groupId,buyer:order.buyer,order_data:order,created_at:order.createdAt,updated_at:new Date().toISOString()})});
    }catch(error){
      if(!String(error.message).includes('duplicate key'))throw error;
    }
    data.orders=dedupeOrders([order,...data.orders]);rememberOwn(order.id);persistLocal();
  }
  async function patchOrder(order){
    await request(`${ORDERS_TABLE}?id=eq.${encodeURIComponent(order.id)}`,{method:'PATCH',headers:{Prefer:'return=minimal'},body:JSON.stringify({buyer:order.buyer,order_data:order,updated_at:new Date().toISOString()})});
    data.orders=data.orders.map(item=>item.id===order.id?order:item);persistLocal();
  }
  function buildMenuOrder(){
    const g=group(state.group),s=g&&store(g.storeId);if(!g||!s||!isOpen(g))throw new Error('йҖҷеҖӢеңҳиіје·Із¶“зөҗжқҹ');
    const buyer=$('#buyer')?.value.trim()||state.buyer?.trim();if(!buyer)throw new Error('и«Ӣијёе…ҘиЁӮиіјдәә');
    const items=s.items.flatMap((item,index)=>{const cart=cartEntry(item,index);if(!cart.q)return[];const groups=optionGroups(item),variant=variants(item)[cart.variant];return [{name:item.name,spec:groups.length?groups.map(gr=>`${gr.name}:${cart.options[gr.name]}`).join('гҖҒ'):variant.spec,qty:cart.q,price:groups.length?selectedPrice(item,cart):variant.price}]});
    if(!items.length)throw new Error('и«ӢиҮіе°‘йҒёж“ҮдёҖд»ҪйӨҗй»һ');
    return {id:crypto.randomUUID(),groupId:g.id,buyer,items,total:items.reduce((sum,item)=>sum+item.qty*item.price,0),paid:false,createdAt:new Date().toISOString()};
  }
  const fallbackSubmit=submitOrder;
  submitOrder=async function(){
    if(!enabled)return fallbackSubmit();
    if(orderSubmitting)return;orderSubmitting=true;
    const button=document.activeElement?.closest?.('button'),text=button?.textContent;if(button){button.disabled=true;button.textContent='йҖҒеҮәдёӯвҖҰ'}
    try{const order=buildMenuOrder();await insertOrder(order);state.cart={};showOrderSuccess()}
    catch(error){alert(error.message||'йҖҒеҮәеӨұж•—пјҢи«ӢзЁҚеҫҢеҶҚи©Ұ')}
    finally{orderSubmitting=false;if(button&&document.body.contains(button)){button.disabled=false;button.textContent=text||'йҖҒеҮәиЁӮе–®'}}
  };
  const fallbackQuickSubmit=submitQuickOrder;
  submitQuickOrder=async function(){
    if(!enabled)return fallbackQuickSubmit();
    if(orderSubmitting)return;orderSubmitting=true;
    const button=document.activeElement?.closest?.('button'),text=button?.textContent;if(button){button.disabled=true;button.textContent='йҖҒеҮәдёӯвҖҰ'}
    try{
      const g=group(state.group);if(!g||!isOpen(g))throw new Error('йҖҷеҖӢеңҳиіје·Із¶“зөҗжқҹ');
      const buyer=$('#buyer')?.value.trim()||state.buyer?.trim();if(!buyer)throw new Error('и«Ӣијёе…ҘиЁӮиіјдәә');
      const items=(state.quickRows||[]).map(row=>({name:String(row.name||'').trim(),spec:String(row.spec||'').trim()||'жңӘеЎ«иҰҸж ј',qty:Number(row.qty),price:Number(row.price)}));
      if(items.some(item=>!item.name||!Number.isInteger(item.qty)||item.qty<1||!Number.isFinite(item.price)||item.price<0))throw new Error('и«Ӣе®Ңж•ҙеЎ«еҜ«е“Ғй …гҖҒж•ёйҮҸиҲҮе–®еғ№');
      const order={id:crypto.randomUUID(),groupId:g.id,buyer,items,total:items.reduce((sum,item)=>sum+item.qty*item.price,0),paid:false,createdAt:new Date().toISOString()};
      await insertOrder(order);state.quickRows=[];showOrderSuccess();
    }catch(error){alert(error.message||'йҖҒеҮәеӨұж•—пјҢи«ӢзЁҚеҫҢеҶҚи©Ұ')}
    finally{orderSubmitting=false;if(button&&document.body.contains(button)){button.disabled=false;button.textContent=text||'йҖҒеҮәиЁӮе–®'}}
  };
  const fallbackPay=togglePay;
  togglePay=async function(id){
    if(!enabled)return fallbackPay(id);
    const order=data.orders.find(item=>item.id===id);if(!order)return;
    try{await patchOrder({...order,paid:!order.paid});admin()}catch(error){alert('д»ҳж¬ҫзӢҖж…Ӣжӣҙж–°еӨұж•—пјҢи«ӢзЁҚеҫҢеҶҚи©Ұ')}
  };
  const fallbackRemove=removeOrder;
  removeOrder=async function(id){
    if(!enabled)return fallbackRemove(id);
    if(!confirm('зўәе®ҡиҰҒз§»йҷӨйҖҷзӯҶиЁӮе–®е—ҺпјҹжӯӨж“ҚдҪңжңғеҗҢжӯҘжӣҙж–°жӯ·еҸІиЁӮе–®гҖӮ'))return;
    try{await request(`${ORDERS_TABLE}?id=eq.${encodeURIComponent(id)}`,{method:'DELETE',headers:{Prefer:'return=minimal'}});data.orders=data.orders.filter(item=>item.id!==id);persistLocal();admin()}catch(error){alert('з§»йҷӨеӨұж•—пјҢи«ӢзЁҚеҫҢеҶҚи©Ұ')}
  };
  const fallbackDeleteGroup=deleteGroup;
  deleteGroup=async function(id){
    if(!enabled)return fallbackDeleteGroup(id);
    const target=group(id),related=data.orders.filter(order=>order.groupId===id);
    if(!target)return;
    if(!confirm(`зўәе®ҡиҰҒеҲӘйҷӨйҖҷж¬Ўй–Ӣеңҳе—Һпјҹе°ҮеҗҢжӯҘеҲӘйҷӨ ${related.length} зӯҶиЁӮе–®иҲҮжӯ·еҸІиЁӮе–®иіҮж–ҷгҖӮ`))return;
    data.orders=data.orders.filter(order=>order.groupId!==id);
    data.groups=data.groups.filter(item=>item.id!==id);
    data=normalize(data);persistLocal();localStorage.setItem(PENDING_KEY,'1');
    setSyncStatus('warn','еҗҢжӯҘдёӯ');
    try{
      await Promise.all(related.map(order=>request(`${ORDERS_TABLE}?id=eq.${encodeURIComponent(order.id)}`,{method:'DELETE',headers:{Prefer:'return=minimal'}})));
      let synced=false;
      for(let attempt=0;attempt<4&&!synced;attempt++){
        if(!isSyncing)synced=await pushShared();
        if(!synced)await new Promise(resolve=>setTimeout(resolve,300));
      }
      if(!synced)throw new Error('еҗҢжӯҘе°ҡжңӘе®ҢжҲҗ');
      await reloadOrders(false);
      admin();
    }catch(error){
      console.warn('еҲӘйҷӨй–ӢеңҳеҗҢжӯҘеӨұж•—',error);
      setSyncStatus('error','еҗҢжӯҘеӨұж•—пјҢе°ҮиҮӘеӢ•йҮҚи©Ұ');
      setTimeout(()=>pushShared(),600);
      admin();
    }
  };
  const fallbackManual=saveManualOrder;
  saveManualOrder=async function(groupId){
    if(!enabled)return fallbackManual(groupId);
    const buyer=$('#manualBuyer')?.value.trim(),raw=$('#manualItems')?.value.trim();if(!buyer)return alert('и«Ӣијёе…ҘиЁӮиіјдәә');
    const lines=raw.split(/\r?\n/).filter(Boolean),items=lines.map(line=>{const [name,spec,qty,price]=line.split('/').map(value=>value.trim());return {name,spec,qty:Number(qty),price:Number(String(price||'').replace(/[^\d.]/g,''))}}).filter(item=>item.name&&item.spec&&Number.isInteger(item.qty)&&item.qty>0&&Number.isFinite(item.price)&&item.price>=0);
    if(!items.length||items.length!==lines.length)return alert('йӨҗй»һж јејҸжңүиӘӨпјҢи«ӢдҪҝз”ЁгҖҢе“Ғй …/иҰҸж ј/ж•ёйҮҸ/е–®еғ№гҖҚгҖӮ');
    try{await insertOrder({id:crypto.randomUUID(),groupId,buyer,items,total:items.reduce((sum,item)=>sum+item.qty*item.price,0),paid:false,createdAt:new Date().toISOString()});closeModal();admin()}catch(error){alert('ж–°еўһеӨұж•—пјҢи«ӢзЁҚеҫҢеҶҚи©Ұ')}
  };
  function cartForExistingOrder(order,menu){
    const cart={};
    menu.items.forEach((item,index)=>{
      const selected=order.items.find(entry=>entry.name===item.name);
      if(!selected)return;
      const groups=optionGroups(item),variantsForItem=variants(item);
      const entry={q:Number(selected.qty)||0,variant:0,options:{}};
      if(groups.length){
        const chosen=String(selected.spec||'').split('гҖҒ').reduce((all,part)=>{const at=part.indexOf(':');if(at>0)all[part.slice(0,at)]=part.slice(at+1);return all},{});
        groups.forEach(optionGroup=>{entry.options[optionGroup.name]=chosen[optionGroup.name]||optionGroup.values[0]||''});
      }else{
        const matched=variantsForItem.findIndex(variant=>variant.spec===selected.spec);
        entry.variant=matched<0?0:matched;
      }
      cart[index]=entry;
    });
    return cart;
  }
  function menuItemsFromCart(menu){
    return menu.items.flatMap((item,index)=>{
      const cart=cartEntry(item,index);if(!cart.q)return[];
      const groups=optionGroups(item),variant=variants(item)[cart.variant];
      return [{name:item.name,spec:groups.length?groups.map(optionGroup=>`${optionGroup.name}:${cart.options[optionGroup.name]}`).join('гҖҒ'):variant.spec,qty:cart.q,price:groups.length?selectedPrice(item,cart):variant.price}];
    });
  }
  window.editOwnOrder=function(id){
    const order=data.orders.find(item=>item.id===id),g=order&&group(order.groupId),menu=g&&store(g.storeId);
    if(!order||!g||!menu||!isOpen(g)||!isOwned(id))return alert('жӯӨиЁӮе–®зӣ®еүҚз„Ўжі•дҝ®ж”№');
    state.group=g.id;state.buyer=order.buyer;state.cart=cartForExistingOrder(order,menu);state.editingOrderId=id;state.selectedItem=null;state.focusItem=null;go('menu');
  };
  window.cancelOwnOrderEdit=function(){
    state.editingOrderId=null;state.cart={};state.selectedItem=null;state.focusItem=null;go('history');
  };
  window.saveOwnOrder=async function(id){
    const order=data.orders.find(item=>item.id===id),g=order&&group(order.groupId),menu=g&&store(g.storeId);
    if(!order||!g||!menu||!isOpen(g)||!isOwned(id))return alert('жӯӨиЁӮе–®зӣ®еүҚз„Ўжі•дҝ®ж”№');
    const buyer=$('#buyer')?.value.trim()||state.buyer?.trim(),items=menuItemsFromCart(menu);
    if(!buyer)return alert('и«Ӣијёе…ҘиЁӮиіјдәә');
    if(!items.length)return alert('и«ӢиҮіе°‘йҒёж“ҮдёҖд»ҪйӨҗй»һ');
    const button=document.activeElement?.closest?.('button'),label=button?.textContent;if(button){button.disabled=true;button.textContent='е„ІеӯҳдёӯвҖҰ'}
    try{
      await patchOrder({...order,buyer,items,total:items.reduce((sum,item)=>sum+item.qty*item.price,0)});
      state.editingOrderId=null;state.cart={};state.selectedItem=null;state.focusItem=null;go('history');
    }catch(error){alert('дҝ®ж”№еӨұж•—пјҢи«ӢзЁҚеҫҢеҶҚи©Ұ')}
    finally{if(button&&document.body.contains(button)){button.disabled=false;button.textContent=label||'еҸ–д»ЈзҸҫжңүиЁӮе–®'}}
  };
  window.deleteOwnOrder=async function(id){
    const order=data.orders.find(item=>item.id===id),g=order&&group(order.groupId);
    if(!order||!g||!isOpen(g)||!isOwned(id))return alert('жӯӨиЁӮе–®зӣ®еүҚз„Ўжі•еҲӘйҷӨ');
    if(!confirm('зўәе®ҡиҰҒеҲӘйҷӨйҖҷзӯҶиЁӮе–®е—ҺпјҹжӯӨж“ҚдҪңз„Ўжі•еҫ©еҺҹгҖӮ'))return;
    try{
      await request(`${ORDERS_TABLE}?id=eq.${encodeURIComponent(id)}`,{method:'DELETE',headers:{Prefer:'return=minimal'}});
      data.orders=data.orders.filter(item=>item.id!==id);persistLocal();state.editingOrderId=null;state.cart={};state.selectedItem=null;state.focusItem=null;go('history');
    }catch(error){alert('еҲӘйҷӨеӨұж•—пјҢи«ӢзЁҚеҫҢеҶҚи©Ұ')}
  };
  const orderFormForOwnEdit=orderForm;
  orderForm=function(){
    orderFormForOwnEdit();
    const id=state.editingOrderId;if(!id)return;
    const order=data.orders.find(item=>item.id===id),g=order&&group(order.groupId);
    if(!order||!g||!isOpen(g)||!isOwned(id)){state.editingOrderId=null;return go('history')}
    $('#headline').textContent='дҝ®ж”№иЁӮе–®';

<script>
  /* Keep the history ticker visible even in browsers where sticky positioning is unreliable. */
  (()=>{
    let clearTickerPin=()=>{};
    function pinHistoryTicker(){
      clearTickerPin();
      const ticker=document.querySelector('.wanted');
      if(!ticker)return;
      const placeholder=document.createElement('div');
      placeholder.setAttribute('aria-hidden','true');
      placeholder.style.display='none';
      ticker.before(placeholder);
      let pinned=false,frame=0;
      const release=()=>{
        if(!pinned)return;
        ticker.classList.remove('wanted-fixed');
        ticker.style.top='';ticker.style.left='';ticker.style.width='';
        placeholder.style.display='none';
        pinned=false;
      };
      const update=()=>{
        frame=0;
        const header=document.querySelector('.top');
        const top=Math.max((header?.getBoundingClientRect().bottom||0)+8,8);
        if(!pinned){
          const rect=ticker.getBoundingClientRect();
          if(rect.top<=top+1){
            const margin=parseFloat(getComputedStyle(ticker).marginBottom)||0;
            placeholder.style.height=(rect.height+margin)+'px';
            placeholder.style.display='block';
            ticker.classList.add('wanted-fixed');
            ticker.style.top=top+'px';ticker.style.left=rect.left+'px';ticker.style.width=rect.width+'px';
            pinned=true;
          }
        }else{
          const rect=placeholder.getBoundingClientRect();
          if(rect.top>top+1){release();return}
          ticker.style.top=top+'px';ticker.style.left=rect.left+'px';ticker.style.width=rect.width+'px';
        }
      };
      const requestUpdate=()=>{if(!frame)frame=requestAnimationFrame(update)};
      window.addEventListener('scroll',requestUpdate,{passive:true});
      window.addEventListener('resize',requestUpdate);
      clearTickerPin=()=>{cancelAnimationFrame(frame);window.removeEventListener('scroll',requestUpdate);window.removeEventListener('resize',requestUpdate);release();placeholder.remove()};
      update();
    }
    const originalHistory=history;
    history=function(){originalHistory();requestAnimationFrame(pinHistoryTicker)};
  })();
</script>

  const safe=value=>String(value||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const read=value=>String(value||'').split(/\r?\n/).map((line,index)=>{
    const match=line.trim().match(/^\s*(.*?)\s*(?:[пҪң|]|\/)\s*(https?:\/\/\S+)\s*$/i);
    return match?{name:clean(match[1])||`иҸңе–® ${index+1}`,url:clean(match[2])}:{name:'',url:''};
  }).filter(row=>row.name||row.url);
  const serialize=()=>rows.filter(row=>clean(row.url)).map((row,index)=>`${clean(row.name)||`иҸңе–® ${index+1}`}/${clean(row.url)}`).join('\n');
  const sync=()=>{const input=document.querySelector('#externalMenuLinks');if(input)input.value=serialize()};
  const render=()=>{
    const host=document.querySelector('#externalMenuLinkRows');if(!host)return;
    host.innerHTML=rows.map((row,index)=>`<div class="external-menu-link-row"><label>иҸңе–®еҗҚзЁұ<input value="${safe(row.name)}" placeholder="дҫӢеҰӮпјҡеҚҲйӨҗиҸңе–®" oninput="externalMenuLinkChange(${index},'name',this.value)"></label><label class="external-link-url">з¶ІеқҖ<input type="url" inputmode="url" value="${safe(row.url)}" placeholder="иІјдёҠе…¬й–Ӣз¶ІеқҖ" oninput="externalMenuLinkChange(${index},'url',this.value)"></label><button type="button" class="btn danger smallbtn" onclick="externalMenuLinkRemove(${index})" aria-label="з§»йҷӨжӯӨиҸңе–®">Г—</button></div>`).join('')+`<button type="button" class="btn light smallbtn" onclick="externalMenuLinkAdd()">пјӢ ж–°еўһиҸңе–®</button><div class="hint">иҸңе–®еҗҚзЁұзӣҙжҺҘеЎ«еҜ«пјҢеҫҢж–№иІјдёҠе…¬й–Ӣз¶ІеқҖеҚіеҸҜгҖӮ</div>`;
  };
  const build=()=>{
    const input=document.querySelector('#externalMenuLinks');
    if(!input)return;
    document.querySelector('#externalMenuLinkRows')?.remove();
    input.style.display='';input.rows=3;
    input.placeholder='жҜҸиЎҢдёҖеҖӢпјҡиҸңе–®еҗҚзЁұ/https://example.com/menu';
  };
  window.externalMenuLinkChange=(index,key,value)=>{if(rows[index])rows[index][key]=value;sync()};
  window.externalMenuLinkAdd=()=>{rows.push({name:'',url:''});render();sync()};
  window.externalMenuLinkRemove=index=>{rows.splice(index,1);if(!rows.length)rows.push({name:'',url:''});render();sync()};
  window.restoreExternalMenuLinkRows=value=>{
    const input=document.querySelector('#externalMenuLinks');if(!input)return;
    rows=read(value);if(!rows.length)rows=[{name:'',url:''}];
    if(document.querySelector('#externalMenuLinkRows')){render();sync()}else input.value=serialize();
  };
  const adminWithLinkRows=admin;
  admin=function(...args){const out=adminWithLinkRows.apply(this,args);if(state.adminTab===1)setTimeout(build,20);return out};
  const editWithLinkRows=editStore;
  editStore=function(id){const out=editWithLinkRows(id);setTimeout(build,40);return out};
  const createWithLinkRows=createStore;
  createStore=function(){sync();return createWithLinkRows()};
})();
</script>
<script id="external-menu-links-save-fix">
(()=>{
  const parse=value=>String(value||'').split(/\r?\n/).map((line,index)=>{
    const match=line.trim().match(/^\s*(.*?)\s*(?:[пҪң|]|\/)\s*(https?:\/\/\S+)\s*$/i);
    const name=match?.[1]||'',url=match?.[2]||'';
    return url?{name:name.trim()||`иҸңе–® ${index+1}`,data:url}:null;
  }).filter(Boolean);
  const saveWithExternalLinks=createStore;
  createStore=function(...args){
    const field=document.querySelector('#externalMenuLinks');
    const raw=field?.value,
      storeNote=document.querySelector('#snote')?.value||'',
      menuNotice=document.querySelector('#smenuNotice')?.value||'',
      id=document.querySelector('#sname')?.dataset.id,before=data.stores.length;
    const result=saveWithExternalLinks.apply(this,args);
    /* Validation failures leave the editor in place, so do not alter stored links. */
    if(raw===undefined||document.querySelector('#sname'))return result;
    const target=id?store(id):(data.stores.length>before?data.stores[data.stores.length-1]:null);
    if(!target)return result;
    const links=parse(raw);
    target.note=storeNote.trim();
    target.menuNotice=menuNotice.trim();
    target.menuFiles=links;
    target.importName=links[0]?.name||'';
    target.importData=links[0]?.data||'';
    save();
    return result;
  };
})();
</script>
<script id="single-external-menu-link">
/* A single, explicit menu name + URL pair is intentionally used here.  It
   avoids hidden multi-row controls losing their value before the store saves. */
(()=>{
  const normalUrl=value=>{
    const url=String(value||'').trim();
    if(!url)return '';
    return /^https?:\/\//i.test(url)?url:`https://${url}`;
  };
  const read=value=>{
    const match=String(value||'').trim().match(/^\s*(.*?)\s*(?:[пҪң|]|\/)\s*(https?:\/\/\S+)\s*$/i);
    return {name:match?.[1]?.trim()||'',url:match?.[2]?.trim()||''};
  };
  const sync=()=>{
    const name=document.querySelector('#singleMenuName')?.value.trim()||'';
    const url=normalUrl(document.querySelector('#singleMenuUrl')?.value);
    const hidden=document.querySelector('#externalMenuLinks');
    if(hidden){hidden.value=url?`${name||'иҸңе–®'}/${url}`:'';hidden.dispatchEvent(new Event('input',{bubbles:true}));}
  };
  window.syncSingleMenuLink=sync;
  const build=()=>{
    const hidden=document.querySelector('#externalMenuLinks');
    if(!hidden)return;
    const parent=hidden.closest('.builder-field')||hidden.parentElement;
    if(!parent)return;
    const stored=read(hidden.value);
    hidden.style.display='none';
    const label=parent.querySelector('label');
    if(label)label.textContent='еӨ–йғЁиҸңе–®йҖЈзөҗпјҲйҒёеЎ«пјү';
    let editor=parent.querySelector('#singleExternalMenuLinkEditor');
    if(!editor){
      editor=document.createElement('div');editor.id='singleExternalMenuLinkEditor';
      editor.innerHTML='<div class="external-menu-link-row"><label>иҸңе–®еҗҚзЁұ<input id="singleMenuName" placeholder="дҫӢеҰӮпјҡеҚҲйӨҗиҸңе–®" oninput="syncSingleMenuLink()"></label><label class="external-link-url">з¶ІеқҖ<input id="singleMenuUrl" type="url" inputmode="url" placeholder="иІјдёҠе…¬й–Ӣз¶ІеқҖ" oninput="syncSingleMenuLink()"></label></div><div class="hint">еҸӘеҸҜеЎ«дёҖзӯҶгҖӮй»һйӨҗй Ғй»һйҒёиҸңе–®еҗҚзЁұпјҢеҚіеҸҜй–Ӣе•ҹз¶ІеқҖгҖӮ</div>';
      hidden.insertAdjacentElement('afterend',editor);
    }
    const name=document.querySelector('#singleMenuName'),url=document.querySelector('#singleMenuUrl');
    if(name&&!name.value)name.value=stored.name;
    if(url&&!url.value)url.value=stored.url;
  };
  const priorAdmin=admin;
  admin=function(...args){const out=priorAdmin.apply(this,args);if(state.adminTab===1)setTimeout(build,80);return out};
  const priorEdit=editStore;
  editStore=function(id){const out=priorEdit.call(this,id);setTimeout(()=>{build();const file=(store(id)?.menuFiles||[])[0]||{};const name=document.querySelector('#singleMenuName'),url=document.querySelector('#singleMenuUrl');if(name)name.value=file.name||'';if(url)url.value=file.data||'';sync()},100);return out};
  const priorCreate=createStore;
  createStore=function(...args){
    const name=document.querySelector('#singleMenuName')?.value.trim()||'';
    const url=normalUrl(document.querySelector('#singleMenuUrl')?.value);
    const id=document.querySelector('#sname')?.dataset.id,before=data.stores.length;
    sync();
    const out=priorCreate.apply(this,args);
    /* A successful edit returns to a fresh editor (without the old id); a new
       store increases the store count.  Do not use the existence of #sname:
       the fresh editor intentionally contains that field too. */
    const freshNameField=document.querySelector('#sname');
    const completed=id?!freshNameField?.dataset.id:data.stores.length>before;
    if(!completed)return out;
    const target=id?store(id):(data.stores.length>before?data.stores[data.stores.length-1]:null);
    if(!target)return out;
    const links=url?[{name:name||'иҸңе–®',data:url}]:[];
    target.menuFiles=links;target.importName=links[0]?.name||'';target.importData=links[0]?.data||'';
    save();
    return out;
  };
})();
</script>
<script id="external-menu-preview-link">
/* External menu URLs are links, not image files.  The management preview
   therefore opens the public menu instead of trying to render a broken image. */
(()=>{
  const previousPreview=showMenuFile;
  showMenuFile=function(id,index=0){
    const entry=(store(id)?.menuFiles||[])[index]||{};
    if(/^https?:\/\//i.test(String(entry.data||''))){window.open(entry.data,'_blank','noopener');return;}
    return previousPreview.call(this,id,index);
  };
})();
</script>
<script id="external-menu-link-in-order-page">
/* Add the saved public menu link after every version of the order-page renderer.
   This is deliberately an enhancement wrapper so existing ordering behaviour is
   unchanged. */
(()=>{
  const menuBeforeExternalLink=menu;
  menu=function(...args){
    const out=menuBeforeExternalLink.apply(this,args);
    const currentGroup=group(state.group),currentStore=currentGroup&&store(currentGroup.storeId);
    const entries=currentStore?(currentStore.menuFiles?.length?currentStore.menuFiles:(currentStore.importData?[{name:currentStore.importName||'иҸңе–®',data:currentStore.importData}]:[])):[];
    const links=entries.filter(entry=>/^https?:\/\//i.test(String(entry.data||'')));
    const title=document.querySelector('#view .store-head h2');
    if(title&&links.length&&!document.querySelector('#orderPageMenuLinks')){
      const holder=document.createElement('div');holder.id='orderPageMenuLinks';holder.className='small';holder.style.marginTop='6px';
      holder.innerHTML=links.map(entry=>`<a href="${esc(entry.data)}" target="_blank" rel="noopener" class="badge" style="display:inline-block;margin:0 5px 4px 0;text-decoration:none">${esc(entry.name||'иҸңе–®')}</a>`).join('');
      title.insertAdjacentElement('afterend',holder);
    }
    return out;
  };
})();
</script>
<script id="bulk-edit-same-extra-group">
/* Edit one extra-specification group, then apply its settings to every group
   with the same name in this store menu. */
(()=>{
  const cloneRows=rows=>(rows||[]).map(row=>({id:crypto.randomUUID?.()||('row'+Date.now()+Math.random()),label:String(row.label||''),price:String(row.price??'')}));
  const normalizedName=value=>String(value||'').trim().replace(/\s+/g,' ').toLocaleLowerCase();
  const findGroup=(bid,iid,gid)=>{
    const block=(state.menuBuilder||[]).find(entry=>entry.id===bid);
    const item=block?.items?.find(entry=>entry.id===iid);
    return item?.groups?.find(entry=>entry.id===gid);
  };
  window.builderApplySameNamedGroup=function(bid,iid,gid){
    const source=findGroup(bid,iid,gid),key=normalizedName(source?.name);
    if(!source||!key)return alert('и«Ӣе…ҲеЎ«еҜ«иҰҸж јж¬„дҪҚеҗҚзЁұпјҢеҶҚеҘ—з”ЁгҖӮ');
    const blocks=state.menuBuilder||[];
    const blockLabel=block=>String(block.title||'').trim()||`з©әзҷҪ${blocks.findIndex(entry=>entry.id===block.id)+1}`;
    const choices=blocks.map(block=>({block,items:(block.items||[]).filter(item=>item.id!==iid)})).filter(choice=>choice.items.length);
    if(!choices.length)return alert('иҮіе°‘йңҖиҰҒеҸҰдёҖеҖӢе“Ғй …жүҚиғҪеҘ—з”ЁиҰҸж јгҖӮ');
    $('#modal').innerHTML=`<div class="modal"><div class="modalbox form"><h2>йҒёж“ҮиҰҒеҘ—з”Ёзҡ„е“Ғй …</h2><p class="small">е°ҮгҖҢ${esc(source.name)}гҖҚеҘ—з”ЁеҲ°еӢҫйҒёзҡ„е“Ғй …пјӣеҘ—з”ЁеҫҢд»ҚеҸҜеҗ„иҮӘдҝ®ж”№гҖӮ</p><div style="display:grid;gap:10px">${choices.map(({block,items})=>`<details style="padding:10px;border:1px solid var(--line);border-radius:10px"><summary style="cursor:pointer"><label class="builder-check" style="display:inline-flex;font-weight:700" onclick="event.stopPropagation()"><input type="checkbox" data-bulk-block-toggle data-block-id="${esc(block.id)}" checked onchange="builderToggleBulkBlock(this,'${block.id}')"> гҖҗ${esc(blockLabel(block))}гҖ‘</label></summary><div style="display:grid;gap:6px;margin:10px 0 0 26px">${items.map(item=>`<label class="builder-check"><input type="checkbox" data-bulk-item data-bulk-item-block="${esc(block.id)}" value="${esc(block.id)}|${esc(item.id)}" checked> ${esc(item.name||'жңӘе‘ҪеҗҚе“Ғй …')}</label>`).join('')}</div></details>`).join('')}</div><div class="row" style="margin-top:16px"><button type="button" class="btn light" onclick="closeModal()">еҸ–ж¶Ҳ</button><button type="button" class="btn" onclick="builderConfirmApplySameNamedGroup('${bid}','${iid}','${gid}')">еҘ—з”ЁйҒёеҸ–е“Ғй …</button></div></div></div>`;
  };
  window.builderToggleBulkBlock=function(toggle,bid){document.querySelectorAll('[data-bulk-item]').forEach(item=>{if(item.dataset.bulkItemBlock===bid)item.checked=toggle.checked});};
  window.builderConfirmApplySameNamedGroup=function(bid,iid,gid){
    const source=findGroup(bid,iid,gid),key=normalizedName(source?.name),selected=new Set([...document.querySelectorAll('[data-bulk-item]:checked')].map(input=>input.value));
    if(!source||!key||!selected.size)return alert('и«ӢиҮіе°‘йҒёж“ҮдёҖеҖӢе“Ғй …гҖӮ');
    let count=0;
    (state.menuBuilder||[]).forEach(block=>{
      (block.items||[]).forEach(item=>{
        if(!selected.has(`${block.id}|${item.id}`))return;
        (item.groups||[]).forEach(group=>{
        if(group.id===source.id||normalizedName(group.name)!==key)return;
        group.noPrice=!!source.noPrice;
        group.required=!!source.required;
        group.rows=cloneRows(source.rows);
        count++;
        });
        const hasSameName=(item.groups||[]).some(group=>normalizedName(group.name)===key);
        if(!hasSameName){item.groups.push({id:crypto.randomUUID?.()||('group'+Date.now()+Math.random()),name:source.name,noPrice:!!source.noPrice,required:!!source.required,collapsed:false,rows:cloneRows(source.rows)});count++;}
      });
    });
    closeModal();renderMenuBuilder();
    alert(`е·Іе°ҮгҖҢ${source.name}гҖҚеҘ—з”ЁеҲ° ${count} еҖӢеҗҢеҗҚиҰҸж јж¬„дҪҚгҖӮ`);
  };
  const previousRender=window.renderMenuBuilder;
  window.renderMenuBuilder=function(){
    const result=previousRender.apply(this,arguments);
    document.querySelectorAll('.extra-group-card').forEach(card=>{
      if(card.querySelector('[data-apply-same-group]'))return;
      const head=card.querySelector('.extra-group-head');if(!head)return;
      const button=document.createElement('button');button.type='button';button.className='btn light smallbtn';button.dataset.applySameGroup='1';button.textContent='еҘ—з”ЁеҗҢеҗҚиҰҸж ј';
      button.onclick=()=>builderApplySameNamedGroup(card.dataset.bid,card.dataset.iid,card.dataset.gid);
      const collapse=head.querySelector('.group-collapse-btn');head.insertBefore(button,collapse||null);
    });
    return result;
  };
})();
</script>
<script id="default-menu-builder-collapse">
/* Entering the menu editor starts with every section folded, matching the
   existing "fold all" action without changing the user's later choices. */
(()=>{
  const foldAll=()=>{
    if(!Array.isArray(state.menuBuilder))return;
    state.menuBuilder.forEach(block=>{block.collapsed=true;});
    window.renderMenuBuilder?.();
  };
  const adminBeforeDefaultFold=admin;
  admin=function(...args){
    const out=adminBeforeDefaultFold.apply(this,args);
    if(state.adminTab===1)setTimeout(foldAll,40);
    return out;
  };
  const editStoreBeforeDefaultFold=editStore;
  editStore=function(...args){
    const out=editStoreBeforeDefaultFold.apply(this,args);
    setTimeout(foldAll,80);
    return out;
  };
})();
</script>

<script>
const KEY='together-order-v1';
const APP_VERSION='v1.0.0', COPYRIGHT='Copyright В© 2026 JJ. All rights reserved.';
const SUPABASE_URL='https://duwinxwcovmplqqkizrk.supabase.co';
const SUPABASE_KEY='sb_publishable_fRwQthTt4FyTSK3AbVu3nQ_Ou_NWItt';
const EMPTY={password:'20260713',stores:[],groups:[],orders:[]};
let data=normalize(JSON.parse(localStorage.getItem(KEY)||'null')||structuredClone(EMPTY));
let state={page:'home',group:null,cart:{},buyer:'',focusItem:null,selectedItem:null,menuSection:null,adminTab:0,orderTab:0,orderDate:localDate(new Date())},syncTimer=null;
const $=s=>document.querySelector(s);
const now=()=>new Date();
const headers={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};
function normalize(raw){raw=raw&&typeof raw==='object'?raw:{};return {password:raw.password||EMPTY.password,stores:Array.isArray(raw.stores)?raw.stores:[],groups:Array.isArray(raw.groups)?raw.groups.map(g=>({...g,creator:g.creator||'',payee:g.payee||''})):[],orders:Array.isArray(raw.orders)?raw.orders:[]}}
function esc(s=''){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmt(d,withTime=true){if(!d)return 'вҖ”';return new Intl.DateTimeFormat('zh-TW',{timeZone:'Asia/Taipei',year:'numeric',month:'2-digit',day:'2-digit',...(withTime?{hour:'2-digit',minute:'2-digit',hour12:false}:{})}).format(new Date(d))}
function localDate(d){return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Taipei',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date(d))}
function store(id){return data.stores.find(x=>x.id===id)}function group(id){return data.groups.find(x=>x.id===id)}
function isOpen(g){return !!g&&!g.manualClosed&&new Date(g.deadline)>now()}
function mapUrl(address){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(address||'')}
function mapHtml(address){return ''}
function optionGroups(item){return Array.isArray(item.optionGroups)?item.optionGroups.filter(g=>g?.name&&Array.isArray(g.values)&&g.values.length):[]}
function cartEntry(item,i){const current=state.cart[i]||{};const defaults=Object.fromEntries(optionGroups(item).map(g=>[g.name,g.values[0]]));return {...current,q:current.q||0,variant:current.variant||0,options:{...defaults,...(current.options||{})}}}
function selectedPrice(item,cart){let price=Number(item.price)||0;optionGroups(item).forEach(g=>{const value=cart.options[g.name],n=Number(g.adjustments?.[value]||0);if(g.pricing)price=n;else price+=n});return price}
function variants(item){const groups=optionGroups(item);if(groups.length){const pricing=groups.find(g=>g.pricing),price=pricing?Number(pricing.adjustments?.[pricing.values[0]])||0:Number(item.price)||0;return[{spec:groups.map(g=>`${g.name}пјҲ${g.values.join('гҖҒ')}пјү`).join('пјҸ'),price}]}if(Array.isArray(item.variants)&&item.variants.length)return item.variants.map(v=>({spec:v.spec||'е–®дёҖиҰҸж ј',price:Number(v.price)||0}));let specs=String(item.specs||'е–®дёҖиҰҸж ј').split(/[гҖҒ,пјҢ|пҪң]/).map(x=>x.trim()).filter(Boolean);return specs.map(spec=>({spec,price:Number(item.price)||0}))}
function save(){data=normalize(data);localStorage.setItem(KEY,JSON.stringify(data));clearTimeout(syncTimer);syncTimer=setTimeout(pushShared,350)}
async function pushShared(){try{const r=await fetch(SUPABASE_URL+'/rest/v1/together_order_state?id=eq.shared',{method:'PATCH',headers:{...headers,'Prefer':'return=minimal'},body:JSON.stringify({payload:data,updated_at:new Date().toISOString()})});if(!r.ok)throw new Error(await r.text())}catch(e){console.warn('йӣІз«ҜеҗҢжӯҘжҡ«жҷӮеӨұж•—пјҢиіҮж–ҷе·ІдҝқеӯҳеңЁжң¬ж©ҹгҖӮ',e)}}
async function loadSharedState(){try{const r=await fetch(SUPABASE_URL+'/rest/v1/together_order_state?id=eq.shared&select=payload',{headers});if(!r.ok)throw new Error(await r.text());const rows=await r.json();if(rows[0]?.payload){data=normalize(rows[0].payload);localStorage.setItem(KEY,JSON.stringify(data))}else{await fetch(SUPABASE_URL+'/rest/v1/together_order_state',{method:'POST',headers:{...headers,'Prefer':'return=minimal'},body:JSON.stringify({id:'shared',payload:data})})}}catch(e){console.warn('зӣ®еүҚдҪҝз”Ёжң¬ж©ҹиіҮж–ҷгҖӮ',e)}render()}
function go(page){state.page=page;if(page==='home')state.group=null;render()}
function render(){const p=state.page;$('#tabs').classList.add('hidden');$('#adminBar').classList.add('hidden');document.querySelectorAll('.nav').forEach((x,i)=>x.classList.toggle('on',(p==='home'&&i===0)||(p==='history'&&i===1)||(p==='admin'&&i===2)));if(p==='home')home();else if(p==='menu')menu();else if(p==='order')orderForm();else if(p==='history')history();else admin()}
function home(){const active=data.groups.filter(isOpen).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));$('#headline').textContent=active.length?`зӣ®еүҚжңү ${active.length} еҖӢеңҳиіјйҖІиЎҢдёӯ`:'зӣ®еүҚжІ’жңүй–Ӣж”ҫдёӯзҡ„еңҳиіј';$('#view').innerHTML=active.length?active.map(g=>{const s=store(g.storeId)||{};return `<article class="card"><div class="store-head"><div><span class="badge">${esc(s.category||'жңӘеҲҶйЎһ')}</span><h2>${esc(s.name||'е·ІеҲӘйҷӨеә—е®¶')}</h2><div class="small">${s.phone?'йӣ»и©ұ '+esc(s.phone):''}</div></div><b class="deadline open">й–Ӣж”ҫдёӯ</b></div><div class="deadline">${g.payee?'рҹ’Ід»ҳж¬ҫиҖ…пјҡ'+esc(g.payee)+'гғ»':''}ж”¶е–® ${fmt(g.deadline)}</div><button class="btn full" onclick="state.group='${g.id}';go('menu')">жҹҘзңӢиҸңе–®пјҸй»һйӨҗ</button></article>`}).join(''):`<div class="empty"><b>зҸҫеңЁжІ’жңүй–Ӣж”ҫдёӯзҡ„еңҳиіј</b>з®ЎзҗҶиҖ…й–ӢеңҳеҫҢпјҢе°ұеҸҜд»ҘеңЁйҖҷиЈЎй–Ӣе§Ӣй»һйӨҗгҖӮ</div>`}
function menu(){const g=group(state.group),s=g&&store(g.storeId);if(!g||!s)return go('home');if(!isOpen(g)){alert('йҖҷеҖӢеңҳиіје·Із¶“зөҗжқҹ');return go('home')}$('#headline').textContent=s.name;$('#view').innerHTML=`<button class="btn light" onclick="go('home')">иҝ”еӣһеңҳиіј</button><div class="card" style="margin-top:14px"><div class="store-head"><div><span class="badge">${esc(s.category||'жңӘеҲҶйЎһ')}</span><h2>${esc(s.name)}</h2><div class="small">${s.phone?'йӣ»и©ұ '+esc(s.phone):''}</div></div><div class="deadline open">${g.payee?'рҹ’Ід»ҳж¬ҫиҖ…пјҡ'+esc(g.payee)+'гғ»':''}ж”¶е–® ${fmt(g.deadline)}</div></div>${s.note?`<p class="small">${esc(s.note)}</p>`:''}${mapHtml(s.address)}${s.importData?`<button class="btn light full" onclick="showMenuFile('${s.id}')">жҹҘзңӢеҺҹе§ӢиҸңе–®</button>`:''}<hr class="divider">${s.items.map(item=>`<div class="menu-item"><div class="food-icon">${s.category==='йЈІж–ҷ'?'рҹ§Ӣ':'рҹҚұ'}</div><div class="grow"><div class="name">${esc(item.name)}</div><div class="small">${variants(item).map(v=>`${esc(v.spec)} NT$ ${v.price.toLocaleString()}`).join('гғ»')}</div></div></div>`).join('')||'<p class="small">йҖҷй–“еә—е°ҡжңӘе»әз«ӢйӨҗй»һгҖӮ</p>'}<button class="btn full" style="margin-top:14px" onclick="state.cart={};state.buyer='';go('order')">й–Ӣе§Ӣй»һйӨҗ</button></div>`}
function orderForm(){const g=group(state.group),s=g&&store(g.storeId);if(!g||!s)return go('home');if(!isOpen(g)){alert('йҖҷеҖӢеңҳиіје·Із¶“зөҗжқҹ');return go('home')}const lines=s.items.map((item,i)=>{const vs=variants(item),groups=optionGroups(item),c=cartEntry(item,i),price=groups.length?Number(item.price)||0:(vs[c.variant]?.price||0);const controls=groups.length?groups.map(gr=>`<label class="small" style="margin-top:8px">${esc(gr.name)}</label><select aria-label="${esc(item.name)}${esc(gr.name)}" onchange="setOption(${i},'${esc(gr.name)}',this.value)">${gr.values.map(v=>`<option ${c.options[gr.name]===v?'selected':''}>${esc(v)}</option>`).join('')}</select>`).join(''):`<label class="small" style="margin-top:8px">иҰҸж ј</label><select aria-label="${esc(item.name)}иҰҸж ј" onchange="setVariant(${i},this.value)">${vs.map((v,j)=>`<option value="${j}" ${Number(c.variant)===j?'selected':''}>${esc(v.spec)}</option>`).join('')}</select>`;return `<div class="menu-item"><div class="grow"><div class="small">е“Ғй …</div><div class="name">${esc(item.name)}</div>${controls}<div class="small" style="margin-top:8px">еғ№йҢў</div><div class="price">NT$ ${price.toLocaleString()}</div></div><div class="qty"><button ${!c.q?'disabled':''} onclick="changeQty(${i},-1)">вҲ’</button><b>${c.q||0}</b><button onclick="changeQty(${i},1)">пјӢ</button></div></div>`}).join('');$('#headline').textContent='еЎ«еҜ«иЁӮе–®';$('#view').innerHTML=`<button class="btn light" onclick="go('menu')">иҝ”еӣһиҸңе–®</button><div class="card form" style="margin-top:14px"><label>иЁӮиіјдәә <em style="color:var(--danger)">*</em></label><input id="buyer" maxlength="30" placeholder="и«Ӣијёе…Ҙе§“еҗҚ" value="${esc(state.buyer||'')}" oninput="state.buyer=this.value"><label>е“Ғй …</label>${lines}<div class="total"><span>иЁӮе–®зёҪйҮ‘йЎҚ</span><span id="total">NT$ 0</span></div><button class="btn full" onclick="submitOrder()">йҖҒеҮәиЁӮе–®</button></div>`;updateTotal()}
function setVariant(i,v){const c=state.cart[i]||{q:0,options:{}};c.variant=Number(v);state.cart[i]=c;orderForm()}
function setOption(i,name,value){const c=state.cart[i]||{q:0,variant:0,options:{}};c.options={...(c.options||{}),[name]:value};state.cart[i]=c;orderForm()}

function adminStores(){const categories=[...new Set(['йЈІж–ҷ','дё»йЈҹ',...data.stores.map(s=>s.category).filter(Boolean)])];const q=state.storeQuery||'',cat=state.storeCategory||'';const filtered=data.stores.filter(s=>(!q||(s.name+' '+s.note+' '+s.address+' '+s.items.map(i=>i.name).join(' ')).toLowerCase().includes(q.toLowerCase()))&&(!cat||s.category===cat));return `<h2 class="section-title">еә—е®¶иҲҮиҸңе–®</h2><div class="card form"><label>еә—е®¶еҗҚзЁұ</label><input id="sname" placeholder="дҫӢеҰӮпјҡеҘҪе‘ідҫҝз•¶"><div class="row"><div><label>еҲҶйЎһ</label><input id="scat" list="categoryList" placeholder="йЈІж–ҷгҖҒдё»йЈҹжҲ–иҮӘиЁӮеҲҶйЎһ"><datalist id="categoryList">${categories.map(x=>`<option value="${esc(x)}">`).join('')}</datalist></div><div><label>еә—е®¶йӣ»и©ұ</label><input id="sphone" type="tel" inputmode="tel" placeholder="дҫӢеҰӮпјҡ02-1234-5678"></div></div><label>еә—е®¶ең°еқҖ</label><input id="saddress" placeholder="дҫӢеҰӮпјҡеҸ°еҢ—еёӮдҝЎзҫ©еҚҖеёӮеәңи·Ҝ45иҷҹ"><div class="hint">ең°еқҖжңғиҮӘеӢ•её¶е…Ҙ Google ең°ең–пјҢдёҚйңҖиҰҒиЁӯе®ҡйҮ‘й‘°гҖӮ</div><label>еҸ–йӨҗж–№ејҸ</label><input id="smethod" placeholder="дҫӢеҰӮпјҡиҮӘеҸ–гҖҒеӨ–йҖҒгҖҒзҸҫе ҙд»ҳж¬ҫ"><label>й»һйӨҗеӮҷиЁ»</label><textarea id="snote" placeholder="иҫЈеәҰгҖҒеҸ–йӨҗең°й»һжҲ–е…¶д»–жҸҗйҶ’"></textarea><label>еҺҹе§ӢиҸңе–®пјҲPDFпјҸJPGпјҸPNGпјү</label><input type="file" accept=".pdf,image/jpeg,image/png" onchange="importMenu(this)"><div class="filehint" id="filehint">еҸҜйҒёпјҢжӘ”жЎҲдёҠйҷҗ 3.5MB</div><label>йӨҗй»һе…§е®№пјҲжҜҸиЎҢпјҡе“Ғй …/иҰҸж ј/еғ№ж јпјү</label><textarea id="sitems" placeholder="йӣһи…ҝйЈҜ/жӯЈеёё/120&#10;зҙ…иҢ¶/е°ҸжқҜ,еӨ§жқҜ/25,35&#10;е’–е•Ў/еҶ°гҖҒзҶұ/60"></textarea><div class="hint">иҰҸж јеҸҜз”ЁгҖҢйҖ—иҷҹгҖҒй “иҷҹжҲ– |гҖҚијёе…Ҙе…©зЁ®д»ҘдёҠпјӣеғ№ж јеҸҜијёе…Ҙе–®дёҖеғ№ж јпјҲеҘ—з”ЁжүҖжңүиҰҸж јпјүпјҢжҲ–з”ЁгҖҢйҖ—иҷҹгҖҒй “иҷҹжҲ– |гҖҚйҖҗдёҖе°ҚжҮүеӨҡеҖӢиҰҸж јгҖӮ</div><button class="btn full" style="margin-top:14px" onclick="createStore()">е„Іеӯҳеә—е®¶</button></div><div class="card"><div class="filters"><inpu function splitMulti(v){return String(v||'').split(/[гҖҒ,пјҢ|пҪң]/).map(x=>x.trim()).filter(Boolean)}
function parseItems(text){if(!/гҖҗ[^гҖ‘]+гҖ‘|е“Ғй …\s*[:пјҡ]|иҰҸж ј\s*[:пјҡ]/.test(text))return parseLegacyItems(text);let section='',current=null,items=[];for(const raw of text.split(/\r?\n/)){const line=raw.trim();if(!line)continue;const header=line.match(/^гҖҗ\s*(.*?)\s*гҖ‘$/);if(header){section=header[1];current=null;continue}const item=line.match(/^е“Ғй …\s*[:пјҡ]\s*(.*?)(?:\s*=\s*(\d+(?:\.\d+)?))?$/);if(item){current={name:item[1].trim(),section,price:Number(item[2]||0),specs:'е–®дёҖиҰҸж ј',optionGroups:[]};if(!current.name)return[];items.push(current);continue}if(/^иҰҸж ј\s*[:пјҡ]?$/.test(line))continue;const group=line.match(/^-\s*\[\s*(.*?)\s*\]\s*[:пјҡ]\s*(.*)$/);if(group&&current){const values=[],adjustments={};for(const part of splitMulti(group[2])){const [label,rawPrice]=part.split('=').map(x=>x.trim());if(!label)return[];values.push(label);if(rawPrice!==undefined){const n=Number(rawPrice.replace(/^\+/,''));if(!Number.isFinite(n))return[];adjustments[label]=n}}const pricing=/еғ№ж ј/.test(group[1])&&values.some(v=>Object.prototype.hasOwnProperty.call(adjustments,v)&&!String(group[2]).includes(v+'=+'));if(pricing&&values.some(v=>!Object.prototype.hasOwnProperty.call(adjustments,v)))return[];current.optionGroups.push({name:group[1],values,adjustments,pricing});continue}return[]}return items}
function parseLegacyItems(text){let section='',items=[];for(const raw of text.split(/\r?\n/)){const line=raw.trim();if(!line)continue;const header=line.match(/^\{\s*е°ҲеҚҖ\s*\}\s*=\s*\{\s*(.*?)\s*\}$/);if(header){section=header[1];continue}const parts=line.split('/');if(parts.length<3)return[];const name=parts.shift().trim(),specText=parts.shift().trim(),priceText=parts.join('/').trim(),specs=splitMulti(specText),prices=splitMulti(priceText).map(x=>Number(x.replace(/[^\d.]/g,'')));if(!name||!specs.length||!prices.length||prices.some(Number.isNaN)||(prices.length!==1&&prices.length!==specs.length))return[];items.push({name,section,specs:specs.join('гҖҒ'),price:prices[0],variants:specs.map((spec,i)=>({spec,price:prices.length===1?prices[0]:prices[i]}))})}return items}
function importMenu(el){const f=el.files[0];if(!f)return;if(f.size>3500000){alert('жӘ”жЎҲи«ӢеӢҝи¶…йҒҺ 3.5MB');el.value='';return}const reader=new FileReader();reader.onload=()=>{$('#filehint').textContent='е·ІйҒёж“Үпјҡ'+f.name;$('#filehint').dataset.file=f.name;$('#filehint').dataset.data=reader.result};reader.readAsDataURL(f)}
function createStore(){const name=$('#sname').value.trim(),raw=$('#sitems').value.trim(),items=parseItems(raw);if(!name)return alert('и«Ӣијёе…Ҙеә—е®¶еҗҚзЁұ');if(!items.length)return alert('йӨҗй»һж јејҸжңүиӘӨгҖӮи«Ӣдҫқз…§дёӢж–№иӘӘжҳҺијёе…Ҙе“Ғй …гҖҒиҰҸж јиҲҮеғ№ж јгҖӮ');const id=$('#sname').dataset.id||crypto.randomUUID(),old=store(id)||{};const rec={...old,id,name,category:$('#scat').value.trim()||'жңӘеҲҶйЎһ',phone:$('#sphone').value.trim(),address:$('#saddress').value.trim(),method:'',note:$('#snote').value.trim(),items,importName:$('#filehint').dataset.file||old.importName||'',importData:$('#filehint').dataset.data||old.importData||''};const i=data.stores.findIndex(s=>s.id===id);i<0?data.stores.push(rec):data.stores[i]=rec;save();state.storeQuery='';admin()}
function itemEditLine(item){const vs=variants(item);return `${item.name}/${vs.map(v=>v.spec).join(',')}/${vs.map(v=>v.price).join(',')}`}
function editStore(id){const s=store(id);state.adminTab=1;state.storeQuery='';state.storeCategory='';admin();$('#sname').value=s.name;$('#sname').dataset.id=s.id;$('#scat').value=s.category||'';$('#sphone').value=s.phone||'';$('#saddress').value=s.address||'';$('#smethod').value='';$('#snote').value=s.note||'';$('#sitems').value=s.items.map(item=>{const groups=optionGroups(item);if(item.priceByOption){const basic=groups.filter(g=>g.name!=='е®№йҮҸ').map(g=>`(${g.name}пјӣ${g.values.join(',')})`).join(',');const cap=groups.find(g=>g.name==='е®№йҮҸ');return `=${item.name}/${basic}/[${cap.values.join(',')}]/${cap.values.map(v=>item.priceByOption.prices[v]).join(',')}`}return `${item.section?`{е°ҲеҚҖ}={${item.section}}\n`:''}${itemEditLine(item)}`}).join('\n');$('#filehint').textContent=s.importName?'зӣ®еүҚйҷ„д»¶пјҡ'+s.importName:'еҸҜйҒёпјҢжӘ”жЎҲдёҠйҷҗ 3.5MB';$('#filehint').dataset.file=s.importName||'';$('#filehint').dataset.data=s.importData||'';window.scrollTo({top:0,behavior:'smooth'})}
function deleteStore(id){if(data.groups.some(g=>g.storeId===id))return alert('йҖҷй–“еә—е·Іжңүй–ӢеңҳзҙҖйҢ„пјҢдёҚиғҪеҲӘйҷӨ');if(confirm('зўәе®ҡиҰҒеҲӘйҷӨйҖҷй–“еә—е—Һпјҹ')){data.stores=data.stores.filter(s=>s.id!==id);save();admin()}}
function previewStore(id){const s=store(id);$('#modal').innerHTML=`<div class="modal"><div class="modalbox"><button class="btn light smallbtn" style="float:right" onclick="closeModal()">й—ңй–ү</button><span class="badge">${esc(s.category||'жңӘеҲҶйЎһ')}</span><h2>${esc(s.name)}</h2><p class="small">${esc(s.method||'')}${s.phone?(s.method?'гғ»':'')+'йӣ»и©ұ '+esc(s.phone):''}</p>${mapHtml(s.address)}${s.items.map(i=>`<div class="menu-item"><div class="grow"><b>${esc(i.name)}</b><div class="small">${variants(i).map(v=>`${esc(v.spec)} NT$ ${v.price.toLocaleString()}`).join('гғ»')}</div></div></div>`).join('')}</div></div>`}
function showMenuFile(id){const s=store(id);const content=s.importData?.startsWith('data:application/pdf')?`<object data="${s.importData}" type="application/pdf" style="width:100%;height:65vh">з„Ўжі•й җиҰҪ PDF</object>`:`<img src="${s.importData}" alt="${esc(s.importName||'иҸңе–®')}" style="width:100%;max-height:70vh;object-fit:contain">`;$('#modal').innerHTML=`<div class="modal"><div class="modalbox" style="width:min(900px,100%)"><button class="btn light smallbtn" style="float:right" onclick="closeModal()">й—ңй–ү</button><h2>${esc(s.name)}иҸңе–®</h2>${content}</div></div>`}
function adminOrders(){const tabs=`<div class="tabs" style="padding:0 0 14px"><button class="tab ${state.orderTab===0?'on':''}" onclick="state.orderTab=0;admin()">жҜҸж¬Ўй–Ӣеңҳ</button><button class="tab ${state.orderTab===1?'on':''}" onclick="state.orderTab=1;admin()">йҒҺеҫҖй–Ӣеңҳ</button></div>`;return `<h2 class="section-title">иЁӮе–®з®ЎзҗҶ</h2>${tabs}${state.orderTab===0?currentOrdersAdmin():pastOrdersAdmin()}`}
function aggregate(os){const map={};os.forEach(o=>o.items.forEach(x=>{const k=x.name+'пјҸ'+(x.spec||'е–®дёҖиҰҸж ј');map[k]=(map[k]||0)+(Number(x.qty)||0)}));return map}
function currentOrdersAdmin(){const date=state.orderDate||localDate(new Date());const groups=data.groups.filter(g=>localDate(g.createdAt)===date).sort((a,b)=>(store(a.storeId)?.name||'').localeCompare(store(b.storeId)?.name||'','zh-Hant'));const allOrders=groups.flatMap(g=>data.orders.filter(o=>o.groupId===g.id));return `<div class="card form"><label style="margin-top:0">й–Ӣеңҳж—Ҙжңҹ</label><input type="date" value="${date}" onchange="state.orderDate=this.value;admin()"></div>${groups.map(g=>adminGroupCard(g,true)).join('')||'<div class="empty">йҖҷдёҖеӨ©жІ’жңүй–ӢеңҳзҙҖйҢ„</div>'}<div class="card total"><span>з•¶ж—ҘжүҖжңүиЁӮе–®зёҪйҮ‘йЎҚ</span><span>NT$ ${allOrders.reduce((a,o)=>a+Number(o.total||0),0).toLocaleString()}</span></div>`}
function adminGroupCard(g){const s=store(g.storeId)||{},os=data.orders.filter(o=>o.groupId===g.id).sort((a,b)=>{const ai=a.items[0]?.name||'',bi=b.items[0]?.name||'';return ai.localeCompare(bi,'zh-Hant')||new Date(a.createdAt)-new Date(b.createdAt)}),summary=aggregate(os);return `<article class="card store-section"><div class="between"><div><h3>${esc(s.name||'е·ІеҲӘйҷӨеә—е®¶')}${s.phone?` <a href="tel:${esc(s.phone)}" class="badge" style="vertical-align:middle;text-decoration:none">вҳҺ ${esc(s.phone)}</a>`:''}</h3><div class="small">й–ӢеңҳиҖ…пјҡ${esc(g.creator||'жңӘеЎ«еҜ«')}гғ»${fmt(g.createdAt)}</div></div><button class="btn light smallbtn" onclick="openManualOrder('${g.id}')">пјӢ ж–°еўһиЁӮе–®</button></div><div class="summary"><b>е“Ғй …ж•ёйҮҸеҠ зёҪ</b><br>${Object.entries(summary).sort(([a],[b])=>a.localeCompare(b,'zh-Hant')).map(([k,v])=>`${esc(k)} Г— ${v}`).join('<br>')||'е°ҡз„Ўе“Ғй …'}<br><b>иЁӮе–®зёҪйҮ‘йЎҚпјҡNT$ ${os.reduce((a,o)=>a+Number(o.total||0),0).toLocaleString()}</b></div>${os.map(o=>`<div class="order order-grid"><b>${esc(o.buyer)}</b><div class="details">${orderLines(o)}<div class="money">NT$ ${Number(o.total||0).toLocaleString()}</div></div><div class="adminlist"><button class="pill ${o.paid?'paid':'unpaid'}" onclick="togglePay('${o.id}')">${o.paid?'е·Ід»ҳж¬ҫ':'жңӘд»ҳж¬ҫ'}</button><button class="btn light smallbtn" onclick="removeOrder('${o.id}')">з§»йҷӨ</button></div></div>`).join('')||'<p class="small">е°ҡз„ЎиЁӮе–®</p>'}</article>`}
function pastOrdersAdmin(){const groups=[...data.groups].sort((a,b)=>localDate(b.createdAt).localeCompare(localDate(a.createdAt))||(store(a.storeId)?.name||'').localeCompare(store(b.storeId)?.name||'','zh-Hant'));let last='';return groups.map(g=>{const d=localDate(g.createdAt),heading=d!==last?`<h3 class="date-heading">${fmt(g.createdAt,false)}</h3>`:'';last=d;return heading+adminGroupCard(g)}).join('')||'<div class="empty">е°ҡз„ЎйҒҺеҫҖй–ӢеңҳиЁӮе–®</div>'}
function togglePay(id){const o=data.orders.find(x=>x.id===id);if(!o)return;o.paid=!o.paid;save();admin()}
function openManualOrder(groupId){const g=group(groupId),s=g&&store(g.storeId);if(!g||!s)return;$('#modal').innerHTML=`<div class="modal"><div class="modalbox form"><h2>жүӢеӢ•ж–°еўһиЁӮе–®</h2><p class="small">${esc(s.name)}</p><label>иЁӮиіјдәә</label><input id="manualBuyer" maxlength="30" placeholder="и«Ӣијёе…Ҙе§“еҗҚ"><label>йӨҗй»һе…§е®№пјҲжҜҸиЎҢпјҡе“Ғй …/иҰҸж ј/ж•ёйҮҸ/е–®еғ№пјү</label><textarea id="manualItems" placeholder="йӣһи…ҝйЈҜ/жӯЈеёё/1/120&#10;зҙ…иҢ¶/еӨ§жқҜ/2/35"></textarea><div class="hint">е–®еғ№жңғз”Ёж–јиЁҲз®—иЁӮе–®зёҪйҮ‘йЎҚгҖӮ</div><div class="row" style="margin-top:16px"><button class="btn light" onclick="closeModal()">еҸ–ж¶Ҳ</button><button class="btn" onclick="saveManualOrder('${groupId}')">ж–°еўһиЁӮе–®</button></div></div></div>`}
function saveManualOrder(groupId){const buyer=$('#manualBuyer').value.trim(),raw=$('#manualItems').value.trim();if(!buyer)return alert('и«Ӣијёе…ҘиЁӮиіјдәә');const items=raw.split(/\r?\n/).filter(Boolean).map(line=>{const [name,spec,qty,price]=line.split('/').map(x=>x.trim());return {name,spec,qty:Number(qty),price:Number(String(price||'').replace(/[^\d.]/g,''))}}).filter(x=>x.name&&x.spec&&Number.isFinite(x.qty)&&x.qty>0&&Number.isFinite(x.price)&&x.price>=0);if(!items.length||items.length!==raw.split(/\r?\n/).filter(Boolean).length)return alert('йӨҗй»һж јејҸжңүиӘӨпјҢи«ӢдҪҝз”ЁгҖҢе“Ғй …/иҰҸж ј/ж•ёйҮҸ/е–®еғ№гҖҚгҖӮ');data.orders.push({id:crypto.randomUUID(),groupId,buyer,items,total:items.reduce((sum,x)=>sum+x.qty*x.price,0),paid:false,createdAt:new Date().toISOString()});save();closeModal();admin()}
function removeOrder(id){if(!confirm('зўәе®ҡиҰҒз§»йҷӨйҖҷзӯҶиЁӮе–®е—ҺпјҹжӯӨж“ҚдҪңжңғеҗҢжӯҘжӣҙж–°жӯ·еҸІиЁӮе–®гҖӮ'))return;data.orders=data.orders.filter(o=>o.id!==id);save();admin()}
function adminSettings(){return `<h2 class="section-title">иЁӯе®ҡ</h2><div class="card form"><label>и®Ҡжӣҙз®ЎзҗҶеҜҶзўј</label><input id="newpass" type="password" placeholder="иҮіе°‘ 4 еҖӢеӯ—е…ғ"><button class="btn full" style="margin-top:14px" onclick="changePass()">е„Іеӯҳж–°еҜҶзўј</button></div><div class="card"><b>иіҮж–ҷеҗҢжӯҘ</b><p class="small">зі»зөұжңғиҮӘеӢ•еҗҢжӯҘеңҳиіјгҖҒеә—е®¶иҲҮиЁӮе–®иіҮж–ҷпјӣз¶Іи·Ҝдёӯж–·жҷӮжңғе…ҲдҝқеӯҳеңЁжӯӨиЈқзҪ®гҖӮ</p></div><div class="card"><div class="between"><b>App зүҲжң¬</b><span class="badge">${APP_VERSION}</span></div><p class="small">${COPYRIGHT}</p><div class="adminlist"><button class="btn light smallbtn" onclick="showLegal('terms')">дҪҝз”ЁиҖ…жўқж¬ҫ</button><button class="btn light smallbtn" onclick="showLegal('privacy')">йҡұз§Ғж¬Ҡж”ҝзӯ–</button></div></div>`}
function showLegal(kind){const terms=`дҪҝз”ЁиҖ…жўқж¬ҫ\n\n1. жң¬жңҚеӢҷз”Ёж–јеңҳиіјй»һйӨҗиҲҮиЁӮе–®з®ЎзҗҶгҖӮ\n2. дҪҝз”ЁиҖ…жҮүжҸҗдҫӣжӯЈзўәзҡ„иЁӮиіјиіҮж–ҷпјҢдёҰиҮӘиЎҢзўәиӘҚйӨҗй»һгҖҒж•ёйҮҸиҲҮд»ҳж¬ҫзӢҖж…ӢгҖӮ\n3. з®ЎзҗҶиҖ…иІ иІ¬з®ЎзҗҶеә—е®¶гҖҒй–ӢеңҳгҖҒд»ҳж¬ҫиҝҪи№ӨеҸҠеңҳиіјиіҮж–ҷгҖӮ\n4. жңӘз¶“жҺҲж¬ҠдёҚеҫ—е№Іж“ҫгҖҒз ҙеЈһжҲ–еҳ—и©ҰеӯҳеҸ–д»–дәәиіҮж–ҷгҖӮ\n5. жң¬жңҚеӢҷеҫ—дҫқеҠҹиғҪз¶ӯиӯ·йңҖиҰҒжӣҙж–°е…§е®№гҖӮ`;const privacy=`йҡұз§Ғж¬Ҡж”ҝзӯ–\n\n1. зӮәжҸҗдҫӣеңҳиіјеҠҹиғҪпјҢзі»зөұжңғе„Іеӯҳеә—е®¶иіҮж–ҷгҖҒй–ӢеңҳиіҮиЁҠгҖҒиЁӮиіјдәәеҗҚзЁұгҖҒйӨҗй»һе…§е®№гҖҒж•ёйҮҸиҲҮд»ҳж¬ҫзӢҖж…ӢгҖӮ\n2. иіҮж–ҷжңғеҗҢжӯҘиҮіжң¬жңҚеӢҷдҪҝз”Ёзҡ„йӣІз«ҜиіҮж–ҷеә«пјҢдҫӣеҗҢдёҖеңҳиіјзҡ„дҪҝз”ЁиҖ…иҲҮз®ЎзҗҶиҖ…и®ҖеҸ–гҖӮ\n3. и«ӢеӢҝеңЁиЁӮе–®ж¬„дҪҚијёе…Ҙиә«еҲҶиӯүиҷҹгҖҒйҠҖиЎҢеёіиҷҹжҲ–е…¶д»–дёҚеҝ…иҰҒзҡ„ж•Ҹж„ҹиіҮж–ҷгҖӮ\n4. иіҮж–ҷеғ…з”Ёж–јеңҳиіјй»һйӨҗгҖҒд»ҳж¬ҫиҝҪи№ӨиҲҮжңҚеӢҷз¶ӯиӯ·пјӣдёҚдҪңе»Је‘ҠиІ©е”®з”ЁйҖ”гҖӮ\n5. еҰӮйңҖжӣҙжӯЈжҲ–еҲӘйҷӨиіҮж–ҷпјҢи«ӢиҒҜзөЎеңҳиіјз®ЎзҗҶиҖ…иҷ•зҗҶгҖӮ`;const title=kind==='privacy'?'йҡұз§Ғж¬Ҡж”ҝзӯ–':'дҪҝз”ЁиҖ…жўқж¬ҫ';$('#modal').innerHTML=`<div class="modal"><div class="modalbox"><button class="btn light smallbtn" style="float:right" onclick="closeModal()">й—ңй–ү</button><h2>${title}</h2><div class="legal small">${esc(kind==='privacy'?privacy:terms)}</div><hr class="divider"><div class="small">${APP_VERSION}гғ»${COPYRIGHT}</div></div></div>`}

   $('#view').innerHTML=`<button class="btn light" onclick="go('home')">иҝ”еӣһеңҳиіј</button><div class="card" style="margin-top:14px"><div class="store-head"><div><span class="badge">${esc(s.category||'жңӘеҲҶйЎһ')}</span><h2>${esc(s.name)}</h2><div class="small">${s.phone?'йӣ»и©ұ '+esc(s.phone):''}</div></div><div class="deadline open">${g.payee?'рҹ’Ід»ҳж¬ҫиҖ…пјҡ'+esc(g.payee)+'гғ»':''}ж”¶е–® ${fmt(g.deadline)}</div></div>${s.note?`<p class="small">${esc(s.note)}</p>`:''}${mapHtml(s.address)}${s.importData?`<button class="btn light full" onclick="showMenuFile('${s.id}')">жҹҘзңӢеҺҹе§ӢиҸңе–®</button>`:''}<div class="summary"><b>иҮЁжҷӮиҸңе–®й»һйӨҗ</b><br>и«ӢжҹҘзңӢеҺҹе§ӢиҸңе–®пјҢеҶҚиҮӘиЎҢеЎ«еҜ«иЁӮиіје•Ҷе“ҒгҖӮ</div><button class="btn full" onclick="startQuickOrder()">й–Ӣе§Ӣй»һйӨҗ</button></div>`;return;
 }
 const namedSections=[...new Set(s.items.map(x=>x.section||'е…¶д»–'))],sections=['е…ЁйғЁе•Ҷе“Ғ',...namedSections];if(!sections.includes(state.menuSection))state.menuSection='е…ЁйғЁе•Ҷе“Ғ';
 const listed=s.items.map((x,i)=>Object.assign({},x,{_menuIndex:i})).filter(x=>state.menuSection==='е…ЁйғЁе•Ҷе“Ғ'||(x.section||'е…¶д»–')===state.menuSection);
 const tabs=sections.length>2?`<div class="tabs" style="padding:0 0 12px">${sections.map(section=>`<button class="tab ${state.menuSection===section?'on':''}" data-section="${esc(section)}" onclick="setMenuSection(this.dataset.section)">${esc(section)}</button>`).join('')}</div>`:'';
 $('#view').innerHTML=`<button class="btn light" onclick="go('home')">иҝ”еӣһеңҳиіј</button><div class="card" style="margin-top:14px"><div class="store-head"><div><span class="badge">${esc(s.category||'жңӘеҲҶйЎһ')}</span><h2>${esc(s.name)}</h2><div class="small">${s.phone?'йӣ»и©ұ '+esc(s.phone):''}</div></div><div class="deadline open">${g.payee?'рҹ’Ід»ҳж¬ҫиҖ…пјҡ'+esc(g.payee)+'гғ»':''}ж”¶е–® ${fmt(g.deadline)}</div></div>${s.note?`<p class="small">${esc(s.note)}</p>`:''}${mapHtml(s.address)}${s.importData?`<button class="btn light full" onclick="showMenuFile('${s.id}')">жҹҘзңӢеҺҹе§ӢиҸңе–®</button>`:''}<hr class="divider">${tabs}${sectionedMenuItems(listed)||'<p class="small">йҖҷй–“еә—е°ҡжңӘе»әз«ӢйӨҗй»һгҖӮ</p>'}</div>`;
}
function startQuickOrder(){state.quickRows=[{name:'',spec:'',qty:1,price:''}];state.buyer='';go('order')}
function quickRowsHtml(){return state.quickRows.map((r,i)=>`<div class="quick-row"><div class="quick-grid"><div class="wide"><label>е“Ғй …${reqMark()}</label><input value="${esc(r.name)}" oninput="quickSet(${i},'name',this.value)" placeholder="дҫӢеҰӮпјҡйӣһи…ҝйЈҜ"></div><div><label>иҰҸж јпјҲйҒёеЎ«пјү</label><input value="${esc(r.spec)}" oninput="quickSet(${i},'spec',this.value)" placeholder="дҫӢеҰӮпјҡеӨ§д»Ҫ"></div><div><label>ж•ёйҮҸ${reqMark()}</label><input type="number" min="1" step="1" inputmode="numeric" value="${r.qty}" oninput="quickSet(${i},'qty',this.value)"></div><div><label>е–®еғ№${reqMark()}</label><input type="number" min="0" step="1" inputmode="decimal" value="${esc(r.price)}" oninput="quickSet(${i},'price',this.value)" placeholder="0"></div><button class="btn danger smallbtn quick-remove" ${state.quickRows.length===1?'disabled':''} onclick="removeQuickRow(${i})">з§»йҷӨ</button></div></div>`).join('')}
function quickSet(i,key,value){state.quickRows[i][key]=value;updateQuickTotal()}
function addQuickRow(){state.quickRows.push({name:'',spec:'',qty:1,price:''});quickOrderForm()}
function removeQuickRow(i){if(state.quickRows.length===1)return;state.quickRows.splice(i,1);quickOrderForm()}
function updateQuickTotal(){const total=state.quickRows.reduce((sum,r)=>sum+(Number(r.qty)||0)*(Number(r.price)||0),0);if($('#quickTotal'))$('#quickTotal').textContent='NT$ '+total.toLocaleString()}
function quickOrderForm(){
 const g=group(state.group),s=g&&store(g.storeId);if(!g||!s)return go('home');
 $('#headline').textContent='еЎ«еҜ«иЁӮе–®';
 $('#view').innerHTML=`<button class="btn light" onclick="go('menu')">иҝ”еӣһиҸңе–®</button><div class="card form" style="margin-top:14px">${s.importData?`<button class="btn light full" onclick="showMenuFile('${s.id}')">жҹҘзңӢеҺҹе§ӢиҸңе–®</button>`:''}<label>иЁӮиіјдәә${reqMark()}</label><input id="buyer" maxlength="30" placeholder="и«Ӣијёе…Ҙе§“еҗҚ" value="${esc(state.buyer||'')}" oninput="state.buyer=this.value"><div class="between" style="margin-top:16px"><b>иЁӮиіје•Ҷе“Ғ</b><button class="btn light smallbtn" onclick="addQuickRow()">пјӢ ж–°еўһе“Ғй …</button></div>${quickRowsHtml()}<div class="total"><span>зёҪйҮ‘йЎҚ</span><span id="quickTotal">NT$ 0</span></div><button class="btn full" onclick="submitQuickOrder()">йҖҒеҮәиЁӮе–®</button></div>`;updateQuickTotal();
}

async function submitQuickOrder(){
 const g=group(state.group);if(!isOpen(g)){alert('йҖҷеҖӢеңҳиіје·Із¶“зөҗжқҹ');return go('home')}
 const buyer=$('#buyer').value.trim();if(!buyer)return alert('и«Ӣијёе…ҘиЁӮиіјдәә');
 const items=state.quickRows.map(r=>({name:String(r.name||'').trim(),spec:String(r.spec||'').trim()||'жңӘеЎ«иҰҸж ј',qty:Number(r.qty),price:Number(r.price)}));
 if(items.some(x=>!x.name))return alert('и«Ӣе®Ңж•ҙеЎ«еҜ«жҜҸдёҖзӯҶе“Ғй …');
 if(items.some(x=>!Number.isInteger(x.qty)||x.qty<1))return alert('ж•ёйҮҸеҝ…й ҲзӮә 1 д»ҘдёҠзҡ„ж•ҙж•ё');
 if(items.some(x=>!Number.isFinite(x.price)||x.price<0))return alert('и«ӢеЎ«еҜ«жӯЈзўәзҡ„е–®еғ№');
 const newOrder={id:crypto.randomUUID(),groupId:g.id,buyer,items,total:items.reduce((a,x)=>a+x.qty*x.price,0),paid:false,createdAt:new Date().toISOString()};
 try{const r=await fetch(SUPABASE_URL+'/rest/v1/rpc/append_together_order',{method:'POST',headers,body:JSON.stringify({new_order:newOrder})});if(!r.ok)throw new Error(await r.text());data=normalize(await r.json());localStorage.setItem(KEY,JSON.stringify(data))}
 catch(e){data.orders.push(newOrder);save()}
 state.quickRows=[];showOrderSuccess();
}
function render(){
 const p=state.page;$('#tabs').classList.add('hidden');$('#adminBar').classList.add('hidden');
 document.querySelectorAll('.nav').forEach((x,i)=>x.classList.toggle('on',(p==='home'&&i===0)||(p==='history'&&i===1)||(p==='admin'&&i===2)));
 if(p==='home')home();else if(p==='menu')menu();else if(p==='order'){const s=store(group(state.group)?.storeId);s?.quickMenu?quickOrderForm():orderForm()}else if(p==='history')history();else admin();
}

render();loadSharedState();setInterval(()=>{if(state.page==='home'||state.page==='history')loadSharedState()},12000);

let jjSignatureTimer=null;
function syncAdminSignature(){
  const signature=document.querySelector('.jj-signature');
  const adminBar=document.querySelector('#adminBar');
  if(!signature||!adminBar)return;
  clearTimeout(jjSignatureTimer);
  signature.classList.remove('show');
  if(!adminBar.classList.contains('hidden')){
    jjSignatureTimer=setTimeout(()=>{
      if(!adminBar.classList.contains('hidden')) signature.classList.add('show');
    },2000);
  }
}
document.addEventListener('DOMContentLoaded',()=>{
  const adminBar=document.querySelector('#adminBar');
  if(adminBar){
    new MutationObserver(syncAdminSignature).observe(adminBar,{attributes:true,attributeFilter:['class']});
  }
  syncAdminSignature();
});

function pendingMenuFiles(){try{return JSON.parse($('#filehint')?.dataset.files||'[]')}catch{return[]}}
function renderPendingMenuFiles(){const h=$('#filehint'),box=$('#menuFileList');if(!h)return;const list=pendingMenuFiles();h.textContent=list.length?`е·ІйҒёж“Ү ${list.length} еҖӢжӘ”жЎҲпјҢеҸҜеҖӢеҲҘз§»йҷӨеҫҢеҶҚе„Іеӯҳ`:'еҸҜйҒёпјҢжҜҸеҖӢжӘ”жЎҲдёҠйҷҗ 3.5MB';if(box)box.innerHTML=list.map((f,i)=>`<div class="small" style="display:flex;justify-content:space-between;gap:8px;margin-top:6px"><span>${esc(f.name)}</span><button class="btn light smallbtn" type="button" onclick="removeMenuFile(${i})">з§»йҷӨ</button></div>`).join('')}
function removeMenuFile(i){const list=pendingMenuFiles();list.splice(i,1);$('#filehint').dataset.files=JSON.stringify(list);renderPendingMenuFiles()}
function importMenus(el){const files=[...el.files];if(!files.length)return;if(files.some(f=>f.size>3500000)){alert('жҜҸеҖӢжӘ”жЎҲи«ӢеӢҝи¶…йҒҺ 3.5MB');el.value='';return}Promise.all(files.map(f=>new Promise(resolve=>{const r=new FileReader();r.onload=()=>resolve({name:f.name,data:r.result});r.readAsDataURL(f)}))).then(list=>{$('#filehint').dataset.files=JSON.stringify([...pendingMenuFiles(),...list]);el.value='';renderPendingMenuFiles()})}
function createStore(){const name=$('#sname').value.trim(),mode=state.storeBuildMode||'full',raw=$('#sitems')?.value.trim()||'',items=mode==='full'?parseItems(raw):[];if(!name)return alert('и«Ӣијёе…Ҙеә—е®¶еҗҚзЁұ');if(mode==='full'&&!items.length)return alert('и«Ӣијёе…ҘиҮіе°‘дёҖеҖӢйӨҗй»һ');const id=$('#sname').dataset.id||crypto.randomUUID(),old=store(id)||{};let files=pendingMenuFiles();if(!files.length)files=old.menuFiles||(old.importData?[{name:old.importName||'иҸңе–®',data:old.importData}]:[]);if(mode==='quick'&&!files.length)return alert('и«Ӣе…ҲдёҠеӮіиҸңе–®жӘ”жЎҲ');const rec={...old,id,name,category:$('#scat').value.trim()||'',phone:$('#sphone').value.trim(),address:$('#saddress').value.trim(),method:'',note:$('#snote').value.trim(),items,quickMenu:mode==='quick',menuFiles:files,importName:files[0]?.name||'',importData:files[0]?.data||''};const i=data.stores.findIndex(s=>s.id===id);i<0?data.stores.push(rec):data.stores[i]=rec;save();state.storeQuery='';state.storeBuildMode='full';admin()}
function editStore(id){const s=store(id),files=s.menuFiles?.length?s.menuFiles:(s.importData?[{name:s.importName||'иҸңе–®',data:s.importData}]:[]);state.adminTab=1;state.storeQuery='';state.storeCategory='';state.storeBuildMode=s.quickMenu?'quick':'full';admin();$('#sname').value=s.name;$('#sname').dataset.id=s.id;$('#scat').value=s.category||'';$('#sphone').value=s.phone||'';$('#saddress').value=s.address||'';$('#snote').value=s.note||'';if($('#sitems'))$('#sitems').value=serializeBlockItems(s.items||[]);$('#filehint').dataset.files=JSON.stringify(files);renderPendingMenuFiles();setStoreBuildMode(state.storeBuildMode);window.scrollTo({top:0,behavior:'smooth'})}
const originalAdmin=admin;admin=function(){originalAdmin();const f=$('#view input[type="file"]');if(f){f.multiple=true;f.onchange=()=>importMenus(f);const label=f.previousElementSibling;if(label)label.textContent='еҺҹе§ӢиҸңе–®пјҲеҸҜеӨҡйҒё PDFпјҸJPGпјҸPNGпјү';if(!$('#menuFileList'))f.insertAdjacentHTML('afterend','<div id="menuFileList"></div>');renderPendingMenuFiles()}};
</script>

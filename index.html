    const itemKey=JSON.stringify((o.items||[]).map(x=>[x.name,x.spec,Number(x.qty)||0,Number(x.price)||0]));
    const key=o.id||[o.groupId,o.buyer,o.createdAt,o.total,itemKey].join('|');
    if(seen.has(key))return false;
    seen.add(key);return true;
  });
}

function deleteGroup(id){const related=data.orders.filter(o=>o.groupId===id).length;if(!confirm(`確定要刪除這次開團嗎？將同步刪除 ${related} 筆訂單與歷史訂單資料。`))return;data.orders=data.orders.filter(o=>o.groupId!==id);data.groups=data.groups.filter(g=>g.id!==id);save();admin()}
function adminStores(){const categories=[...new Set(['飲料','主食',...data.stores.map(s=>s.category).filter(Boolean)])];const q=state.storeQuery||'',cat=state.storeCategory||'';const filtered=data.stores.filter(s=>(!q||(s.name+' '+s.note+' '+s.address+' '+s.items.map(i=>i.name).join(' ')).toLowerCase().includes(q.toLowerCase()))&&(!cat||s.category===cat));return `<h2 class="section-title">店家與菜單</h2><div class="card form"><label>店家名稱</label><input id="sname" placeholder="例如：好味便當"><div class="row"><div><label>分類</label><input id="scat" list="categoryList" placeholder="飲料、主食或自訂分類"><datalist id="categoryList">${categories.map(x=>`<option value="${esc(x)}">`).join('')}</datalist></div><div><label>店家電話</label><input id="sphone" type="tel" inputmode="tel" placeholder="例如：02-1234-5678"></div></div><label>店家地址</label><input id="saddress" placeholder="例如：台北市信義區市府路45號"><div class="hint">地址會自動帶入 Google 地圖，不需要設定金鑰。</div><label>取餐方式</label><input id="smethod" placeholder="例如：自取、外送、現場付款"><label>點餐備註</label><textarea id="snote" placeholder="辣度、取餐地點或其他提醒"></textarea><label>原始菜單（PDF／JPG／PNG）</label><input type="file" accept=".pdf,image/jpeg,image/png" onchange="importMenu(this)"><div class="filehint" id="filehint">可選，檔案上限 3.5MB</div><label>餐點內容（每行：品項/規格/價格）</label><textarea id="sitems" placeholder="雞腿飯/正常/120&#10;紅茶/小杯,大杯/25,35&#10;咖啡/冰、熱/60"></textarea><div class="hint">規格可用「逗號、頓號或 |」輸入兩種以上；價格可輸入單一價格（套用所有規格），或用「逗號、頓號或 |」逐一對應多個規格。</div><button class="btn full" style="margin-top:14px" onclick="createStore()">儲存店家</button></div><div class="card"><div class="filters"><input aria-label="關鍵字查詢" placeholder="搜尋店家、餐點、備註或地址" value="${esc(q)}" oninput="state.storeQuery=this.value;admin()"><select aria-label="分類查詢" onchange="state.storeCategory=this.value;admin()"><option value="">全部分類</option>${categories.map(x=>`<option ${cat===x?'selected':''}>${esc(x)}</option>`).join('')}</select></div><b>已建立店家（${filtered.length}）</b>${filtered.map(s=>`<div class="order"><b>${esc(s.name)}</b><span class="badge" style="float:right">${esc(s.category||'未分類')}</span><div class="small">${s.items.length} 個品項・${esc(s.phone||'未填電話')}・${esc(s.address||'未填地址')}・${esc(s.importName||'無附件')}</div><div class="adminlist" style="margin-top:7px"><button class="btn light smallbtn" onclick="previewStore('${s.id}')">預覽</button><button class="btn light smallbtn" onclick="editStore('${s.id}')">編輯</button><button class="btn danger smallbtn" onclick="deleteStore('${s.id}')">刪除</button></div></div>`).join('')||'<p class="small">沒有符合條件的店家</p>'}</div>`}
function splitMulti(v){return String(v||'').split(/[、,，|｜]/).map(x=>x.trim()).filter(Boolean)}
function parseItems(text){if(!/【[^】]+】|品項\s*[:：]|規格\s*[:：]/.test(text))return parseLegacyItems(text);let section='',current=null,items=[];for(const raw of text.split(/\r?\n/)){const line=raw.trim();if(!line)continue;const header=line.match(/^【\s*(.*?)\s*】$/);if(header){section=header[1];current=null;continue}const item=line.match(/^品項\s*[:：]\s*(.*?)(?:\s*=\s*(\d+(?:\.\d+)?))?$/);if(item){current={name:item[1].trim(),section,price:Number(item[2]||0),specs:'單一規格',optionGroups:[]};if(!current.name)return[];items.push(current);continue}if(/^規格\s*[:：]?$/.test(line))continue;const group=line.match(/^-\s*\[\s*(.*?)\s*\]\s*[:：]\s*(.*)$/);if(group&&current){const values=[],adjustments={};for(const part of splitMulti(group[2])){const [label,rawPrice]=part.split('=').map(x=>x.trim());if(!label)return[];values.push(label);if(rawPrice!==undefined){const n=Number(rawPrice.replace(/^\+/,''));if(!Number.isFinite(n))return[];adjustments[label]=n}}const pricing=/價格/.test(group[1])&&values.some(v=>Object.prototype.hasOwnProperty.call(adjustments,v)&&!String(group[2]).includes(v+'=+'));if(pricing&&values.some(v=>!Object.prototype.hasOwnProperty.call(adjustments,v)))return[];current.optionGroups.push({name:group[1],values,adjustments,pricing});continue}return[]}return items}
function parseLegacyItems(text){let section='',items=[];for(const raw of text.split(/\r?\n/)){const line=raw.trim();if(!line)continue;const header=line.match(/^\{\s*專區\s*\}\s*=\s*\{\s*(.*?)\s*\}$/);if(header){section=header[1];continue}const parts=line.split('/');if(parts.length<3)return[];const name=parts.shift().trim(),specText=parts.shift().trim(),priceText=parts.join('/').trim(),specs=splitMulti(specText),prices=splitMulti(priceText).map(x=>Number(x.replace(/[^\d.]/g,'')));if(!name||!specs.length||!prices.length||prices.some(Number.isNaN)||(prices.length!==1&&prices.length!==specs.length))return[];items.push({name,section,specs:specs.join('、'),price:prices[0],variants:specs.map((spec,i)=>({spec,price:prices.length===1?prices[0]:prices[i]}))})}return items}
function importMenu(el){const f=el.files[0];if(!f)return;if(f.size>3500000){alert('檔案請勿超過 3.5MB');el.value='';return}const reader=new FileReader();reader.onload=()=>{$('#filehint').textContent='已選擇：'+f.name;$('#filehint').dataset.file=f.name;$('#filehint').dataset.data=reader.result};reader.readAsDataURL(f)}
function createStore(){const name=$('#sname').value.trim(),raw=$('#sitems').value.trim(),items=parseItems(raw);if(!name)return alert('請輸入店家名稱');if(!items.length)return alert('餐點格式有誤。請依照下方說明輸入品項、規格與價格。');const id=$('#sname').dataset.id||crypto.randomUUID(),old=store(id)||{};const rec={...old,id,name,category:$('#scat').value.trim()||'未分類',phone:$('#sphone').value.trim(),address:$('#saddress').value.trim(),method:'',note:$('#snote').value.trim(),items,importName:$('#filehint').dataset.file||old.importName||'',importData:$('#filehint').dataset.data||old.importData||''};const i=data.stores.findIndex(s=>s.id===id);i<0?data.stores.push(rec):data.stores[i]=rec;save();state.storeQuery='';admin()}
function itemEditLine(item){const vs=variants(item);return `${item.name}/${vs.map(v=>v.spec).join(',')}/${vs.map(v=>v.price).join(',')}`}
function editStore(id){const s=store(id);state.adminTab=1;state.storeQuery='';state.storeCategory='';admin();$('#sname').value=s.name;$('#sname').dataset.id=s.id;$('#scat').value=s.category||'';$('#sphone').value=s.phone||'';$('#saddress').value=s.address||'';$('#smethod').value='';$('#snote').value=s.note||'';$('#sitems').value=s.items.map(item=>{const groups=optionGroups(item);if(item.priceByOption){const basic=groups.filter(g=>g.name!=='容量').map(g=>`(${g.name}；${g.values.join(',')})`).join(',');const cap=groups.find(g=>g.name==='容量');return `=${item.name}/${basic}/[${cap.values.join(',')}]/${cap.values.map(v=>item.priceByOption.prices[v]).join(',')}`}return `${item.section?`{專區}={${item.section}}\n`:''}${itemEditLine(item)}`}).join('\n');$('#filehint').textContent=s.importName?'目前附件：'+s.importName:'可選，檔案上限 3.5MB';$('#filehint').dataset.file=s.importName||'';$('#filehint').dataset.data=s.importData||'';window.scrollTo({top:0,behavior:'smooth'})}
function deleteStore(id){if(data.groups.some(g=>g.storeId===id))return alert('這間店已有開團紀錄，不能刪除');if(confirm('確定要刪除這間店嗎？')){data.stores=data.stores.filter(s=>s.id!==id);save();admin()}}
function previewStore(id){const s=store(id);$('#modal').innerHTML=`<div class="modal"><div class="modalbox"><button class="btn light smallbtn" style="float:right" onclick="closeModal()">關閉</button><span class="badge">${esc(s.category||'未分類')}</span><h2>${esc(s.name)}</h2><p class="small">${esc(s.method||'')}${s.phone?(s.method?'・':'')+'電話 '+esc(s.phone):''}</p>${mapHtml(s.address)}${s.items.map(i=>`<div class="menu-item"><div class="grow"><b>${esc(i.name)}</b><div class="small">${variants(i).map(v=>`${esc(v.spec)} NT$ ${v.price.toLocaleString()}`).join('・')}</div></div></div>`).join('')}</div></div>`}
function showMenuFile(id){const s=store(id);const content=s.importData?.startsWith('data:application/pdf')?`<object data="${s.importData}" type="application/pdf" style="width:100%;height:65vh">無法預覽 PDF</object>`:`<img src="${s.importData}" alt="${esc(s.importName||'菜單')}" style="width:100%;max-height:70vh;object-fit:contain">`;$('#modal').innerHTML=`<div class="modal"><div class="modalbox" style="width:min(900px,100%)"><button class="btn light smallbtn" style="float:right" onclick="closeModal()">關閉</button><h2>${esc(s.name)}菜單</h2>${content}</div></div>`}
function adminOrders(){const tabs=`<div class="tabs" style="padding:0 0 14px"><button class="tab ${state.orderTab===0?'on':''}" onclick="state.orderTab=0;admin()">每次開團</button><button class="tab ${state.orderTab===1?'on':''}" onclick="state.orderTab=1;admin()">過往開團</button></div>`;return `<h2 class="section-title">訂單管理</h2>${tabs}${state.orderTab===0?currentOrdersAdmin():pastOrdersAdmin()}`}
function aggregate(os){const map={};os.forEach(o=>o.items.forEach(x=>{const k=x.name+'／'+(x.spec||'單一規格');map[k]=(map[k]||0)+(Number(x.qty)||0)}));return map}
function currentOrdersAdmin(){const date=state.orderDate||localDate(new Date());const groups=data.groups.filter(g=>localDate(g.createdAt)===date).sort((a,b)=>(store(a.storeId)?.name||'').localeCompare(store(b.storeId)?.name||'','zh-Hant'));const allOrders=groups.flatMap(g=>data.orders.filter(o=>o.groupId===g.id));return `<div class="card form"><label style="margin-top:0">開團日期</label><input type="date" value="${date}" onchange="state.orderDate=this.value;admin()"></div>${groups.map(g=>adminGroupCard(g,true)).join('')||'<div class="empty">這一天沒有開團紀錄</div>'}<div class="card total"><span>當日所有訂單總金額</span><span>NT$ ${allOrders.reduce((a,o)=>a+Number(o.total||0),0).toLocaleString()}</span></div>`}
function adminGroupCard(g){const s=store(g.storeId)||{},os=data.orders.filter(o=>o.groupId===g.id).sort((a,b)=>{const ai=a.items[0]?.name||'',bi=b.items[0]?.name||'';return ai.localeCompare(bi,'zh-Hant')||new Date(a.createdAt)-new Date(b.createdAt)}),summary=aggregate(os);return `<article class="card store-section"><div class="between"><div><h3>${esc(s.name||'已刪除店家')}${s.phone?` <a href="tel:${esc(s.phone)}" class="badge" style="vertical-align:middle;text-decoration:none">☎ ${esc(s.phone)}</a>`:''}</h3><div class="small">開團者：${esc(g.creator||'未填寫')}・${fmt(g.createdAt)}</div></div><button class="btn light smallbtn" onclick="openManualOrder('${g.id}')">＋ 新增訂單</button></div><div class="summary"><b>品項數量加總</b><br>${Object.entries(summary).sort(([a],[b])=>a.localeCompare(b,'zh-Hant')).map(([k,v])=>`${esc(k)} × ${v}`).join('<br>')||'尚無品項'}<br><b>訂單總金額：NT$ ${os.reduce((a,o)=>a+Number(o.total||0),0).toLocaleString()}</b></div>${os.map(o=>`<div class="order order-grid"><b>${esc(o.buyer)}</b><div class="details">${orderLines(o)}<div class="money">NT$ ${Number(o.total||0).toLocaleString()}</div></div><div class="adminlist"><button class="pill ${o.paid?'paid':'unpaid'}" onclick="togglePay('${o.id}')">${o.paid?'已付款':'未付款'}</button><button class="btn light smallbtn" onclick="removeOrder('${o.id}')">移除</button></div></div>`).join('')||'<p class="small">尚無訂單</p>'}</article>`}
function pastOrdersAdmin(){const groups=[...data.groups].sort((a,b)=>localDate(b.createdAt).localeCompare(localDate(a.createdAt))||(store(a.storeId)?.name||'').localeCompare(store(b.storeId)?.name||'','zh-Hant'));let last='';return groups.map(g=>{const d=localDate(g.createdAt),heading=d!==last?`<h3 class="date-heading">${fmt(g.createdAt,false)}</h3>`:'';last=d;return heading+adminGroupCard(g)}).join('')||'<div class="empty">尚無過往開團訂單</div>'}
function togglePay(id){const o=data.orders.find(x=>x.id===id);if(!o)return;o.paid=!o.paid;save();admin()}
function openManualOrder(groupId){const g=group(groupId),s=g&&store(g.storeId);if(!g||!s)return;$('#modal').innerHTML=`<div class="modal"><div class="modalbox form"><h2>手動新增訂單</h2><p class="small">${esc(s.name)}</p><label>訂購人</label><input id="manualBuyer" maxlength="30" placeholder="請輸入姓名"><label>餐點內容（每行：品項/規格/數量/單價）</label><textarea id="manualItems" placeholder="雞腿飯/正常/1/120&#10;紅茶/大杯/2/35"></textarea><div class="hint">單價會用於計算訂單總金額。</div><div class="row" style="margin-top:16px"><button class="btn light" onclick="closeModal()">取消</button><button class="btn" onclick="saveManualOrder('${groupId}')">新增訂單</button></div></div></div>`}
function saveManualOrder(groupId){const buyer=$('#manualBuyer').value.trim(),raw=$('#manualItems').value.trim();if(!buyer)return alert('請輸入訂購人');const items=raw.split(/\r?\n/).filter(Boolean).map(line=>{const [name,spec,qty,price]=line.split('/').map(x=>x.trim());return {name,spec,qty:Number(qty),price:Number(String(price||'').replace(/[^\d.]/g,''))}}).filter(x=>x.name&&x.spec&&Number.isFinite(x.qty)&&x.qty>0&&Number.isFinite(x.price)&&x.price>=0);if(!items.length||items.length!==raw.split(/\r?\n/).filter(Boolean).length)return alert('餐點格式有誤，請使用「品項/規格/數量/單價」。');data.orders.push({id:crypto.randomUUID(),groupId,buyer,items,total:items.reduce((sum,x)=>sum+x.qty*x.price,0),paid:false,createdAt:new Date().toISOString()});save();closeModal();admin()}
function removeOrder(id){if(!confirm('確定要移除這筆訂單嗎？此操作會同步更新歷史訂單。'))return;data.orders=data.orders.filter(o=>o.id!==id);save();admin()}
function adminSettings(){return `<h2 class="section-title">設定</h2><div class="card form"><label>變更管理密碼</label><input id="newpass" type="password" placeholder="至少 4 個字元"><button class="btn full" style="margin-top:14px" onclick="changePass()">儲存新密碼</button></div><div class="card"><b>資料同步</b><p class="small">系統會自動同步團購、店家與訂單資料；網路中斷時會先保存在此裝置。</p></div><div class="card"><div class="between"><b>App 版本</b><span class="badge">${APP_VERSION}</span></div><p class="small">${COPYRIGHT}</p><div class="adminlist"><button class="btn light smallbtn" onclick="showLegal('terms')">使用者條款</button><button class="btn light smallbtn" onclick="showLegal('privacy')">隱私權政策</button></div></div>`}

function changePass(){const p=$('#newpass').value;if(p.length<4)return alert('密碼至少需要 4 個字元');data.password=p;save();alert('密碼已更新')}
function closeModal(){$('#modal').innerHTML=''}
function showOrderSuccess(){$('#modal').innerHTML=`<div class="modal"><div class="modalbox notice"><div class="success-icon" aria-label="成功">✓</div><h2>點餐完成</h2><p>您的訂單已成功送出。</p><div class="success-actions"><button class="btn full" id="viewOrder">查看訂單</button><button class="btn outline full" id="continueOrder">繼續點餐</button></div></div></div>`;$('#viewOrder').onclick=()=>{closeModal();go('history')};$('#continueOrder').onclick=()=>{closeModal();go('menu')}}
function startOrderItem(i){state.cart={};state.buyer='';state.focusItem=i;state.selectedItem=i;go('order')}

  if(btn){btn.disabled=true;btn.textContent='送出中…'}

};

/* PWA stability, offline queue and visible sync state */
const PENDING_KEY=KEY+'-pending';
let isSyncing=false, toastTimer=null;
function toast(message){const el=$('#toast');if(!el)return;el.textContent=message;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2600)}
function setSyncStatus(kind,text){const el=$('#syncStatus');if(!el)return;el.className='sync-status '+kind;el.textContent=text;el.title=kind==='ok'?'資料已與雲端同步':'點擊重新同步'}
function lightweightData(source){return normalize({...source,stores:(source.stores||[]).map(st=>({...st,importData:'',menuFiles:(st.menuFiles||[]).map(f=>({name:f.name,data:''}))}))})}
function persistLocal(){
  const full=JSON.stringify(data);
  try{localStorage.setItem(KEY,full);return true}catch(err){
    try{localStorage.setItem(KEY,JSON.stringify(lightweightData(data)));return false}catch(e){console.warn('本機儲存失敗',e);return false}
  }
}
save=function(){
  data=normalize(data);persistLocal();localStorage.setItem(PENDING_KEY,'1');setSyncStatus(navigator.onLine?'warn':'error',navigator.onLine?'待同步':'離線暫存');
  clearTimeout(syncTimer);syncTimer=setTimeout(pushShared,250);return true;
};
pushShared=async function(){
  if(isSyncing)return false;
  if(!navigator.onLine){setSyncStatus('error','離線暫存');return false}
  isSyncing=true;setSyncStatus('warn','同步中');
  try{
    const r=await fetch(SUPABASE_URL+'/rest/v1/together_order_state?id=eq.shared',{method:'PATCH',headers:{...headers,'Prefer':'return=minimal'},body:JSON.stringify({payload:data,updated_at:new Date().toISOString()})});
    if(!r.ok)throw new Error(await r.text());
    localStorage.removeItem(PENDING_KEY);persistLocal();setSyncStatus('ok','已同步');return true;
  }catch(e){console.warn('雲端同步暫時失敗',e);setSyncStatus('error','同步失敗');return false}
  finally{isSyncing=false}
};
loadSharedState=async function(force=false){
  if(!navigator.onLine){setSyncStatus('error','離線模式');render();return}
  if(localStorage.getItem(PENDING_KEY)==='1'&&!force){await pushShared();return}
  setSyncStatus('warn','更新中');
  try{
    const r=await fetch(SUPABASE_URL+'/rest/v1/together_order_state?id=eq.shared&select=payload,updated_at',{headers,cache:'no-store'});
    if(!r.ok)throw new Error(await r.text());
    const rows=await r.json();
    if(rows[0]?.payload){data=normalize(rows[0].payload);persistLocal()}
    else await fetch(SUPABASE_URL+'/rest/v1/together_order_state',{method:'POST',headers:{...headers,'Prefer':'return=minimal'},body:JSON.stringify({id:'shared',payload:data})});
    setSyncStatus('ok','已更新');render();
  }catch(e){console.warn('目前使用本機資料',e);setSyncStatus('error','使用離線資料');render()}
};
async function manualSync(){if(localStorage.getItem(PENDING_KEY)==='1')await pushShared();else await loadSharedState(true)}
window.addEventListener('online',async()=>{toast('網路已恢復，正在同步');await manualSync()});
window.addEventListener('offline',()=>{setSyncStatus('error','離線模式');toast('目前離線，操作會先暫存在本機')});
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&navigator.onLine)manualSync()});

function setBusy(button,busy,label='處理中…'){if(!button)return;button.disabled=busy;if(busy){button.dataset.oldText=button.textContent;button.textContent=label}else if(button.dataset.oldText){button.textContent=button.dataset.oldText;delete button.dataset.oldText}}
const createStoreStable=createStore;
createStore=function(ev){const btn=ev?.currentTarget||document.activeElement?.closest?.('button');setBusy(btn,true,'儲存中…');try{createStoreStable();toast('店家已儲存，正在同步')}catch(e){console.error(e);alert('儲存失敗：'+(e.message||'請稍後重試'))}finally{setBusy(btn,false)}};
const createGroupStable=createGroup;
createGroup=function(){const btn=event?.currentTarget;setBusy(btn,true,'建立中…');try{createGroupStable();toast('開團已建立，正在同步')}catch(e){console.error(e);alert('建立失敗：'+(e.message||'請稍後重試'))}finally{setBusy(btn,false)}};

async function optimizeMenuFile(file){
  if(!file.type.startsWith('image/'))return file;
  if(file.size<900000)return file;
  try{
    const bitmap=await createImageBitmap(file),max=1800,scale=Math.min(1,max/Math.max(bitmap.width,bitmap.height));
    const canvas=document.createElement('canvas');canvas.width=Math.round(bitmap.width*scale);canvas.height=Math.round(bitmap.height*scale);
    canvas.getContext('2d',{alpha:false}).drawImage(bitmap,0,0,canvas.width,canvas.height);bitmap.close?.();
    const blob=await new Promise(resolve=>canvas.toBlob(resolve,'image/jpeg',.78));
    return blob?new File([blob],file.name.replace(/\.[^.]+$/,'.jpg'),{type:'image/jpeg'}):file;
  }catch(e){return file}
}
importMenus=async function(el){
  let files=[...el.files];if(!files.length)return;
  setSyncStatus('warn','處理菜單');files=await Promise.all(files.map(optimizeMenuFile));
  if(files.some(f=>f.size>3500000)){alert('每個檔案請勿超過 3.5MB');el.value='';return}
  const current=pendingMenuFiles(),incoming=await Promise.all(files.map(f=>new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve({name:f.name,data:r.result});r.onerror=reject;r.readAsDataURL(f)})));
  const all=[...current,...incoming],total=all.reduce((n,f)=>n+(f.data?.length||0),0);
  if(total>7000000){alert('菜單附件總容量過大，請減少檔案或改用較小圖片。');el.value='';setSyncStatus('error','附件過大');return}
  $('#filehint').dataset.files=JSON.stringify(all);el.value='';renderPendingMenuFiles();setSyncStatus(navigator.onLine?'ok':'error',navigator.onLine?'菜單已載入':'離線模式');
};
importMenu=function(el){importMenus(el)};

if(navigator.onLine)setSyncStatus('warn','連線中');else setSyncStatus('error','離線模式');

</script>

<script id="v11-builder-script">
(()=>{
  const uid=()=>crypto.randomUUID?.()||('id'+Date.now()+Math.random().toString(16).slice(2));
  const cleanText=v=>String(v??'').trim();
  const blankPriceRow=()=>({id:uid(),label:'',price:''});
  const blankExtraGroup=()=>({id:uid(),name:'',noPrice:false,collapsed:false,rows:[{id:uid(),label:'',price:'0'}]});
  const blankItem=()=>({id:uid(),name:'',notice:'',priceRows:[blankPriceRow()],groups:[]});
  const blankBlock=(title='')=>({id:uid(),title,items:[blankItem()]});

  function ensureBuilder(){
    if(!Array.isArray(state.menuBuilder)||!state.menuBuilder.length) state.menuBuilder=[blankBlock('')];
    return state.menuBuilder;
  }
  function findBlock(bid){return ensureBuilder().find(b=>b.id===bid)}
  function findItem(bid,iid){return findBlock(bid)?.items.find(i=>i.id===iid)}
  function escAttr(v){return esc(String(v??''))}

  window.renderMenuBuilder=function(){
    const host=document.querySelector('#menuBuilder'); if(!host)return;
    const blocks=ensureBuilder();
    host.innerHTML=blocks.map((b,bi)=>{const collapsed=!!b.collapsed;return `<section class="builder-section ${collapsed?'is-collapsed':''}" data-block="${b.id}">
      ${collapsed?`<div class="builder-section-title" title="點擊展開此區塊" onclick="builderToggleBlockCollapse('${b.id}')"><span class="bracket">【</span><button type="button" class="collapsed-block-title">${escAttr(b.title)||'未命名區塊'}</button><span class="bracket">】</span></div>`:`<div class="builder-section-title">
        <span class="bracket" title="按住拖曳調整區塊順序">【</span>
        <input aria-label="區塊名稱" placeholder="區塊名稱（選填，例如：飽胃主食）" value="${escAttr(b.title)}" oninput="builderSetBlock('${b.id}','title',this.value)">
        <span class="bracket">】</span>
        <div class="builder-section-title-actions"><button type="button" class="btn light smallbtn" onclick="builderSetBlockCollapse('${b.id}',true)">一鍵摺疊</button><button type="button" class="btn light smallbtn" onclick="builderSetBlockCollapse('${b.id}',false)">一鍵展開</button></div>
      </div>
      <div class="builder-muted" style="margin-top:5px">留白代表不使用【區塊】；填寫後系統會自動加入【 】。</div>
      <div class="menu-builder">${b.items.map((it,ii)=>menuItemEditor(b.id,it,ii)).join('')}</div>
      <div class="builder-actions">
        <button type="button" class="btn light smallbtn" onclick="builderAddItem('${b.id}',false)">＋ 品項</button>
        <button type="button" class="btn light smallbtn" onclick="builderAddItem('${b.id}',true)">＋ 同前品項規格</button>
        <button type="button" class="btn light smallbtn" onclick="builderAddBlockAfter('${b.id}')">＋ 區塊</button>
        ${blocks.length>1?`<button type="button" class="btn danger smallbtn" onclick="builderRemoveBlock('${b.id}')">刪除此區塊</button>`:''}
      </div>`}
    </section>`}).join('');
  };

  function menuItemEditor(bid,it,ii){
    return `<article class="menu-block">
      <div class="menu-block-head"><strong>品項 ${ii+1}</strong><button type="button" class="btn danger smallbtn" onclick="builderRemoveItem('${bid}','${it.id}')">刪除品項</button></div>
      <div class="builder-field"><label>品項</label><input placeholder="例如：傳統滷肉飯" value="${escAttr(it.name)}" oninput="builderSetItem('${bid}','${it.id}','name',this.value)"></div>
      <div class="builder-field" style="margin-top:10px"><label>注意事項（選填）</label><textarea rows="2" placeholder="例如：推薦品項、售完提醒或口味說明" oninput="builderSetItem('${bid}','${it.id}','notice',this.value)">${escAttr(it.notice)}</textarea></div>
      <div style="margin-top:12px"><b>規格｜分量與價格 <em class="required">*</em></b><div class="builder-muted">至少一個，可不限數量新增；系統會自動加入「=」。</div></div>
      <div>${it.priceRows.map(r=>priceRowEditor(bid,it.id,r)).join('')}</div>
      <button type="button" class="btn light smallbtn builder-add" style="margin-top:8px" onclick="builderAddPriceRow('${bid}','${it.id}')">＋ 分量與價格</button>
      <div style="margin-top:14px"><div class="between" style="align-items:center;gap:8px;flex-wrap:wrap"><b>其他規格（選填）</b><div class="builder-actions" style="margin-top:0"><button type="button" class="btn light smallbtn" onclick="builderSetAllGroupsCollapse('${bid}','${it.id}',true)">一鍵摺疊</button><button type="button" class="btn light smallbtn" onclick="builderSetAllGroupsCollapse('${bid}','${it.id}',false)">一鍵展開</button></div></div><div class="builder-muted">例如加料、辣度、甜度；系統會自動加入「=+」。</div></div>
      <div>${it.groups.map(g=>extraGroupEditor(bid,it.id,g)).join('')}</div>
      <div class="builder-actions" style="margin-top:8px;justify-content:flex-start;width:100%"><button type="button" class="btn light smallbtn builder-add" onclick="builderAddGroup('${bid}','${it.id}')">＋ 其他規格欄位</button><button type="button" class="btn light smallbtn builder-add" onclick="builderCopyPreviousItemSpecs('${bid}','${it.id}')">＋ 同前品項規格</button></div>
    </article>`;
  }
  function priceRowEditor(bid,iid,r){return `<div class="builder-row">
    <div class="builder-field builder-label"><label>分量／規格名稱</label><input placeholder="例如：小碗" value="${escAttr(r.label)}" oninput="builderSetPrice('${bid}','${iid}','${r.id}','label',this.value)"></div>
    <div class="builder-eq">=</div>
    <div class="builder-field builder-price"><label>價格</label><input type="number" min="0" step="1" inputmode="decimal" placeholder="35" value="${escAttr(r.price)}" oninput="builderSetPrice('${bid}','${iid}','${r.id}','price',this.value)"></div>
    <button type="button" class="btn danger builder-remove" aria-label="刪除此分量與價格" onclick="builderRemovePrice('${bid}','${iid}','${r.id}')">×</button>
  </div>`}
  function extraGroupEditor(bid,iid,g){
    const collapsed=!!g.collapsed;
    return `<div class="menu-block extra-group-card ${collapsed?'is-collapsed':''}" data-bid="${bid}" data-iid="${iid}" data-gid="${g.id}" style="margin-top:9px;background:#fffefa">
      <div class="extra-group-head">
        <button type="button" class="group-drag-handle" aria-label="拖曳調整規格順序" title="按住拖曳調整順序">⋮⋮</button>
        ${collapsed?`<button type="button" class="collapsed-group-name" onclick="builderToggleGroupCollapse('${bid}','${iid}','${g.id}')"><span>規格欄位名稱</span><b>${escAttr(g.name)||'未命名規格'}</b><small class="collapsed-group-options">${escAttr((g.rows||[]).map(r=>cleanText(r.label)).filter(Boolean).join('、'))||'尚未填寫選項'}</small></button>`:`<div class="builder-field grow"><label>規格欄位名稱</label><input placeholder="例如：加料／客製" value="${escAttr(g.name)}" oninput="builderSetGroup('${bid}','${iid}','${g.id}','name',this.value)"></div>`}
        <button type="button" class="btn light smallbtn group-collapse-btn" aria-label="${collapsed?'展開':'摺疊'}此規格" onclick="builderToggleGroupCollapse('${bid}','${iid}','${g.id}')">${collapsed?'展開 ▾':'摺疊 ▴'}</button>
        <button type="button" class="btn danger builder-remove" aria-label="刪除此規格" onclick="builderRemoveGroup('${bid}','${iid}','${g.id}')">×</button>
      </div>
      ${collapsed?'':`<div class="extra-group-body">
        <label class="builder-check"><input type="checkbox" ${g.noPrice?'checked':''} onchange="builderToggleGroupNoPrice('${bid}','${iid}','${g.id}',this.checked)"> 此規格不需價格（例如：正常、去香菜、飯硬）</label>
        ${g.rows.map(r=>`<div class="builder-row ${g.noPrice?'no-price':''}"><div class="builder-field builder-label"><label>選項名稱</label><input placeholder="例如：${g.noPrice?'正常':'加滷蛋'}" value="${escAttr(r.label)}" oninput="builderSetGroupRow('${bid}','${iid}','${g.id}','${r.id}','label',this.value)"></div>${g.noPrice?'':`<div class="builder-eq">=+</div><div class="builder-field builder-price"><label>加價</label><input type="number" min="0" step="1" inputmode="decimal" placeholder="15" value="${escAttr(r.price)}" oninput="builderSetGroupRow('${bid}','${iid}','${g.id}','${r.id}','price',this.value)"></div>`}<button type="button" class="btn danger builder-remove" onclick="builderRemoveGroupRow('${bid}','${iid}','${g.id}','${r.id}')">×</button></div>`).join('')}
        <button type="button" class="btn light smallbtn builder-add" style="margin-top:8px" onclick="builderAddGroupRow('${bid}','${iid}','${g.id}')">＋ 選項</button>
      </div>`}
    </div>`
  }

  window.builderSetBlock=(bid,k,v)=>{const b=findBlock(bid);if(b)b[k]=v};
  window.builderToggleBlockCollapse=bid=>{const b=findBlock(bid);if(!b)return;b.collapsed=!b.collapsed;renderMenuBuilder()};
  window.builderSetBlockCollapse=(bid,collapsed)=>{const b=findBlock(bid);if(!b)return;b.collapsed=!!collapsed;renderMenuBuilder()};
  window.builderSetAllBlocksCollapse=collapsed=>{ensureBuilder().forEach(b=>b.collapsed=!!collapsed);renderMenuBuilder()};
  window.builderMoveBlock=(fromBid,toBid)=>{const blocks=ensureBuilder();if(fromBid===toBid)return;const from=blocks.findIndex(b=>b.id===fromBid),to=blocks.findIndex(b=>b.id===toBid);if(from<0||to<0)return;const [moved]=blocks.splice(from,1);blocks.splice(to,0,moved);renderMenuBuilder()};
  window.builderSetItem=(bid,iid,k,v)=>{const i=findItem(bid,iid);if(i)i[k]=v};
  window.builderSetPrice=(bid,iid,rid,k,v)=>{const r=findItem(bid,iid)?.priceRows.find(x=>x.id===rid);if(r)r[k]=v};
  window.builderSetGroup=(bid,iid,gid,k,v)=>{const g=findItem(bid,iid)?.groups.find(x=>x.id===gid);if(g)g[k]=v};
  window.builderToggleGroupCollapse=(bid,iid,gid)=>{const g=findItem(bid,iid)?.groups.find(x=>x.id===gid);if(!g)return;g.collapsed=!g.collapsed;renderMenuBuilder()};
  window.builderSetAllGroupsCollapse=(bid,iid,collapsed)=>{const i=findItem(bid,iid);if(!i)return;i.groups.forEach(g=>g.collapsed=!!collapsed);renderMenuBuilder()};
  window.builderMoveGroup=(bid,iid,fromGid,toGid)=>{const i=findItem(bid,iid);if(!i||fromGid===toGid)return;const from=i.groups.findIndex(g=>g.id===fromGid),to=i.groups.findIndex(g=>g.id===toGid);if(from<0||to<0)return;const [moved]=i.groups.splice(from,1);i.groups.splice(to,0,moved);renderMenuBuilder()};
  window.builderToggleGroupNoPrice=(bid,iid,gid,checked)=>{const g=findItem(bid,iid)?.groups.find(x=>x.id===gid);if(!g)return;g.noPrice=!!checked;if(g.noPrice)g.rows.forEach(r=>r.price='');else g.rows.forEach(r=>{if(r.price==='')r.price='0'});renderMenuBuilder()};
  window.builderSetGroupRow=(bid,iid,gid,rid,k,v)=>{const r=findItem(bid,iid)?.groups.find(x=>x.id===gid)?.rows.find(x=>x.id===rid);if(r)r[k]=v};
  window.builderAddPriceRow=(bid,iid)=>{findItem(bid,iid)?.priceRows.push(blankPriceRow());renderMenuBuilder()};
  window.builderRemovePrice=(bid,iid,rid)=>{const i=findItem(bid,iid);if(!i)return;if(i.priceRows.length<=1)return alert('分量與價格至少要保留一個');i.priceRows=i.priceRows.filter(x=>x.id!==rid);renderMenuBuilder()};
  window.builderAddGroup=(bid,iid)=>{findItem(bid,iid)?.groups.push(blankExtraGroup());renderMenuBuilder()};
  window.builderRemoveGroup=(bid,iid,gid)=>{const i=findItem(bid,iid);if(i)i.groups=i.groups.filter(x=>x.id!==gid);renderMenuBuilder()};
  window.builderAddGroupRow=(bid,iid,gid)=>{const g=findItem(bid,iid)?.groups.find(x=>x.id===gid);if(g)g.rows.push({id:uid(),label:'',price:g.noPrice?'':'0'});renderMenuBuilder()};
  window.builderRemoveGroupRow=(bid,iid,gid,rid)=>{const g=findItem(bid,iid)?.groups.find(x=>x.id===gid);if(!g)return;if(g.rows.length<=1)return alert('每個其他規格至少保留一個選項');g.rows=g.rows.filter(x=>x.id!==rid);renderMenuBuilder()};
  const copyItemSpecs=(from,to)=>{if(!from||!to)return;to.priceRows=(from.priceRows||[]).map(r=>({id:uid(),label:r.label,price:r.price}));to.groups=(from.groups||[]).map(g=>({id:uid(),name:g.name,noPrice:!!g.noPrice,collapsed:!!g.collapsed,rows:(g.rows||[]).map(r=>({id:uid(),label:r.label,price:r.price}))}))};
  window.builderCopyPreviousItemSpecs=(bid,iid)=>{const b=findBlock(bid),at=b?.items.findIndex(i=>i.id===iid);if(!b||at===undefined||at<1)return alert('此區塊尚無上一個品項可沿用規格');copyItemSpecs(b.items[at-1],b.items[at]);renderMenuBuilder()};
  window.builderAddItem=(bid,copyPrevious=false)=>{const b=findBlock(bid);if(!b)return;const pending=state.builderPending;if(copyPrevious&&pending?.targetBid&&pending?.targetItemId){const target=findItem(pending.targetBid,pending.targetItemId);if(target&&pending.source)copyItemSpecs(pending.source,target);state.builderPending=null;renderMenuBuilder();return}const next=blankItem(),prev=b.items[b.items.length-1];if(copyPrevious&&prev)copyItemSpecs(prev,next);b.items.push(next);state.builderPending=copyPrevious?null:{targetBid:bid,targetItemId:next.id,source:prev?{priceRows:(prev.priceRows||[]).map(r=>({...r})),groups:(prev.groups||[]).map(g=>({...g,rows:(g.rows||[]).map(r=>({...r}))}))}:null};renderMenuBuilder()};
  window.builderRemoveItem=(bid,iid)=>{const b=findBlock(bid);if(!b)return;if(b.items.length<=1)return alert('每個區塊至少保留一個品項');b.items=b.items.filter(x=>x.id!==iid);renderMenuBuilder()};
  window.builderAddBlockAfter=(bid)=>{const blocks=ensureBuilder(),idx=blocks.findIndex(x=>x.id===bid),prev=blocks[idx]?.items?.[blocks[idx]?.items?.length-1],next=blankBlock('');blocks.splice(idx+1,0,next);state.builderPending={targetBid:next.id,targetItemId:next.items[0].id,source:prev?{priceRows:(prev.priceRows||[]).map(r=>({...r})),groups:(prev.groups||[]).map(g=>({...g,rows:(g.rows||[]).map(r=>({...r}))}))}:null};renderMenuBuilder()};
  window.builderRemoveBlock=bid=>{state.menuBuilder=ensureBuilder().filter(x=>x.id!==bid);renderMenuBuilder()};

  let groupDrag=null;
  document.addEventListener('pointerdown',e=>{
    const handle=e.target.closest?.('.group-drag-handle');if(!handle)return;
    const card=handle.closest('.extra-group-card');if(!card)return;
    e.preventDefault();
    groupDrag={pointerId:e.pointerId,bid:card.dataset.bid,iid:card.dataset.iid,fromGid:card.dataset.gid,toGid:card.dataset.gid,source:card,target:card};
    handle.setPointerCapture?.(e.pointerId);card.classList.add('drag-source');
  },true);
  document.addEventListener('pointermove',e=>{
    if(!groupDrag||e.pointerId!==groupDrag.pointerId)return;
    e.preventDefault();
    const el=document.elementFromPoint(e.clientX,e.clientY);
    const card=el?.closest?.('.extra-group-card');
    if(!card||card.dataset.bid!==groupDrag.bid||card.dataset.iid!==groupDrag.iid)return;
    groupDrag.target?.classList.remove('drag-target');groupDrag.target=card;groupDrag.toGid=card.dataset.gid;card.classList.add('drag-target');
  },{capture:true,passive:false});
  const finishGroupDrag=e=>{
    if(!groupDrag||e.pointerId!==groupDrag.pointerId)return;
    const d=groupDrag;groupDrag=null;d.source?.classList.remove('drag-source');d.target?.classList.remove('drag-target');
    if(d.fromGid!==d.toGid)window.builderMoveGroup(d.bid,d.iid,d.fromGid,d.toGid);
  };
  document.addEventListener('pointerup',finishGroupDrag,true);
  document.addEventListener('pointercancel',finishGroupDrag,true);

  let blockDrag=null;
  document.addEventListener('pointerdown',e=>{
    const handle=e.target.closest?.('.builder-section-title .bracket:first-child');if(!handle)return;
    const section=handle.closest('.builder-section');if(!section)return;
    e.preventDefault();
    blockDrag={pointerId:e.pointerId,fromBid:section.dataset.block,toBid:section.dataset.block,source:section,target:section};
    handle.setPointerCapture?.(e.pointerId);section.classList.add('drag-source');
  },true);
  document.addEventListener('pointermove',e=>{
    if(!blockDrag||e.pointerId!==blockDrag.pointerId)return;
    e.preventDefault();
    const section=document.elementFromPoint(e.clientX,e.clientY)?.closest?.('.builder-section');
    if(!section)return;
    blockDrag.target?.classList.remove('drag-target');blockDrag.target=section;blockDrag.toBid=section.dataset.block;section.classList.add('drag-target');
  },{capture:true,passive:false});
  const finishBlockDrag=e=>{
    if(!blockDrag||e.pointerId!==blockDrag.pointerId)return;
    const d=blockDrag;blockDrag=null;d.source?.classList.remove('drag-source');d.target?.classList.remove('drag-target');
    if(d.fromBid!==d.toBid)window.builderMoveBlock(d.fromBid,d.toBid);
  };
  document.addEventListener('pointerup',finishBlockDrag,true);
  document.addEventListener('pointercancel',finishBlockDrag,true);

  function builderToText(){
    const lines=[];
    for(const b of ensureBuilder()){
      const title=cleanText(b.title); if(title)lines.push(`【${title}】`);
      for(const it of b.items){
        const name=cleanText(it.name); if(!name)throw new Error('每個品項都必須填寫名稱');
        const prices=it.priceRows.map(r=>({label:cleanText(r.label),price:cleanText(r.price)}));
        if(!prices.length||prices.some(r=>!r.label||r.price===''))throw new Error(`「${name}」的分量與價格尚未填寫完整`);
        if(prices.some(r=>!Number.isFinite(Number(r.price))||Number(r.price)<0))throw new Error(`「${name}」的價格格式不正確`);
        lines.push(`品項：${name}`,'規格：',`- [分量與價格]：${prices.map(r=>`${r.label}=${Number(r.price)}`).join(', ')}`);
        for(const g of it.groups){
          const gn=cleanText(g.name); if(!gn)throw new Error(`「${name}」有其他規格尚未填寫欄位名稱`);
          const rows=g.rows.map(r=>({label:cleanText(r.label),price:cleanText(r.price)}));
          if(rows.some(r=>!r.label))throw new Error(`「${name}」的「${gn}」選項名稱尚未填寫完整`);
          if(g.noPrice){
            lines.push(`- [${gn}]：${rows.map(r=>r.label).join(', ')}`);
          }else{
            if(rows.some(r=>r.price===''))throw new Error(`「${name}」的「${gn}」加價尚未填寫完整`);
            if(rows.some(r=>!Number.isFinite(Number(r.price))||Number(r.price)<0))throw new Error(`「${name}」的「${gn}」加價格式不正確`);
            lines.push(`- [${gn}]：${rows.map(r=>`${r.label}=+${Number(r.price)}`).join(', ')}`);
          }
        }
      }
    }
    return lines.join('\n');
  }
  function itemsToBuilder(items){
    const blocks=[];let lastSection=Symbol('none'),block;
    for(const item of (items||[])){
      const sec=item.section||'';
      if(sec!==lastSection){block=blankBlock(sec);block.items=[];blocks.push(block);lastSection=sec}
      const priceGroup=(item.optionGroups||[]).find(g=>g.pricing)||(item.optionGroups||[]).find(g=>/價格/.test(g.name));
      const it=blankItem();it.name=item.name||'';it.notice=item.notice||'';
      if(priceGroup){it.priceRows=priceGroup.values.map(v=>({id:uid(),label:v,price:String(priceGroup.adjustments?.[v]??0)}))}
      else {it.priceRows=[{id:uid(),label:item.specs||'單一規格',price:String(item.price??0)}]}
      it.groups=(item.optionGroups||[]).filter(g=>g!==priceGroup).map(g=>{const vals=g.values||[],hasAnyPrice=vals.some(v=>Object.prototype.hasOwnProperty.call(g.adjustments||{},v));return {id:uid(),name:g.name||'',noPrice:!hasAnyPrice,collapsed:false,rows:vals.map(v=>({id:uid(),label:v,price:hasAnyPrice?String(g.adjustments?.[v]??0):''}))}});
      block.items.push(it);
    }
    return blocks.length?blocks:[blankBlock('')];
  }

  const oldAdminStores=window.adminStores;
  window.adminStores=function(){
    let html=oldAdminStores();
    const start=html.indexOf('<div id="fullMenuFields"');
    const button=html.indexOf('<button class="btn full"',start);
    if(start>=0&&button>start){
      const replacement=`<div id="fullMenuFields" class="${(state.storeBuildMode||'full')==='full'?'':'hidden'}"><label>注意事項（選填）</label><textarea id="smenuNotice" rows="2" placeholder="例如：孕婦不能食用、過敏原或其他提醒"></textarea><div class="between" style="align-items:center;gap:8px;flex-wrap:wrap"><label style="margin:14px 0 0">餐點內容${reqMark()}</label><div class="builder-actions" style="margin:14px 0 0"><button type="button" class="btn light smallbtn" onclick="builderSetAllBlocksCollapse(true)">一鍵摺疊</button><button type="button" class="btn light smallbtn" onclick="builderSetAllBlocksCollapse(false)">一鍵展開</button></div></div><div class="summary"><b>欄位式菜單編輯</b></div><div id="menuBuilder"></div></div>`;
      html=html.slice(0,start)+replacement+html.slice(button);
    }
    setTimeout(renderMenuBuilder,0);return html;
  };

  const oldCreateStore=window.createStore;
  window.createStore=function(){
    if((state.storeBuildMode||'full')!=='full')return oldCreateStore();
    let raw;try{raw=builderToText()}catch(e){return alert(e.message)}
    const itemNotices=ensureBuilder().flatMap(b=>b.items.map(i=>i.notice||''));
    const menuNotice=document.querySelector('#smenuNotice')?.value.trim()||'';
    const targetId=document.querySelector('#sname')?.dataset.id;
    if(!cleanText(document.querySelector('#sname')?.value))return alert('請輸入店家名稱');
    let hidden=document.querySelector('#sitems');if(!hidden){hidden=document.createElement('textarea');hidden.id='sitems';hidden.className='hidden';document.querySelector('#fullMenuFields')?.appendChild(hidden)}hidden.value=raw;
    const result=oldCreateStore();
    const target=targetId?store(targetId):data.stores[data.stores.length-1];
    if(target?.items){target.items.forEach((item,index)=>item.notice=itemNotices[index]||'');target.menuNotice=menuNotice;save()}
    state.menuBuilder=[blankBlock('')];
    return result;
  };

  const oldEditStore=window.editStore;
  window.editStore=function(id){
    const s=store(id);state.menuBuilder=itemsToBuilder(s?.items||[]);oldEditStore(id);setTimeout(()=>{const notice=document.querySelector('#smenuNotice');if(notice)notice.value=s?.menuNotice||'';renderMenuBuilder()},0)
  };

  const oldSetMode=window.setStoreBuildMode;
  window.setStoreBuildMode=function(mode){oldSetMode(mode);if(mode==='full')setTimeout(renderMenuBuilder,0)};

  // initialize a fresh builder whenever entering store admin without an active edit
  const oldAdmin=window.admin;
  window.admin=function(){
    if(state.adminTab===1&&!state.menuBuilder)state.menuBuilder=[blankBlock('')];
    const out=oldAdmin();if(state.adminTab===1)setTimeout(renderMenuBuilder,0);return out;
  };
})();
</script>


<script id="v12-2-store-draft-autosave">
(()=>{
  const DRAFT_KEY=(typeof KEY==='string'?KEY:'together-order')+'-store-form-draft-v2';
  let draftTimer=null, restoringDraft=false, suppressDraft=false;
  const clone=v=>{try{return structuredClone(v)}catch(_){return JSON.parse(JSON.stringify(v))}};
  const fieldValue=id=>document.querySelector('#'+id)?.value??'';

  function isStoreFormOpen(){
    return state?.page==='admin'&&state?.adminTab===1&&!!document.querySelector('#sname');
  }
  function currentDraft(){
    if(!isStoreFormOpen())return null;
    const filehint=document.querySelector('#filehint');
    return {
      savedAt:Date.now(),
      editId:document.querySelector('#sname')?.dataset?.id||'',
      mode:state.storeBuildMode||'full',
      fields:{
        name:fieldValue('sname'),category:fieldValue('scat'),phone:fieldValue('sphone'),
        address:fieldValue('saddress'),method:fieldValue('smethod'),note:fieldValue('snote')
      },
      menuBuilder:Array.isArray(state.menuBuilder)?clone(state.menuBuilder):null,
      // 附件內容可能很大，不寫入草稿；已儲存店家的原附件不受影響。
      fileNames:(()=>{try{return JSON.parse(filehint?.dataset?.files||'[]').map(f=>f.name||'菜單')}catch(_){return []}})()
    };
  }
  function saveStoreDraft(){
    if(restoringDraft||suppressDraft)return;
    const draft=currentDraft();if(!draft)return;
    const hasContent=draft.editId||Object.values(draft.fields).some(v=>String(v).trim())||
      draft.menuBuilder?.some(b=>String(b.title||'').trim()||b.items?.some(i=>String(i.name||'').trim()||i.priceRows?.some(r=>String(r.label||'').trim()||String(r.price||'').trim())||i.groups?.length));
    try{
      if(hasContent)localStorage.setItem(DRAFT_KEY,JSON.stringify(draft));
      else localStorage.removeItem(DRAFT_KEY);
    }catch(e){console.warn('店家草稿暫存失敗',e)}
  }
  function scheduleDraft(){clearTimeout(draftTimer);draftTimer=setTimeout(saveStoreDraft,180)}
  function readDraft(){try{return JSON.parse(localStorage.getItem(DRAFT_KEY)||'null')}catch(_){return null}}
  function clearStoreDraft(){clearTimeout(draftTimer);localStorage.removeItem(DRAFT_KEY)}

  function restoreStoreDraft(){
    if(!isStoreFormOpen())return;
    const d=readDraft();if(!d)return;
    restoringDraft=true;
    try{
      state.storeBuildMode=d.mode||'full';
      const set=(id,v)=>{const el=document.querySelector('#'+id);if(el)el.value=v??''};
      set('sname',d.fields?.name);set('scat',d.fields?.category);set('sphone',d.fields?.phone);
      set('saddress',d.fields?.address);set('smethod',d.fields?.method);set('snote',d.fields?.note);
      const name=document.querySelector('#sname');if(name){if(d.editId)name.dataset.id=d.editId;else delete name.dataset.id}
      if(Array.isArray(d.menuBuilder)&&d.menuBuilder.length){state.menuBuilder=clone(d.menuBuilder);window.renderMenuBuilder?.()}
      window.setStoreBuildMode?.(state.storeBuildMode);
      const hint=document.querySelector('#filehint');
      if(hint&&d.fileNames?.length&&!hint.dataset.files)hint.insertAdjacentHTML('beforeend',`<div class="builder-muted">先前選擇的附件需重新選取：${d.fileNames.map(esc).join('、')}</div>`);
    }finally{restoringDraft=false}
  }

  document.addEventListener('input',e=>{if(e.target.closest?.('#view')&&isStoreFormOpen())scheduleDraft()},true);
  document.addEventListener('change',e=>{if(e.target.closest?.('#view')&&isStoreFormOpen())scheduleDraft()},true);
  document.addEventListener('visibilitychange',()=>{if(document.hidden)saveStoreDraft();else setTimeout(restoreStoreDraft,80)},true);
  window.addEventListener('pagehide',saveStoreDraft,{capture:true});
  window.addEventListener('beforeunload',saveStoreDraft,{capture:true});
  window.addEventListener('pageshow',()=>setTimeout(restoreStoreDraft,80));

  // 所有欄位式編輯器操作後也立即保存，包含新增／刪除／複製規格。
  const builderFns=['builderSetBlock','builderSetItem','builderSetPrice','builderSetGroup','builderToggleGroupCollapse','builderMoveGroup','builderToggleGroupNoPrice','builderSetGroupRow','builderAddPriceRow','builderRemovePrice','builderAddGroup','builderRemoveGroup','builderAddGroupRow','builderRemoveGroupRow','builderAddItem','builderRemoveItem','builderAddBlockAfter','builderRemoveBlock'];
  setTimeout(()=>builderFns.forEach(name=>{const fn=window[name];if(typeof fn!=='function'||fn.__draftWrapped)return;const wrapped=function(...args){const r=fn.apply(this,args);scheduleDraft();return r};wrapped.__draftWrapped=true;window[name]=wrapped}),0);

  const previousAdmin=window.admin;
  window.admin=function(...args){const r=previousAdmin.apply(this,args);if(state.adminTab===1)setTimeout(restoreStoreDraft,40);return r};

  const previousEdit=window.editStore;
  window.editStore=function(id,...args){
    suppressDraft=true;clearStoreDraft();
    try{return previousEdit.call(this,id,...args)}finally{suppressDraft=false;setTimeout(saveStoreDraft,120)}
  };

  const previousCreate=window.createStore;
  window.createStore=function(...args){
    saveStoreDraft();
    const before=(data.stores||[]).map(s=>s.id+'|'+s.name+'|'+(s.items?.length||0)).join('~');
    const r=previousCreate.apply(this,args);
    const after=(data.stores||[]).map(s=>s.id+'|'+s.name+'|'+(s.items?.length||0)).join('~');
    if(after!==before){suppressDraft=true;clearStoreDraft();state.menuBuilder=null;setTimeout(()=>{suppressDraft=false},0)}
    return r;
  };

  window.clearStoreDraft=clearStoreDraft;
  setTimeout(restoreStoreDraft,120);
})();
</script>

<script>
(()=>{
  let drag=null;
  document.addEventListener('mousedown',e=>{
    const tabs=e.target.closest?.('.menu-tabs-sticky');
    if(!tabs)return;
    drag={tabs,x:e.clientX,left:tabs.scrollLeft,moved:false};
  });
  document.addEventListener('mousemove',e=>{
    if(!drag)return;
    const dx=e.clientX-drag.x;
    if(Math.abs(dx)>3){drag.moved=true;drag.tabs.scrollLeft=drag.left-dx;e.preventDefault()}
  });
  document.addEventListener('mouseup',()=>{
    if(!drag)return;
    const {tabs,moved}=drag;drag=null;
    if(moved){tabs.dataset.dragging='1';setTimeout(()=>delete tabs.dataset.dragging,0)}
  });
  document.addEventListener('click',e=>{
    const tabs=e.target.closest?.('.menu-tabs-sticky');
    if(tabs?.dataset.dragging){e.preventDefault();e.stopPropagation()}
  },true);
  document.addEventListener('click',e=>{
    const tab=e.target.closest?.('.menu-tabs-sticky .tab[data-section]');
    if(!tab||tab.closest('.menu-tabs-sticky')?.dataset.dragging)return;
    e.preventDefault();e.stopImmediatePropagation();setMenuSection(tab.dataset.section);
  },true);
  document.addEventListener('wheel',e=>{
    const tabs=e.target.closest?.('.menu-tabs-sticky');
    if(!tabs||Math.abs(e.deltaY)<=Math.abs(e.deltaX))return;
    tabs.scrollLeft+=e.deltaY;e.preventDefault();
  },{passive:false});
})();
</script>

<script>
(()=>{
  let placeholder=null,frame=0;
  const reset=tabs=>{
    tabs?.classList.remove('menu-tabs-floating');
    if(tabs){tabs.style.left='';tabs.style.top='';tabs.style.width=''}
    placeholder?.remove();placeholder=null;
  };
  const update=()=>{
    frame=0;
    if(placeholder&&!placeholder.isConnected)placeholder=null;
    const tabs=document.querySelector('.menu-tabs-sticky');
    if(!tabs||state.page!=='menu'){reset(tabs);return}
    const top=document.querySelector('.top')?.getBoundingClientRect().height||0;
    const anchor=(placeholder||tabs).getBoundingClientRect();
    if(!placeholder&&anchor.top<=top){
      placeholder=document.createElement('div');
      placeholder.style.height=anchor.height+'px';
      placeholder.style.margin='0 -16px 10px';
      tabs.parentNode.insertBefore(placeholder,tabs);
    }
    if(placeholder){
      const rect=placeholder.getBoundingClientRect();
      tabs.classList.add('menu-tabs-floating');
      tabs.style.left=rect.left+'px';tabs.style.top=top+'px';tabs.style.width=rect.width+'px';
      if(rect.top>top+2)reset(tabs);
    }
  };
  const queue=()=>{if(!frame)frame=requestAnimationFrame(update)};
  window.addEventListener('scroll',queue,{passive:true});
  document.addEventListener('scroll',queue,{passive:true,capture:true});
  window.visualViewport?.addEventListener('scroll',queue,{passive:true});
  window.addEventListener('resize',queue);
  document.addEventListener('click',()=>setTimeout(queue,0),true);
  setInterval(queue,700);
})();
</script>
